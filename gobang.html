        }

        // 保存棋谱记录
        function saveGameRecord() {
            try {
                let savedGames = JSON.parse(localStorage.getItem('gobang_saved_games') || '[]');
                savedGames.push(gameRecord);
                localStorage.setItem('gobang_saved_games', JSON.stringify(savedGames));
            } catch (e) {
                console.error('保存棋谱记录失败:', e);
            }
        }

        // 显示棋谱面板
        function showRecordPanel() {
            try {
                savedGames = JSON.parse(localStorage.getItem('gobang_saved_games') || '[]');
            } catch (e) {
                console.error('读取棋谱记录失败:', e);
                savedGames = [];
            }

            const panel = document.getElementById('recordPanel');
            const list = document.getElementById('recordList');

            if (savedGames.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">暂无棋谱记录</div>';
            } else {
                list.innerHTML = '';
                savedGames.forEach((game, index) => {
                    const item = document.createElement('div');
                    item.className = 'record-item';
                    item.innerHTML = `
                        <div class="record-info">
                            <strong>${getGameModeText(game.gameMode)} - ${getDifficultyText(game.difficulty)}</strong>
                            <span class="record-date">${new Date(game.date).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="record-moves">步数: ${game.moves.length} | 结果: ${getResultText(game.result)}</div>
                    `;
                    item.onclick = () => loadGameForReplay(game);
                    list.appendChild(item);
                });
            }

            panel.style.display = 'block';
            document.getElementById('overlay').classList.add('show');
        }

        function closeRecordPanel() {
            document.getElementById('recordPanel').style.display = 'none';
            document.getElementById('overlay').classList.remove('show');
        }

        function clearAllRecords() {
            if (confirm('确定要清空所有棋谱记录吗？')) {
                try {
                    localStorage.removeItem('gobang_saved_games');
                } catch (e) {
                    console.error('清空棋谱记录失败:', e);
                }
                showRecordPanel();
            }
        }

        function getGameModeText(mode) {
            const texts = { pvp: '双人对战', pve: '人机对战', endgame: '残局挑战' };
            return texts[mode] || mode;
        }

        function getDifficultyText(difficulty) {
            const texts = { easy: '简单', medium: '中等', hard: '困难' };
            return texts[difficulty] || difficulty;
        }

        function getResultText(result) {
            const texts = {
                black_win: '黑棋胜',
                white_win: '白棋胜',
                draw: '平局'
            };
            return texts[result] || result;
        }

        // 加载棋谱进行回放
        function loadGameForReplay(game) {
            closeRecordPanel();

            // 保存当前回放的棋谱
            currentReplayGame = game;

            // 重置棋盘
            gameBoard = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                gameBoard[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    gameBoard[i][j] = null;
                }
            }

            moveHistory = [];
            undoCount = 0;
            hintCount = 0;
            isReplaying = true;
            replayIndex = 0;

            // 显示回放控制
            document.getElementById('replayControls').style.display = 'flex';
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('undoBtn').disabled = true;
            document.getElementById('hintBtn').disabled = true;

            // 更新剩余次数显示
            updateRemainingCounts();
            
            drawBoard();
            updateReplayButtons();
        }

        function replayFirst() {
            replayIndex = 0;
            drawReplayState();
            updateReplayButtons();
        }

        function replayPrev() {
            if (replayIndex > 0) {
                replayIndex--;
                drawReplayState();
                updateReplayButtons();
            }
        }

        function replayNext() {
            if (replayIndex < currentReplayGame.moves.length) {
                replayIndex++;
                drawReplayState();
                updateReplayButtons();
            }
        }

        function replayLast() {
            replayIndex = currentReplayGame.moves.length;
            drawReplayState();
            updateReplayButtons();
        }

        function drawReplayState() {
            // 重置棋盘
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    gameBoard[i][j] = null;
                }
            }

            // 应用到replayIndex的所有移动
            for (let i = 0; i < replayIndex; i++) {
                const move = currentReplayGame.moves[i];
                gameBoard[move.row][move.col] = move.color;
            }

            drawBoard();
        }

        function updateReplayButtons() {
            document.getElementById('replayFirst').disabled = replayIndex === 0;
            document.getElementById('replayPrev').disabled = replayIndex === 0;
            document.getElementById('replayNext').disabled = replayIndex === currentReplayGame.moves.length;
            document.getElementById('replayLast').disabled = replayIndex === currentReplayGame.moves.length;
        }

        function exitReplay() {
            isReplaying = false;
            document.getElementById('replayControls').style.display = 'none';
            document.getElementById('pauseBtn').disabled = false;
            // 更新剩余次数显示
            updateRemainingCounts();
            // 直接返回主菜单而不是重新开始游戏
            backToModeSelection();
        }

        function updateStatus() {
            const statusText = currentPlayer === 'black' ? '黑棋落子' : '白棋落子';
            const playerSpan = document.querySelector('.current-turn .player');
            if (playerSpan) {
                playerSpan.className = 'player ' + currentPlayer;
            }
            const currentPlayerEl = document.getElementById('currentPlayer');
            if (currentPlayerEl) {
                currentPlayerEl.textContent = statusText;
            }
        }

        // 落子动画
        function animatePiecePlacement(row, col) {
            const canvas = document.getElementById('board');
            const rect = canvas.getBoundingClientRect();
            const x = rect.left + PADDING + col * CELL_SIZE;
            const y = rect.top + PADDING + row * CELL_SIZE;

            // 创建粒子效果
            createParticles(x, y, gameBoard[row][col]);
        }

        function createParticles(x, y, color) {
            const colors = color === 'black' ?
                ['#333', '#555', '#777', '#999'] :
                ['#fff', '#ddd', '#ccc', '#bbb'];

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = Math.random() * 8 + 4 + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.transform = `translate(${(Math.random() - 0.5) * 100}px, ${(Math.random() - 0.5) * 100}px)`;
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
        }

        canvas.addEventListener('click', function (e) {
            if (isPaused) {
                alert('游戏已暂停，请先继续游戏！');
                return;
            }

            if (gameMode === 'pve' && currentPlayer === 'white') {
                return;
            }

            const { row, col } = getClickPosition(e);

            if (isNearGridCenter(row, col, e)) {
                placePiece(row, col);
            }
        });

        // 鼠标移动事件 - 用于显示落子预览
        canvas.addEventListener('mousemove', function (e) {
            if (gameOver || isPaused || isProcessing) {
                mousePosition = null;
                requestDraw();
                return;
            }

            if (gameMode === 'pve' && currentPlayer === 'white') {
                return;
            }

            const { row, col } = getClickPosition(e);
            if (isValidPosition(row, col) && isNearGridCenter(row, col, e) && !gameBoard[row][col]) {
                mousePosition = { row, col };
                requestDraw();
            } else {
                if (mousePosition) {
                    mousePosition = null;
                    requestDraw();
                }
            }
        });

        // 鼠标离开画布 - 清除预览
        canvas.addEventListener('mouseleave', function () {
            if (mousePosition) {
                mousePosition = null;
                requestDraw();
            }
        });

        // 节流绘制请求
        function requestDraw() {
            if (!pendingDraw) {
                pendingDraw = true;
                animationFrameId = requestAnimationFrame(() => {
                    drawBoard();
                    pendingDraw = false;
                });
            }
        }

        // 切换棋盘主题 - 增强版
        function switchTheme() {
            const themes = Object.keys(BOARD_THEMES);
            const currentIndex = themes.indexOf(currentTheme);
            const nextIndex = (currentIndex + 1) % themes.length;
            currentTheme = themes[nextIndex];

            // 清除缓存
            backgroundCache = null;
            cachedTheme = null;

            const theme = BOARD_THEMES[currentTheme];
            document.body.style.background = theme.bgColor;

            drawBoard();

            // 显示主题名称提示（带动画）
            const themeName = theme.name;
            const toast = document.createElement('div');
            toast.className = 'theme-toast';
            toast.innerHTML = `
                <div class="theme-toast-icon">🎨</div>
                <div class="theme-toast-content">
                    <div class="theme-toast-title">主题切换</div>
                    <div class="theme-toast-text">已切换到${themeName}主题</div>
                </div>
            `;

            if (!document.querySelector('#themeToastStyle')) {
                const style = document.createElement('style');
                style.id = 'themeToastStyle';
                style.textContent = `
                    .theme-toast {
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        background: rgba(255, 255, 255, 0.95);
                        backdrop-filter: blur(10px);
                        padding: 25px 40px;
                        border-radius: 20px;
                        z-index: 10000;
                        display: flex;
                        align-items: center;
                        gap: 20px;
                        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
                        animation: themeToastIn 0.4s ease-out;
                    }
                    .theme-toast-icon {
                        font-size: 3em;
                        animation: iconBounce 1s ease-in-out infinite;
                    }
                    @keyframes iconBounce {
                        0%, 100% { transform: scale(1); }
                        50% { transform: scale(1.1); }
                    }
                    .theme-toast-content {
                        display: flex;
                        flex-direction: column;
                        gap: 5px;
                    }
                    .theme-toast-title {
                        font-size: 1.2em;
                        font-weight: 800;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        background-clip: text;
                    }
                    .theme-toast-text {
                        font-size: 1em;
                        color: #666;
                        font-weight: 500;
                    }
                    @keyframes themeToastIn {
                        0% {
                            opacity: 0;
                            transform: translate(-50%, -50%) scale(0.8);
                        }
                        100% {
                            opacity: 1;
                            transform: translate(-50%, -50%) scale(1);
                        }
                    }
                    @keyframes themeToastOut {
                        0% {
                            opacity: 1;
                            transform: translate(-50%, -50%) scale(1);
                        }
                        100% {
                            opacity: 0;
                            transform: translate(-50%, -50%) scale(0.8);
                        }
                    }
                `;
                document.head.appendChild(style);
            }

            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'themeToastOut 0.4s ease-out forwards';
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }

        // 页面加载时的初始化
        window.addEventListener('load', function () {
            // 加载玩家数据
            loadPlayerData();
            
            // 确保所有弹窗和面板默认隐藏
            const panel = document.getElementById('recordPanel');
            if (panel) {
                panel.style.display = 'none';
            }

            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.classList.remove('show');
            }

            const winMessage = document.getElementById('winMessage');
            if (winMessage) {
                winMessage.classList.remove('show');
            }

            const pauseOverlay = document.getElementById('pauseOverlay');
            if (pauseOverlay) {
                pauseOverlay.classList.remove('show');
            }

            // 确保主游戏区域默认隐藏
            const mainContent = document.getElementById('mainContent');
            if (mainContent) {
                mainContent.classList.add('hidden');
            }

            const difficultySection = document.getElementById('difficultySection');
            if (difficultySection) {
                difficultySection.classList.add('hidden');
            }

            const puzzleSection = document.getElementById('puzzleSection');
            if (puzzleSection) {
                puzzleSection.classList.add('hidden');
            }

            // 默认选中第一个游戏模式
            selectGameMode('pvp');

            // 默认选中简单难度
            selectDifficulty('easy');
        });
        
        // 加载玩家数据
        function loadPlayerData() {
            try {
                const savedData = JSON.parse(localStorage.getItem('gobang_player_data') || '{}');
                playerLevel = savedData.level || 1;
                totalWins = savedData.wins || 0;
                totalLosses = savedData.losses || 0;
                consecutiveWins = savedData.consecutiveWins || 0;
                consecutiveLosses = savedData.consecutiveLosses || 0;
            } catch (e) {
                console.error('加载玩家数据失败:', e);
            }
        }
        
        // 保存玩家数据
        function savePlayerData() {
            try {
                const data = {
                    level: playerLevel,
                    wins: totalWins,
                    losses: totalLosses,
                    consecutiveWins: consecutiveWins,
                    consecutiveLosses: consecutiveLosses
                };
                localStorage.setItem('gobang_player_data', JSON.stringify(data));
            } catch (e) {
                console.error('保存玩家数据失败:', e);
            }
        }
    </script>
</body>

</html>
