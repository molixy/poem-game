<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗笺雅集 - 古代诗词游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Noto Serif SC', 'STKaiti', '华文楷体', serif;
            background: linear-gradient(135deg, #f5f0e6 0%, #e8dcc8 100%);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 119, 101, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(139, 119, 101, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #4a3c2a;
            padding: 10px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部栏 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(139, 119, 101, 0.15);
            margin-bottom: 20px;
            border: 2px solid #d4c4a8;
        }
        
        .game-title {
            font-size: 28px;
            font-weight: 700;
            color: #8b6914;
            text-shadow: 1px 1px 2px rgba(139, 105, 20, 0.3);
            margin-right: 20px;
        }
        
        .header-info {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            font-size: 16px;
        }
        
        .mode-switch {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 8px 20px;
            font-family: inherit;
            font-size: 15px;
            border: 2px solid #d4c4a8;
            background: #f8f3e8;
            color: #4a3c2a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mode-btn:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
        }
        
        .mode-btn.active {
            background: #8b6914;
            color: #f8f3e8;
            border-color: #8b6914;
        }
        
        .score-display {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .score-item {
            display: flex;
            gap: 5px;
        }
        
        .score-label {
            color: #8b7768;
        }
        
        .score-value {
            font-weight: 600;
            color: #8b6914;
        }
        
        .achievements {
            display: flex;
            gap: 10px;
        }
        
        .achievement-badge {
            padding: 5px 15px;
            background: rgba(139, 105, 20, 0.1);
            border: 2px solid rgba(139, 105, 20, 0.2);
            border-radius: 20px;
            font-size: 14px;
            opacity: 0.3;
            transition: all 0.5s ease;
            cursor: default;
        }
        
        .achievement-badge.unlocked {
            opacity: 1;
            background: rgba(139, 105, 20, 0.2);
            border-color: #8b6914;
            animation: badgePop 0.5s ease;
        }
        
        .new-achievement {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-color: #daa520;
            animation: newAchievementGlow 1s ease;
        }
        
        @keyframes newAchievementGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        }
        
        /* 排行榜按钮 */
        .leaderboard-btn {
            padding: 8px 15px;
            font-family: inherit;
            font-size: 14px;
            border: 2px solid #d4c4a8;
            background: #f8f3e8;
            color: #4a3c2a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .leaderboard-btn:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
        }
        
        /* 知识库按钮 */
        .library-btn {
            padding: 8px 15px;
            font-family: inherit;
            font-size: 14px;
            border: 2px solid #d4c4a8;
            background: #f8f3e8;
            color: #4a3c2a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .library-btn:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
        }
        
        /* 主体内容 */
        .main-content {
            min-height: 400px;
            position: relative;
        }
        
        /* 填空模式 */
        .fill-mode {
            display: block;
        }
        
        .difficulty-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .difficulty-btn {
            padding: 10px 25px;
            font-family: inherit;
            font-size: 16px;
            border: 2px solid #d4c4a8;
            background: #f8f3e8;
            color: #4a3c2a;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .difficulty-btn:hover {
            background: #e8dcc8;
            transform: translateY(-2px);
        }
        
        .difficulty-btn.active {
            background: #8b6914;
            color: #f8f3e8;
            border-color: #8b6914;
        }
        
        .poem-display {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 30px;
            border: 3px solid #d4c4a8;
            transition: all 0.3s ease;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .poem-display.ink-spread {
            animation: inkSpread 0.8s ease;
        }
        
        .poem-display.prompt {
            font-size: 20px;
            color: #8b7768;
        }
        
        @keyframes inkSpread {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 10px;
        }
        
        .option-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #d4c4a8;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        .option-card:hover:not(.correct):not(.wrong):not(.disabled) {
            background: #f8f3e8;
            border-color: #8b6914;
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(139, 119, 101, 0.2);
        }
        
        .option-card.correct {
            background: #d4edda;
            border-color: #28a745;
            animation: correctAnswer 0.6s ease;
        }
        
        .option-card.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            animation: shake 0.5s ease;
        }
        
        .option-card.disabled {
            pointer-events: none;
            opacity: 0.6;
        }
        
        .option-card.highlight {
            background: #fff3cd;
            border-color: #ffc107;
            animation: pulse 0.5s ease infinite;
        }
        
        /* 配对模式 */
        .match-mode {
            display: none;
        }
        
        .match-mode.active {
            display: block;
        }
        
        .match-area {
            position: relative;
            display: flex;
            gap: 30px;
            justify-content: center;
            padding: 20px;
        }
        
        #matchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .match-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2;
        }
        
        .column-title {
            text-align: center;
            font-weight: 600;
            color: #8b6914;
            padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
        }
        
        .match-item {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #d4c4a8;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        
        .match-item:hover:not(.matched) {
            background: #f8f3e8;
            border-color: #8b6914;
            transform: translateY(-2px);
        }
        
        .match-item.selected {
            background: #fff3cd;
            border-color: #ffc107;
            animation: pulse 0.5s ease infinite;
        }
        
        .match-item.matched {
            background: #d4edda;
            border-color: #28a745;
            opacity: 0.6;
            pointer-events: none;
        }
        
        .match-item.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            animation: shake 0.5s ease;
        }
        
        /* 飞花令模式 */
        .feihua-mode {
            display: none;
        }
        
        .feihua-mode.active {
            display: block;
        }
        
        .feihua-keyword {
            text-align: center;
            font-size: 48px;
            font-weight: 700;
            color: #8b6914;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 243, 232, 0.9));
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid #d4c4a8;
            animation: fadeIn 0.6s ease;
        }
        
        .feihua-poem {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #d4c4a8;
        }
        
        /* 问答模式 */
        .quiz-mode {
            display: none;
        }
        
        .quiz-mode.active {
            display: block;
        }
        
        .quiz-question {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 30px;
            border: 3px solid #d4c4a8;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 限时挑战模式 */
        .timeattack-mode {
            display: none;
        }
        
        .timeattack-mode.active {
            display: block;
        }
        
        .timer-display {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid #d4c4a8;
        }
        
        .timer-display.warning {
            color: #dc3545;
            animation: pulse 0.5s ease infinite;
        }
        
        /* 底部栏 */
        .footer {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(139, 119, 101, 0.15);
            border: 2px solid #d4c4a8;
        }
        
        .footer-info {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .info-item {
            display: flex;
            gap: 5px;
            font-size: 16px;
        }
        
        .info-label {
            color: #8b7768;
        }
        
        .info-value {
            font-weight: 600;
            color: #8b6914;
        }
        
        .footer-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .footer-btn {
            padding: 10px 25px;
            font-family: inherit;
            font-size: 16px;
            border: 2px solid #d4c4a8;
            background: #f8f3e8;
            color: #4a3c2a;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .footer-btn:hover:not(:disabled) {
            background: #e8dcc8;
            transform: translateY(-2px);
        }
        
        .footer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 连对提示 */
        .streak-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #8b6914;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }
        
        .streak-display.show {
            animation: slideDown 1.5s ease forwards;
        }
        
        @keyframes slideDown {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(-30px); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-30px); }
        }
        
        /* 游戏结束弹窗 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .game-over-modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #fff 0%, #f8f3e8 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #d4c4a8;
            max-width: 400px;
            width: 90%;
            animation: modalIn 0.4s ease;
        }
        
        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: #8b6914;
            margin-bottom: 25px;
        }
        
        .modal-score {
            font-size: 22px;
            margin-bottom: 15px;
            color: #4a3c2a;
        }
        
        .modal-record {
            font-size: 18px;
            margin-bottom: 25px;
            color: #8b7768;
        }
        
        .modal-btn {
            padding: 12px 30px;
            font-family: inherit;
            font-size: 18px;
            background: #8b6914;
            color: #f8f3e8;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn:hover {
            background: #6b5110;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 105, 20, 0.3);
        }
        
        /* 排行榜弹窗 */
        .leaderboard-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .leaderboard-modal.show {
            display: flex;
        }
        
        .leaderboard-content {
            background: linear-gradient(135deg, #fff 0%, #f8f3e8 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #d4c4a8;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .leaderboard-title {
            font-size: 26px;
            font-weight: 700;
            color: #8b6914;
            margin-bottom: 25px;
        }
        
        .leaderboard-list {
            margin-bottom: 20px;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #d4c4a8;
        }
        
        .leaderboard-item:first-child {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-color: #daa520;
            font-weight: 600;
        }
        
        .leaderboard-rank {
            font-size: 18px;
            color: #8b6914;
            min-width: 40px;
        }
        
        .leaderboard-name {
            font-size: 16px;
            color: #4a3c2a;
            flex: 1;
            text-align: left;
        }
        
        .leaderboard-score {
            font-size: 18px;
            font-weight: 600;
            color: #8b6914;
        }
        
        /* 知识库弹窗 */
        .library-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .library-modal.show {
            display: flex;
        }
        
        .library-content {
            background: linear-gradient(135deg, #fff 0%, #f8f3e8 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 3px solid #d4c4a8;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .library-title {
            font-size: 26px;
            font-weight: 700;
            color: #8b6914;
            margin-bottom: 20px;
        }
        
        .library-search {
            width: 100%;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 16px;
            border: 2px solid #d4c4a8;
            border-radius: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .library-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .library-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #d4c4a8;
            text-align: left;
        }
        
        .library-poem {
            font-size: 18px;
            font-weight: 600;
            color: #4a3c2a;
            margin-bottom: 8px;
        }
        
        .library-author {
            font-size: 14px;
            color: #8b7768;
        }
        
        .close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-family: inherit;
            font-size: 16px;
            background: #8b6914;
            color: #f8f3e8;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: #6b5110;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes correctAnswer {
            0% { background-color: #d4edda; transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { background-color: #d4edda; transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes comboAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-50px); }
        }
        
        @keyframes perfectAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) rotate(-10deg); }
            30% { opacity: 1; transform: translate(-50%, -50%) rotate(5deg) scale(1.1); }
            60% { transform: translate(-50%, -50%) rotate(-5deg) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) rotate(0deg) scale(0.8); }
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -150%); }
        }
        
        @keyframes badgePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* 浮动文字特效 */
        .floating-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 700;
            pointer-events: none;
            z-index: 1000;
            animation: floatUp 1s ease forwards;
        }
        
        /* 粒子特效容器 */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-title {
                font-size: 22px;
                margin-right: 10px;
            }
            
            .mode-switch {
                gap: 8px;
            }
            
            .mode-btn {
                padding: 6px 15px;
                font-size: 14px;
            }
            
            .header {
                padding: 10px 15px;
            }
            
            .poem-display,
            .quiz-question {
                font-size: 20px;
                padding: 20px;
            }
            
            .feihua-keyword {
                font-size: 36px;
                padding: 20px;
            }
            
            .feihua-poem {
                font-size: 18px;
            }
            
            .match-area {
                flex-direction: column;

                                osc.stop(mNow + i * 0.1 + 0.4);
                            });
                            return;
                    }
                } catch (e) {
                    console.log('播放音效失败:', e);
                }
            },

            playErrorSound() {
                this.playSound('wrong');
            }
        };

        // ==================== 互动管理 ====================
        const InteractionManager = {

                    element.classList.add('correct');

                    element.classList.add('wrong');
                }

            calculateTimeBonus(startTime, maxTime) {
                const elapsed = (Date.now() - startTime) / 1000;
                if (elapsed <= maxTime * 0.3) return 3;
                if (elapsed <= maxTime * 0.5) return 2;
                if (elapsed <= maxTime * 0.7) return 1;
                return 0;

            showComboBonus() {

            showDifficultyProgress() {

                if (difficulty === 'easy' && score >= 25) {

                } else if (difficulty === 'medium' && score >= 55) {
                    this.showFloatingText('即将升到困难!', '#dc3545');
                }
            },

            createParticles(x, y, count = 20) {
                const container = document.getElementById('particlesContainer');
                const colors = ['#ffd700', '#ffed4e', '#daa520', '#fff', '#8b6914'];
                
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 50 + Math.random() * 100;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity;
                    
                    container.appendChild(particle);
                    
                    let posX = x;
                    let posY = y;
                    let opacity = 1;
                    
                    const animateParticle = () => {
                        posX += vx * 0.016;
                        posY += vy * 0.016 + 2;
                        opacity -= 0.016;
                        
                        particle.style.left = posX + 'px';
                        particle.style.top = posY + 'px';
                        particle.style.opacity = opacity;
                        
                        if (opacity > 0) {
                            requestAnimationFrame(animateParticle);
                        } else {
                            particle.remove();
                        }
                    };
                    
                    requestAnimationFrame(animateParticle);
                }
            }
        };

        // ==================== Canvas管理 ====================
        const CanvasManager = {
            canvas: null,
            ctx: null,

            init() {
                this.canvas = document.getElementById('matchCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
            },

            resize() {
                const matchArea = document.querySelector('.match-area');
                if (matchArea) {
                    this.canvas.width = matchArea.offsetWidth;
                    this.canvas.height = matchArea.offsetHeight;
                }
            },

            drawLine(leftItem, rightItem) {
                const leftRect = leftItem.getBoundingClientRect();
                const rightRect = rightItem.getBoundingClientRect();
                const canvasRect = this.canvas.getBoundingClientRect();

                const x1 = leftRect.right - canvasRect.left;
                const y1 = leftRect.top + leftRect.height / 2 - canvasRect.top;
                const x2 = rightRect.left - canvasRect.left;
                const y2 = rightRect.top + rightRect.height / 2 - canvasRect.top;

                this.ctx.beginPath();
                this.ctx.moveTo(x1, y1);
                this.ctx.bezierCurveTo(
                    x1 + 50, y1,
                    x2 - 50, y2,
                    x2, y2
                );
                this.ctx.strokeStyle = '#28a745';
                this.ctx.lineWidth = 3;
                this.ctx.stroke();

                // 粒子特效
                const centerX = (x1 + x2) / 2;
                const centerY = (y1 + y2) / 2;
                InteractionManager.createParticles(
                    centerX + canvasRect.left,
                    centerY + canvasRect.top,
                    15
                );

                setTimeout(() => {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }, 1000);
            }
        };

        // ==================== 公共函数 ====================
        function generateOptions(correctAnswer, totalOptions = 4, filterFn = null) {
            const options = [null, null, null, null];
            const correctIndex = Math.floor(Math.random() * totalOptions);
            options[correctIndex] = correctAnswer;

            let attempts = 0;
            const maxAttempts = 200;

            for (let i = 0; i < totalOptions; i++) {
                if (options[i] === null && attempts < maxAttempts) {
                    let randomItem;
                    let invalid = true;
                    let itemAttempts = 0;

                    do {
                        randomItem = DATA.poems[Math.floor(Math.random() * DATA.poems.length)];
                        itemAttempts++;
                        const value = filterFn ? filterFn(randomItem) : randomItem.down;
                        invalid = 
                            options.includes(value) ||
                            (correctAnswer && value === correctAnswer);
                    } while (invalid && itemAttempts < maxAttempts);

                    if (!invalid && filterFn) {
                        options[i] = filterFn(randomItem);
                    } else if (!invalid) {
                        options[i] = randomItem.down;
                    }
                }
            }

            return options;
        }

        // ==================== 公共处理 ====================
        const CommonHandlers = {
            handleAnswer(isCorrect, correctAnswer, mode) {
                const global = GameStates.global;

                if (isCorrect) {
                    global.score += 10;
                    global.streak++;
                    global.totalCorrect++;
                    global.comboCount++;
                    
                    if (global.streak > global.maxStreak) {
                        global.maxStreak = global.streak;
                        localStorage.setItem('poemMaxStreak', global.maxStreak);
                    }

                    // 更新模式计数
                    if (global.modeCounts[mode] !== undefined) {
                        global.modeCounts[mode]++;
                        localStorage.setItem('poemModeCounts', JSON.stringify(global.modeCounts));
                    }
                    localStorage.setItem('poemTotalCorrect', global.totalCorrect);

                    // 完美答题（快速且正确）
                    const timeBonus = InteractionManager.calculateTimeBonus(
                        GameStates.fill.questionStartTime || Date.now(),
                        8
                    );
                    if (timeBonus > 0) {
                        global.perfectStreak++;
                        global.score += timeBonus;
                        if (timeBonus === 3) {
                            SoundManager.playSound('perfect');
                            InteractionManager.showFloatingText(`完美! +${timeBonus}分`, '#ffd700');
                        }
                    }

                    // 连击奖励
                    if (global.streak >= 3) {
                        const streakBonus = Math.min(global.streak * 2, 10);
                        global.score += streakBonus;
                        InteractionManager.showComboBonus();
                        UIManager.showStreakReward(global.streak);
                    }

                    UIManager.updateScore();
                    UIManager.updateStreak();
                    UIManager.updateAchievements();

                    // 延迟生成下一题
                    setTimeout(() => {
                        switch(mode) {
                            case 'fill':
                                if (global.chances > 0) GameModes.fill.generateQuestion();
                                break;
                            case 'feihua':
                                if (global.chances > 0) GameModes.feihua.generateQuestion();
                                break;
                            case 'quiz':
                                if (global.chances > 0) GameModes.quiz.generateQuestion();
                                break;
                            case 'timeattack':
                                if (global.timeattack.timeRemaining > 0) GameModes.timeattack.generateQuestion();
                                break;
                        }
                    }, 1200);

                } else {
                    global.chances--;
                    global.streak = 0;
                    global.comboCount = 0;
                    global.perfectStreak = 0;
                    
                    UIManager.updateChances();
                    UIManager.updateStreak();

                    if (global.chances <= 0) {
                        setTimeout(() => {
                            UIManager.showGameOver();
                        }, 1500);
                    } else {
                        // 延迟生成下一题
                        setTimeout(() => {
                            switch(mode) {
                                case 'fill':
                                    GameModes.fill.generateQuestion();
                                    break;
                                case 'feihua':
                                    GameModes.feihua.generateQuestion();
                                    break;
                                case 'quiz':
                                    GameModes.quiz.generateQuestion();
                                    break;
                                case 'timeattack':
                                    if (global.timeattack.timeRemaining > 0) GameModes.timeattack.generateQuestion();
                                    break;
                            }
                        }, 1800);
                    }
                }
            }
        };

        // ==================== 游戏模式逻辑 ====================
        const GameModes = {
            // 填空模式
            fill: {
                generateQuestion() {
                    const state = GameStates.fill;
                    state.isProcessing = false;

                    if (!GameStates.global.difficulty) {
                        showDifficultyPrompt();
                        return;
                    }

                    const score = GameStates.global.score;
                    let difficultyLevel = GameStates.global.difficulty;

                    // 动态难度调整
                    if (score >= 30 && difficultyLevel === 'easy') {
                        difficultyLevel = 'medium';
                        GameStates.global.difficulty = 'medium';
                        InteractionManager.showFloatingText('难度提升至中等!', '#ffc107');
                        // 更新按钮状态
                        document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
                        document.querySelector('.difficulty-btn.medium').classList.add('active');
                    } else if (score >= 60 && difficultyLevel === 'medium') {
                        difficultyLevel = 'hard';
                        GameStates.global.difficulty = 'hard';
                        InteractionManager.showFloatingText('难度提升至困难!', '#dc3545');
                        // 更新按钮状态
                        document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
                        document.querySelector('.difficulty-btn.hard').classList.add('active');
                    }

                    let availablePoems;
                    switch(difficultyLevel) {
                        case 'easy':
                            availablePoems = DATA.poems.slice(0, 30);
                            break;
                        case 'medium':
                            availablePoems = DATA.poems.slice(0, 80);
                            break;
                        case 'hard':
                        default:
                            availablePoems = DATA.poems;
                    }

                    const unusedPoems = availablePoems.filter(poem => 
                        !state.usedPoems.includes(poem)
                    );

                    if (unusedPoems.length === 0) {
                        state.usedPoems = [];
                        console.log('填空模式所有题目已使用完，重置题库');
                    }

                    const finalPool = unusedPoems.length > 0 ? unusedPoems : availablePoems;
                    state.currentPoem = finalPool[Math.floor(Math.random() * finalPool.length)];
                    state.usedPoems.push(state.currentPoem);

                    state.questionStartTime = Date.now();

                    const display = document.getElementById('poemDisplay');
                    display.textContent = state.currentPoem.up;
                    display.classList.remove('ink-spread', 'prompt');
                    void display.offsetWidth;
                    display.classList.add('ink-spread');

                    const correctIndex = Math.floor(Math.random() * 4);
                    const options = [null, null, null, null];
                    options[correctIndex] = state.currentPoem.down;

                    let maxAttempts = 150;
                    for (let i = 0; i < 4; i++) {
                        if (options[i] === null && maxAttempts > 0) {
                            let attempts = 0;
                            let randomPoem;
                            do {
                                randomPoem = availablePoems[Math.floor(Math.random() * availablePoems.length)];
                                attempts++;
                            } while ((randomPoem.down === state.currentPoem.down ||
                                     Array.from(options).includes(randomPoem.down) ||
                                     randomPoem.up === state.currentPoem.up) && attempts < maxAttempts);

                            if (attempts < maxAttempts) {
                                options[i] = randomPoem.down;
                            } else {
                                const remaining = DATA.poems.filter(p =>
                                    !Array.from(options).includes(p.down) &&
                                    p.down !== state.currentPoem.down &&
                                    p.up !== state.currentPoem.up
                                );
                                if (remaining.length > 0) {
                                    options[i] = remaining[0].down;
                                }
                            }
                        }
                    }

                    const optionsGrid = document.getElementById('optionsGrid');
                    optionsGrid.innerHTML = '';
                    options.forEach((option, index) => {
                        const card = this.createOptionCard(option, index, 'fill', this.checkAnswer.bind(this));
                        optionsGrid.appendChild(card);
                    });

                    InteractionManager.showDifficultyProgress();
                    this.updateHintButton();
                    UIManager.updateChances();
                },

                createOptionCard(text, index, mode, clickHandler) {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.textContent = text;
                    card.dataset.index = index;

                    // 移动端触摸优化
                    card.addEventListener('touchstart', (e) => {
                        // 阻止默认行为以提供更好的触摸反馈
                        e.preventDefault();
                    }, { passive: true });

                    card.addEventListener('click', (e) => {
                        e.preventDefault();
                        clickHandler(card, index);
                    });

                    return card;
                },

                checkAnswer(card, index) {
                    const state = GameStates.fill;
                    if (state.isProcessing) return;
                    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                    state.isProcessing = true;
                    const selectedOption = card.textContent;
                    const isCorrect = selectedOption === state.currentPoem.down;

                    if (isCorrect) {
                        card.classList.add('correct');
                        SoundManager.playSound('correct');
                    } else {
                        card.classList.add('wrong');
                        SoundManager.playSound('wrong');
                    }

                    CommonHandlers.handleAnswer(isCorrect, state.currentPoem.down, 'fill');
                    state.isProcessing = false;
                },

                useHint() {
                    const state = GameStates.fill;
                    const global = GameStates.global;

                    if (global.hintsUsed >= global.hintLimit) {
                        InteractionManager.showFloatingText('提示次数已用完!', '#dc3545');
                        return;
                    }

                    if (global.score < 5) {
                        InteractionManager.showFloatingText('需要5分以上才能使用提示!', '#dc3545');
                        return;
                    }

                    if (state.isProcessing) return;

                    global.hintsUsed++;
                    global.score = Math.max(0, global.score - 5);
                    UIManager.updateScore();

                    SoundManager.playSound('hint');

                    const options = document.querySelectorAll('#optionsGrid .option-card');
                    options.forEach(card => {
                        card.classList.remove('highlight');
                        if (card.textContent === state.currentPoem.down) {
                            card.classList.add('highlight');
                            setTimeout(() => {
                                card.classList.remove('highlight');
                            }, 3000);
                        }
                    });

                    this.updateHintButton();
                },

                updateHintButton() {
                    const hintBtn = document.getElementById('hintBtn');
                    const remaining = GameStates.global.hintLimit - GameStates.global.hintsUsed;
                    hintBtn.textContent = `💡 提示 (${remaining}/${GameStates.global.hintLimit})`;
                    hintBtn.disabled = remaining <= 0;
                    hintBtn.style.opacity = remaining <= 0 ? '0.5' : '1';
                }
            },

            // 配对模式
            match: {
                init() {
                    const state = GameStates.match;

                    // 安全清除重置定时器
                    if (state.resetTimer) {
                        clearTimeout(state.resetTimer);
                        state.resetTimer = null;
                    }

                    // 根据分数动态增加配对数量
                    const score = GameStates.global.score;
                    if (score < 20) {
                        state.total = 3;
                    } else if (score < 50) {
                        state.total = 4;
                    } else if (score < 80) {
                        state.total = 5;
                    } else {
                        state.total = 6;
                    }

                    state.matched = 0;
                    state.selectedLeft = null;
                    state.selectedRight = null;
                    state.isProcessing = false;
                    state.startTime = Date.now();
                    state.comboMultiplier = 1;

                    // 选择诗歌
                    const unusedPoems = DATA.poems.filter(p => !state.usedPoems.includes(p));
                    if (unusedPoems.length < state.total) {
                        state.usedPoems = [];
                    }

                    const pool = unusedPoems.length >= state.total ? unusedPoems : DATA.poems;
                    state.poems = [];
                    const indices = new Set();
                    while (indices.size < state.total) {
                        indices.add(Math.floor(Math.random() * pool.length));
                    }
                    indices.forEach(i => {
                        state.poems.push(pool[i]);
                        state.usedPoems.push(pool[i]);
                    });

                    this.render();
                    UIManager.updateMatchProgress();
                },

                render() {
                    const state = GameStates.match;
                    const leftColumn = document.getElementById('leftColumn');
                    const rightColumn = document.getElementById('rightColumn');

                    // 保留标题
                    const leftTitle = leftColumn.querySelector('.column-title');
                    const rightTitle = rightColumn.querySelector('.column-title');
                    leftColumn.innerHTML = '';
                    rightColumn.innerHTML = '';
                    leftColumn.appendChild(leftTitle);
                    rightColumn.appendChild(rightTitle);

                    // 左侧：诗句上句
                    const shuffledLeft = [...state.poems].sort(() => Math.random() - 0.5);
                    shuffledLeft.forEach((poem, index) => {
                        const item = document.createElement('div');
                        item.className = 'match-item';
                        item.textContent = poem.up;
                        item.dataset.index = index;
                        item.dataset.type = 'left';

                        item.addEventListener('touchstart', (e) => e.preventDefault(), { passive: true });
                        item.addEventListener('click', () => this.selectItem(item, 'left'));

                        leftColumn.appendChild(item);
                    });

                    // 右侧：作者和下句混合
                    const rightOptions = [];
                    state.poems.forEach((poem, index) => {
                        rightOptions.push({
                            text: index % 2 === 0 ? `${poem.author}` : poem.down,
                            poem: poem,
                            isAnswer: true,
                            originalIndex: index
                        });
                    });

                    // 添加干扰项
                    const usedTexts = rightOptions.map(o => o.text);
                    while (rightOptions.length < state.total * 2) {
                        const randomPoem = DATA.poems[Math.floor(Math.random() * DATA.poems.length)];
                        const text = Math.random() > 0.5 ? randomPoem.author : randomPoem.down;
                        if (!usedTexts.includes(text)) {
                            rightOptions.push({
                                text: text,
                                poem: randomPoem,
                                isAnswer: false,
                                originalIndex: -1
                            });
                            usedTexts.push(text);
                        }
                    }

                    const shuffledRight = rightOptions.sort(() => Math.random() - 0.5);
                    shuffledRight.forEach((option, index) => {
                        const item = document.createElement('div');
                        item.className = 'match-item';
                        item.textContent = option.text;
                        item.dataset.index = index;
                        item.dataset.type = 'right';
                        item.dataset.poemIndex = option.originalIndex;

                        item.addEventListener('touchstart', (e) => e.preventDefault(), { passive: true });
                        item.addEventListener('click', () => this.selectItem(item, 'right'));

                        rightColumn.appendChild(item);
                    });
                },

                selectItem(item, type) {
                    const state = GameStates.match;
                    if (state.isProcessing) return;
                    if (item.classList.contains('matched')) return;

                    // 清除同列其他选中
                    const column = type === 'left' ? 'leftColumn' : 'rightColumn';
                    document.querySelectorAll(`#${column} .match-item`).forEach(i => {
                        if (i !== item) i.classList.remove('selected');
                    });

                    item.classList.toggle('selected');

                    if (type === 'left') {
                        state.selectedLeft = item;
                    } else {
                        state.selectedRight = item;
                    }

                    // 检查是否可以匹配
                    if (state.selectedLeft && state.selectedRight) {
                        this.checkMatch();
                    }
                },

                checkMatch() {
                    const state = GameStates.match;
                    state.isProcessing = true;

                    const leftPoem = state.poems[state.selectedLeft.dataset.index];
                    const rightPoemIndex = parseInt(state.selectedRight.dataset.poemIndex);

                    const isMatch = rightPoemIndex !== -1 && 
                                   state.poems[rightPoemIndex] === leftPoem;

                    if (isMatch) {
                        state.selectedLeft.classList.remove('selected');
                        state.selectedRight.classList.remove('selected');
                        state.selectedLeft.classList.add('matched');
                        state.selectedRight.classList.add('matched');

                        CanvasManager.drawLine(state.selectedLeft, state.selectedRight);
                        SoundManager.playSound('matchSuccess');

                        state.matched++;
                        state.comboMultiplier++;

                        const baseScore = 5;
                        const comboBonus = Math.min((state.comboMultiplier - 1) * 2, 10);
                        const timeBonus = Math.max(0, 5 - Math.floor((Date.now() - state.startTime) / 10000));
                        const totalScore = baseScore + comboBonus + timeBonus;

                        GameStates.global.score += totalScore;
                        UIManager.updateScore();
                        UIManager.updateMatchProgress();

                        if (state.matched >= state.total) {
                            setTimeout(() => {
                                this.init();
                            }, 1500);
                        }
                    } else {
                        state.selectedLeft.classList.add('wrong');
                        state.selectedRight.classList.add('wrong');
                        SoundManager.playSound('wrong');

                        state.comboMultiplier = 1;

                        setTimeout(() => {
                            state.selectedLeft.classList.remove('wrong', 'selected');
                            state.selectedRight.classList.remove('wrong', 'selected');
                            state.selectedLeft = null;
                            state.selectedRight = null;
                            state.isProcessing = false;
                        }, 1000);
                    }

                    state.selectedLeft = null;
                    state.selectedRight = null;
                    state.isProcessing = false;
                }
            },

            // 飞花令模式
            feihua: {
                generateQuestion(retryCount = 0) {
                    const state = GameStates.feihua;

                    if (retryCount >= 3) {
                        console.warn('飞花令题目生成重试次数已达上限，使用默认题目');
                        state.keyword = '春';
                        state.currentPoem = { up: "春江潮水连海平", down: "海上明月共潮生", author: "张若虚", dynasty: "唐" };
                        state.isProcessing = false;
                        document.getElementById('feihuaKeyword').textContent = state.keyword;
                        document.getElementById('feihuaPoem').textContent = state.currentPoem.down;

                        const correctAnswer = state.currentPoem.up;
                        const correctIndex = Math.floor(Math.random() * 4);
                        const options = [null, null, null, null];
                        options[correctIndex] = correctAnswer;

                        const remaining = DATA.poems.filter(p =>
                            p !== state.currentPoem &&
                            !options.includes(p.up) &&
                            !options.includes(p.down)
                        );
                        for (let i = 0; i < 4; i++) {
                            if (options[i] === null && remaining.length > 0) {
                                const idx = Math.floor(Math.random() * remaining.length);
                                options[i] = remaining[idx].up;
                                remaining.splice(idx, 1);
                            }
                        }

                        const optionsGrid = document.getElementById('feihuaOptions');
                        optionsGrid.innerHTML = '';
                        options.forEach((option, index) => {
                            const card = GameModes.fill.createOptionCard(option, index, 'feihua', this.checkAnswer.bind(this));
                            optionsGrid.appendChild(card);
                        });

                        UIManager.updateChances();
                        return;
                    } else {
                        state.keyword = DATA.keywords[Math.floor(Math.random() * DATA.keywords.length)];
                    }

                    state.isProcessing = false;
                    state.retryCount = retryCount;
                    document.getElementById('feihuaKeyword').textContent = state.keyword;

                    const matchingPoems = DATA.poems.filter(poem =>
                        poem.up.includes(state.keyword) || poem.down.includes(state.keyword)
                    );

                    const unusedMatching = matchingPoems.filter(poem =>
                        !state.usedPoems.includes(poem)
                    );

                    if (unusedMatching.length === 0 && state.usedPoems.length > 0) {
                        state.usedPoems = [];
                        console.log('飞花令所有题目已使用完，重置题库');
                    }

                    if (matchingPoems.length === 0) {
                        this.generateQuestion(retryCount + 1);
                        return;
                    }

                    const finalPool = unusedMatching.length > 0 ? unusedMatching : matchingPoems;
                    state.currentPoem = finalPool[Math.floor(Math.random() * finalPool.length)];
                    state.usedPoems.push(state.currentPoem);

                    if (state.currentPoem.up.includes(state.keyword)) {
                        document.getElementById('feihuaPoem').textContent = state.currentPoem.down;
                    } else {
                        document.getElementById('feihuaPoem').textContent = state.currentPoem.up;
                    }

                    const correctAnswer = state.currentPoem.up.includes(state.keyword)
                        ? state.currentPoem.up
                        : state.currentPoem.down;

                    const correctIndex = Math.floor(Math.random() * 4);
                    const options = [null, null, null, null];
                    options[correctIndex] = correctAnswer;

                    let maxAttempts = 100;
                    for (let i = 0; i < 4; i++) {
                        if (options[i] === null && maxAttempts > 0) {
                            let attempts = 0;
                            let randomPoem;
                            let isInvalid = true;
                            do {
                                randomPoem = DATA.poems[Math.floor(Math.random() * DATA.poems.length)];
                                attempts++;
                                const hasKeyword = randomPoem.up.includes(state.keyword) || randomPoem.down.includes(state.keyword);
                                const isDuplicate = Array.from(options).includes(randomPoem.up) || Array.from(options).includes(randomPoem.down);
                                const isCurrent = randomPoem === state.currentPoem;
                                isInvalid = !hasKeyword || isDuplicate || isCurrent;
                            } while (isInvalid && attempts < maxAttempts);

                            const answer = randomPoem.up.includes(state.keyword) 
                                ? randomPoem.up 
                                : randomPoem.down;

                            if (attempts < maxAttempts && !Array.from(options).includes(answer)) {
                                options[i] = answer;
                            } else {
                                const remaining = DATA.poems.filter(p => 
                                    (p.up.includes(state.keyword) || p.down.includes(state.keyword)) &&
                                    p !== state.currentPoem &&
                                    !Array.from(options).includes(p.up) &&
                                    !Array.from(options).includes(p.down)
                                );
                                if (remaining.length > 0) {
                                    const answer = remaining[0].up.includes(state.keyword) 
                                        ? remaining[0].up 
                                        : remaining[0].down;
                                    options[i] = answer;
                                }
                            }
                        }
                    }

                    const optionsGrid = document.getElementById('feihuaOptions');
                    optionsGrid.innerHTML = '';
                    options.forEach((option, index) => {
                        const card = GameModes.fill.createOptionCard(option, index, 'feihua', this.checkAnswer.bind(this));
                        optionsGrid.appendChild(card);
                    });

                    UIManager.updateChances();
                },

                checkAnswer(card, index) {
                    const state = GameStates.feihua;
                    if (state.isProcessing) return;
                    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                    state.isProcessing = true;
                    const options = document.querySelectorAll('#feihuaOptions .option-card');
                    const selectedOption = options[index].textContent;

                    const correctAnswer = state.currentPoem.up.includes(state.keyword)
                        ? state.currentPoem.up
                        : state.currentPoem.down;
                    const isCorrect = selectedOption === correctAnswer;

                    if (isCorrect) {
                        card.classList.add('correct');
                        SoundManager.playSound('correct');
                    } else {
                        card.classList.add('wrong');
                        SoundManager.playSound('wrong');
                    }

                    CommonHandlers.handleAnswer(isCorrect, correctAnswer, 'feihua');
                    state.isProcessing = false;
                }
            },

            // 问答模式
            quiz: {
                generateQuestion() {
                    const state = GameStates.quiz;
                    state.isProcessing = false;

                    const unusedQuestions = DATA.quizzes.filter(q =>
                        !state.usedQuestions.includes(q)
                    );

                    if (unusedQuestions.length === 0) {
                        state.usedQuestions = [];
                        console.log('问答模式所有题目已使用完，重置题库');
                    }

                    const finalPool = unusedQuestions.length > 0 ? unusedQuestions : DATA.quizzes;
                    state.currentQuestion = finalPool[Math.floor(Math.random() * finalPool.length)];
                    state.usedQuestions.push(state.currentQuestion);

                    document.getElementById('quizQuestion').textContent = state.currentQuestion.question;

                    const shuffledOptions = [...state.currentQuestion.options].sort(() => Math.random() - 0.5);
                    state.options = shuffledOptions;

                    const optionsGrid = document.getElementById('quizOptions');
                    optionsGrid.innerHTML = '';
                    shuffledOptions.forEach((option, index) => {
                        const card = GameModes.fill.createOptionCard(option, index, 'quiz', this.checkAnswer.bind(this));
                        optionsGrid.appendChild(card);
                    });

                    UIManager.updateChances();
                },

                checkAnswer(card, index) {
                    const state = GameStates.quiz;
                    if (state.isProcessing) return;
                    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                    state.isProcessing = true;
                    const selectedOption = state.options[index];
                    const isCorrect = selectedOption === state.currentQuestion.answer;

                    if (isCorrect) {
                        card.classList.add('correct');
                        SoundManager.playSound('correct');
                    } else {
                        card.classList.add('wrong');
                        SoundManager.playSound('wrong');
                    }

                    CommonHandlers.handleAnswer(isCorrect, state.currentQuestion.answer, 'quiz');
                    state.isProcessing = false;
                }
            },

            // 限时挑战模式
            timeattack: {
                timerInterval: null,

                init() {
                    const state = GameStates.timeattack;
                    state.timeRemaining = 60;
                    state.usedPoems = [];

                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                    }

                    this.timerInterval = setInterval(() => {
                        state.timeRemaining -= 0.1;
                        UIManager.updateTimer();

                        if (state.timeRemaining <= 0) {
                            state.timeRemaining = 0;
                            UIManager.updateTimer();
                            clearInterval(this.timerInterval);
                            UIManager.showGameOver();
                        }
                    }, 100);

                    this.generateQuestion();
                },

                generateQuestion() {
                    const state = GameStates.timeattack;
                    state.isProcessing = false;

                    const unusedPoems = DATA.poems.filter(p => !state.usedPoems.includes(p));

                    if (unusedPoems.length === 0) {
                        state.usedPoems = [];
                        console.log('限时模式所有题目已使用完，重置题库');
                    }

                    const finalPool = unusedPoems.length > 0 ? unusedPoems : DATA.poems;
                    state.currentPoem = finalPool[Math.floor(Math.random() * finalPool.length)];
                    state.usedPoems.push(state.currentPoem);

                    document.getElementById('timeattackQuestion').textContent = state.currentPoem.up;

                    const correctIndex = Math.floor(Math.random() * 4);
                    const options = [null, null, null, null];
                    options[correctIndex] = state.currentPoem.down;

                    let maxAttempts = 150;
                    for (let i = 0; i < 4; i++) {
                        if (options[i] === null && maxAttempts > 0) {
                            let attempts = 0;
                            let randomPoem;
                            do {
                                randomPoem = DATA.poems[Math.floor(Math.random() * DATA.poems.length)];
                                attempts++;
                            } while ((randomPoem.down === state.currentPoem.down ||
                                     Array.from(options).includes(randomPoem.down) ||
                                     randomPoem.up === state.currentPoem.up) && attempts < maxAttempts);

                            if (attempts < maxAttempts) {
                                options[i] = randomPoem.down;
                            } else {
                                const remaining = DATA.poems.filter(p =>
                                    !Array.from(options).includes(p.down) &&
                                    p.down !== state.currentPoem.down &&
                                    p.up !== state.currentPoem.up
                                );
                                if (remaining.length > 0) {
                                    options[i] = remaining[0].down;
                                }
                            }
                        }
                    }

                    const optionsGrid = document.getElementById('timeattackOptions');
                    optionsGrid.innerHTML = '';
                    options.forEach((option, index) => {
                        const card = GameModes.fill.createOptionCard(option, index, 'timeattack', this.checkAnswer.bind(this));
                        optionsGrid.appendChild(card);
                    });
                },

                checkAnswer(card, index) {
                    const state = GameStates.timeattack;
                    if (state.isProcessing) return;
                    if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                    state.isProcessing = true;
                    const selectedOption = card.textContent;
                    const isCorrect = selectedOption === state.currentPoem.down;

                    if (isCorrect) {
                        card.classList.add('correct');
                        SoundManager.playSound('correct');
                        state.timeRemaining += 2;
                        UIManager.updateTimer();
                    } else {
                        card.classList.add('wrong');
                        SoundManager.playSound('wrong');
                        state.timeRemaining -= 3;
                        UIManager.updateTimer();
                    }

                    CommonHandlers.handleAnswer(isCorrect, state.currentPoem.down, 'timeattack');
                    state.isProcessing = false;
                }
            }
        };

        // ==================== 全局函数 ====================
        function switchMode(mode) {
            GameStates.global.mode = mode;

            if (mode !== 'timeattack') {
                GameStates.global.difficulty = null;
            }

            if (GameStates.match.resetTimer) {
                clearTimeout(GameStates.match.resetTimer);
                GameStates.match.resetTimer = null;
            }

            if (GameModes.timeattack.timerInterval) {
                clearInterval(GameModes.timeattack.timerInterval);
                GameModes.timeattack.timerInterval = null;
            }

            GameStates.fill.usedPoems = [];
            GameStates.feihua.usedPoems = [];
            GameStates.quiz.usedQuestions = [];
            GameStates.match.usedPoems = [];

            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode + 'ModeBtn').classList.add('active');

            document.getElementById('fillMode').style.display = 'none';
            document.getElementById('matchMode').classList.remove('active');
            document.getElementById('feihuaMode').classList.remove('active');
            document.getElementById('quizMode').classList.remove('active');
            document.getElementById('timeattackMode').classList.remove('active');

            if (mode === 'fill') {
                document.getElementById('fillMode').style.display = 'block';
                document.getElementById('difficultySelector').style.display = 'flex';
                document.getElementById('chancesInfo').style.display = 'flex';
                document.getElementById('streakInfo').style.display = 'flex';
                document.getElementById('correctCount').style.display = 'none';
                document.getElementById('matchProgress').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'block';
                showDifficultyPrompt();
            } else if (mode === 'match') {
                document.getElementById('matchMode').classList.add('active');
                document.getElementById('chancesInfo').style.display = 'none';
                document.getElementById('streakInfo').style.display = 'none';
                document.getElementById('correctCount').style.display = 'flex';
                document.getElementById('matchProgress').style.display = 'flex';
                document.getElementById('hintBtn').style.display = 'none';
                GameModes.match.init();
            } else if (mode === 'feihua') {
                document.getElementById('feihuaMode').classList.add('active');
                document.getElementById('chancesInfo').style.display = 'flex';
                document.getElementById('streakInfo').style.display = 'flex';
                document.getElementById('correctCount').style.display = 'flex';
                document.getElementById('matchProgress').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'none';
                GameModes.feihua.generateQuestion();
            } else if (mode === 'quiz') {
                document.getElementById('quizMode').classList.add('active');
                document.getElementById('chancesInfo').style.display = 'flex';
                document.getElementById('streakInfo').style.display = 'flex';
                document.getElementById('correctCount').style.display = 'flex';
                document.getElementById('matchProgress').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'none';
                GameModes.quiz.generateQuestion();
            } else if (mode === 'timeattack') {
                document.getElementById('timeattackMode').classList.add('active');
                document.getElementById('chancesInfo').style.display = 'none';
                document.getElementById('streakInfo').style.display = 'flex';
                document.getElementById('correctCount').style.display = 'flex';
                document.getElementById('matchProgress').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'none';
                GameModes.timeattack.init();
            }
        }

        function showDifficultyPrompt() {
            const display = document.getElementById('poemDisplay');
            display.textContent = '👆 请选择难度开始游戏';
            display.classList.remove('ink-spread');
            display.classList.add('prompt');
            document.getElementById('optionsGrid').innerHTML = '';
        }

        function setDifficulty(difficulty) {
            GameStates.global.difficulty = difficulty;

            switch(difficulty) {
                case 'easy':
                    GameStates.global.hintLimit = 5;
                    break;
                case 'medium':
                    GameStates.global.hintLimit = 3;
                    break;
                case 'hard':
                default:
                    GameStates.global.hintLimit = 1;
                    break;
            }

            GameStates.global.hintsUsed = 0;

            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.difficulty-btn.${difficulty}`).classList.add('active');

            GameModes.fill.generateQuestion();
        }

        function useHint() {
            GameModes.fill.useHint();
        }

        function resetGame() {
            GameStates.global.score = 0;
            GameStates.global.chances = 3;
            GameStates.global.streak = 0;
            GameStates.global.usedHint = false;
            GameStates.global.hintsUsed = 0;
            GameStates.global.comboCount = 0;
            GameStates.global.perfectStreak = 0;

            UIManager.hideGameOver();

            const hintBtn = document.getElementById('hintBtn');
            if (hintBtn) {
                hintBtn.disabled = false;
                hintBtn.textContent = `💡 提示 (${GameStates.global.hintLimit}/${GameStates.global.hintLimit})`;
                hintBtn.style.opacity = '1';
            }

            switch(GameStates.global.mode) {
                case 'fill':
                    if (GameStates.global.difficulty) {
                        GameModes.fill.generateQuestion();
                    } else {
                        showDifficultyPrompt();
                    }
                    break;
                case 'match':
                    GameModes.match.init();
                    break;
                case 'feihua':
                    GameModes.feihua.generateQuestion();
                    break;
                case 'quiz':
                    GameModes.quiz.generateQuestion();
                    break;
                case 'timeattack':
                    GameModes.timeattack.init();
                    break;
            }

            UIManager.updateScore();
            UIManager.updateChances();
            UIManager.updateStreak();
        }

        function saveScoreAndReset() {
            const nicknameInput = document.getElementById('playerNameInput');
            const nickname = nicknameInput.value.trim() || '匿名玩家';

            if (GameStates.global.score > 0) {
                const leaderboard = JSON.parse(localStorage.getItem('poemLeaderboard') || '[]');
                leaderboard.push({
                    nickname: nickname,
                    score: GameStates.global.score,
                    date: new Date().toLocaleDateString()
                });

                leaderboard.sort((a, b) => b.score - a.score);
                const top10 = leaderboard.slice(0, 10);

                localStorage.setItem('poemLeaderboard', JSON.stringify(top10));
            }

            UIManager.hideGameOver();
            resetGame();
        }

        function showLeaderboard() {
            const leaderboard = JSON.parse(localStorage.getItem('poemLeaderboard') || '[]');
            const leaderboardList = document.getElementById('leaderboardList');

            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<div style="color: #8b7768; padding: 20px;">暂无记录</div>';
            } else {
                leaderboardList.innerHTML = leaderboard.map((entry, index) => `
                    <div class="leaderboard-item">
                        <span class="leaderboard-rank">${index + 1}</span>
                        <span class="leaderboard-name">${entry.nickname}</span>
                        <span class="leaderboard-score">${entry.score}</span>
                    </div>
                `).join('');
            }

            document.getElementById('leaderboardModal').classList.add('show');
        }

        function hideLeaderboard() {
            document.getElementById('leaderboardModal').classList.remove('show');
        }

        function showLibrary() {
            const libraryList = document.getElementById('libraryList');
            libraryList.innerHTML = DATA.poems.map(poem => `
                <div class="library-item" data-search="${poem.up} ${poem.down} ${poem.author}">
                    <div class="library-poem">${poem.up}，${poem.down}</div>
                    <div class="library-author">${poem.author} · ${poem.dynasty}</div>
                </div>
            `).join('');

            document.getElementById('libraryModal').classList.add('show');
        }

        function hideLibrary() {
            document.getElementById('libraryModal').classList.remove('show');
        }

        function filterLibrary() {
            const searchText = document.getElementById('librarySearch').value.toLowerCase();
            const items = document.querySelectorAll('.library-item');

            items.forEach(item => {
                const text = item.dataset.search.toLowerCase();
                if (text.includes(searchText)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            SoundManager.init();
            CanvasManager.init();
            UIManager.updateScore();
            UIManager.updateAchievements();

            GameModes.fill.updateHintButton();

            document.getElementById('fillMode').style.display = 'block';
            document.getElementById('difficultySelector').style.display = 'flex';
            showDifficultyPrompt();
            GameStates.global.mode = 'fill';

            // 更新累计答对显示
            document.getElementById('totalCorrect').textContent = GameStates.global.totalCorrect;
        });
    </script>
</body>
</html>
