        const main = document.getElementById('gameMain');
        const collectedPoems = PoemDatabase.poems.filter(p => this.state.collectedPoems.has(p.id));

        main.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 28px; color: var(--accent);">📚 我的收藏</div>
                <div style="color: var(--ink-light);">共收藏 ${collectedPoems.length} 首诗词</div>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
            <div id="learnPanel"></div>
        `;

        const grid = document.getElementById('collectionGrid');

        if (collectedPoems.length === 0) {
            grid.innerHTML = '<div style="text-align: center; color: var(--ink-light); padding: 40px;">暂无收藏，快去游戏中收集吧！</div>';
            return;
        }

        collectedPoems.forEach(poem => {
            const card = document.createElement('div');
            card.className = 'collection-card';
            card.innerHTML = `
                <div class="collection-poem">${poem.up}</div>
                <div class="collection-author">${poem.dynasty} · ${poem.author}</div>
                <div class="collection-preview">${poem.down}</div>
            `;
            card.onclick = () => {
                this.currentQuestion = {poem, type: 'learn'};
                this.showLearnPanel(poem);
            };
            grid.appendChild(card);
        });

        // 清空学习面板
        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    // ==================== 通用功能 ====================
    showComboBonus() {
        const popup = document.createElement('div');
        popup.className = 'combo-popup';
        popup.textContent = `🔥 连击 x${this.state.streak}!`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), CONFIG.ANIMATION.COMBO_DURATION);
    }

    updateUI() {
        // 更新分数
        const scoreValue = document.getElementById('scoreValue');
        const collectValue = document.getElementById('collectValue');

        if (scoreValue) scoreValue.textContent = this.state.score;
        if (collectValue) collectValue.textContent = this.state.collectedPoems.size;

        // 更新生命值
        document.querySelectorAll('.heart').forEach((heart, i) => {
            heart.classList.toggle('lost', i >= this.state.hearts);
        });

        // 更新连击
        const streakContainer = document.getElementById('streakContainer');
        const streakBadge = document.getElementById('streakBadge');

        if (this.state.streak > 0) {
            if (streakContainer) streakContainer.style.display = 'flex';
            if (streakBadge) streakBadge.textContent = `连击 x${this.state.streak}`;
        } else {
            if (streakContainer) streakContainer.style.display = 'none';
        }

        // 更新提示按钮
        const hintBtn = document.getElementById('hintBtn');
        if (hintBtn) {
            hintBtn.disabled = this.state.hintsUsed >= this.state.hintLimit || this.state.score < CONFIG.GAME.HINT_COST;
        }
    }

    useHint() {
        if (!this.state.useHint()) {
            // 提示使用失败，显示原因
            if (this.state.hintsUsed >= this.state.hintLimit) {
                alert('本局提示次数已用完');
            } else if (this.state.score < CONFIG.GAME.HINT_COST) {
                alert(`需要${CONFIG.GAME.HINT_COST}分才能使用提示`);
            }
            return;
        }

        // 高亮正确答案
        const gridId = this.state.mode === 'fill' ? 'optionsGrid' :
                       this.state.mode === 'challenge' ? 'challengeOptions' :
                       this.state.mode === 'feihua' ? 'feihuaOptions' : null;

        if (!gridId) return;

        const grid = document.getElementById(gridId);
        if (!grid) return;

        const cards = grid.querySelectorAll('.option-card');
        cards.forEach(card => {
            if (card.textContent === this.currentQuestion.answer) {
                card.classList.add('hint-highlight');
                setTimeout(() => card.classList.remove('hint-highlight'), 2000);
            } else {
                card.style.opacity = '0.3';
                setTimeout(() => {
                    card.style.opacity = '1';
                }, 2000);
            }
        });

        this.sound.play('correct');
        this.updateUI();
    }

    gameOver() {
        this.state.gamesPlayed++;
        this.state.save();

        // 计算成就
        const achievements = [];
        if (this.state.score >= 100) achievements.push('🏆 百分达人');
        if (this.state.maxStreak >= 10) achievements.push('🔥 连击大师');
        if (this.state.collectedPoems.size >= 10) achievements.push('📚 收藏爱好者');
        if (this.state.getAccuracy() >= 80) achievements.push('🎯 答题高手');

        // 显示游戏结束弹窗
        document.getElementById('finalScore').textContent = this.state.score;
        document.getElementById('finalStreak').textContent = this.state.maxStreak;
        document.getElementById('finalCollected').textContent = this.state.collectedPoems.size;

        const achievementsContainer = document.getElementById('achievementsContainer');
        if (achievements.length > 0) {
            achievementsContainer.innerHTML = achievements.map(a =>
                `<span class="achievement-badge">${a}</span>`
            ).join('');
        } else {
            achievementsContainer.innerHTML = '<div style="color: var(--ink-light);">继续加油，解锁更多成就！</div>';
        }

        document.getElementById('gameOverModal').classList.add('active');
    }

    restart() {
        this.state.reset();
        this.state.load();
        this.clearAutoTransition();
        document.getElementById('gameOverModal').classList.remove('active');
        document.getElementById('statsModal').classList.remove('active');
        this.init();
    }
}

// 创建游戏实例
const game = new PoemGame();

// 暴露到全局（用于HTML中的onclick事件）
window.game = game;

</script>
