<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8b4513">
    <meta name="description" content="沉浸式古诗词学习游戏 - 诗笺雅集，寓教于乐">
    <title>诗笺雅集 - 诗词学习游戏</title>

    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #f5f0e6;
            --paper-dark: #e8dcc8;
            --ink: #2c2c2c;
            --ink-light: #4a4a4a;
            --accent: #8b4513;
            --accent-light: #a0522d;
            --gold: #d4a574;
            --success: #2e7d32;
            --error: #c62828;
            --warning: #f9a825;
            --info: #1976d2;
            --shadow: rgba(139, 69, 19, 0.15);
            --shadow-heavy: rgba(139, 69, 19, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            font-family: 'Noto Serif SC', 'STKaiti', serif;
            background: var(--paper);
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        #app {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-title::before { content: '📜'; font-size: 28px; }

        .score-board { display: flex; gap: 20px; }
        .score-item { text-align: center; }
        .score-label { font-size: 12px; color: var(--ink-light); display: block; }
        .score-value {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .mode-tabs::-webkit-scrollbar { display: none; }

        .mode-tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 12px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink-light);
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
        }

        .mode-tab.active {
            background: var(--accent);
            color: var(--paper);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow-heavy);
        }

        .mode-tab .icon { display: block; font-size: 18px; margin-bottom: 2px; }

        main {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 10px 25px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .difficulty-btn.easy { color: var(--success); border-color: var(--success); }
        .difficulty-btn.medium { color: var(--warning); border-color: var(--warning); }
        .difficulty-btn.hard { color: var(--error); border-color: var(--error); }
        .difficulty-btn.expert { color: #7c4dff; border-color: #7c4dff; }

        .difficulty-btn.active { transform: scale(1.05); font-weight: 600; color: white; }
        .difficulty-btn.easy.active { background: var(--success); }
        .difficulty-btn.medium.active { background: var(--warning); }
        .difficulty-btn.hard.active { background: var(--error); }
        .difficulty-btn.expert.active { background: #7c4dff; }

        .poem-display {
            text-align: center;
            padding: 35px 25px;
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            border-radius: 15px;
            border: 3px solid var(--gold);
            margin-bottom: 25px;
            position: relative;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .poem-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            color: var(--ink);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .poem-hint {
            font-size: 14px;
            color: var(--ink-light);
            margin-top: 8px;
        }

        .ink-spread { animation: inkSpread 0.8s ease-out; }

        @keyframes inkSpread {
            0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 20px rgba(46, 125, 50, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); transform: scale(1); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

        .option-card {
            padding: 18px;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow);
            border-color: var(--accent);
        }

        .option-card.correct {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            border-color: var(--success);
            animation: correctPulse 0.6s ease;
        }

        .option-card.wrong {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            border-color: var(--error);
            animation: paperShake 0.5s ease;
        }

        @keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes paperShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 学习面板 */
        .learn-panel {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .learn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gold);
        }

        .learn-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 24px;
            color: var(--accent);
        }

        .learn-section { margin-bottom: 20px; }
        .learn-section-title {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .learn-content {
            color: var(--ink-light);
            line-height: 1.8;
            text-align: justify;
        }

        .learn-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .learn-tag {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        .collect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 2px solid var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .collect-btn:hover { transform: scale(1.05); }
        .collect-btn.collected { background: #c8e6c9; border-color: var(--success); }

        /* 挑战模式 */
        .challenge-context {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: 2px solid var(--info);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .challenge-title {
            font-weight: 700;
            color: var(--info);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 配对模式 */
        .match-container { position: relative; min-height: 400px; }
        #matchCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .match-area { display: flex; gap: 20px; justify-content: space-between; position: relative; z-index: 5; }
        .match-column { flex: 1; max-width: 48%; }
        .column-title { text-align: center; font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); font-family: 'Ma Shan Zheng', cursive; }
        .match-item { padding: 16px; background: white; border: 2px solid var(--gold); border-radius: 10px; margin-bottom: 10px; font-size: 15px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .match-item:hover { transform: translateX(5px); border-color: var(--accent); }
        .match-column:last-child .match-item:hover { transform: translateX(-5px); }
        .match-item.selected { background: #fff9c4; border-color: var(--warning); }
        .match-item.matched { background: #c8e6c9; border-color: var(--success); opacity: 0.7; }
        .match-item.wrong { background: #ffcdd2; border-color: var(--error); animation: paperShake 0.5s ease; }

        /* 飞花令 */
        .feihua-keyword { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; color: var(--accent); text-align: center; margin-bottom: 15px; }
        .feihua-context { text-align: center; font-size: 18px; color: var(--ink-light); margin-bottom: 25px; font-style: italic; }

        /* 接龙 */
        .chain-input-area { max-width: 500px; margin: 0 auto; }
        .chain-input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-family: 'Ma Shan Zheng', cursive;
            border: 3px solid var(--gold);
            border-radius: 15px;
            background: white;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        .chain-input:focus { border-color: var(--accent); }
        .chain-input.correct { border-color: var(--success); background: #e8f5e9; }
        .chain-input.wrong { border-color: var(--error); animation: paperShake 0.5s ease; }

        /* 收藏夹 */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .collection-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .collection-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow); }
        .collection-poem { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; margin-bottom: 8px; color: var(--ink); }
        .collection-author { font-size: 14px; color: var(--ink-light); margin-bottom: 10px; }
        .collection-preview { font-size: 13px; color: var(--ink-light); line-height: 1.6; }

        /* Footer */
        footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-bar { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .hearts { display: flex; gap: 3px; }
        .heart { font-size: 24px; transition: all 0.3s ease; }
        .heart.lost { opacity: 0.3; filter: grayscale(100%); }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; padding: 5px 12px; border-radius: 15px; font-weight: 600; font-size: 14px; }

        .action-buttons { display: flex; gap: 10px; }
        .action-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--accent); color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid var(--accent);
            max-width: 90%;
            width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .floating-feedback { position: fixed; pointer-events: none; z-index: 2000; font-weight: 700; font-size: 24px; animation: floatUp 1s ease forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .combo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Ma Shan Zheng', cursive; font-size: 48px; color: #ff6b6b; z-index: 2000; animation: comboAnim 1s ease forwards; }
        @keyframes comboAnim { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-50px); } }

        @media (max-width: 768px) {
            .game-title { font-size: 24px; }
            .poem-text { font-size: 26px; }
            .options-grid { grid-template-columns: 1fr; }
            .match-area { flex-direction: column; }
            .match-column { max-width: 100%; }
            #matchCanvas { display: none; }
            footer { flex-direction: column; text-align: center; }
            .collection-grid { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1 class="game-title">诗笺雅集</h1>
                <div class="score-board">
                    <div class="score-item">
                        <span class="score-label">得分</span>
                        <span class="score-value" id="scoreValue">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">收藏</span>
                        <span class="score-value" id="collectValue">0</span>
                    </div>
                </div>
            </div>
            <nav class="mode-tabs">
                <button class="mode-tab active" data-mode="fill" onclick="game.switchMode('fill')">
                    <span class="icon">✏️</span><span>填空</span>
                </button>
                <button class="mode-tab" data-mode="challenge" onclick="game.switchMode('challenge')">
                    <span class="icon">🎯</span><span>挑战</span>
                </button>
                <button class="mode-tab" data-mode="match" onclick="game.switchMode('match')">
                    <span class="icon">🔗</span><span>配对</span>
                </button>
                <button class="mode-tab" data-mode="feihua" onclick="game.switchMode('feihua')">
                    <span class="icon">🌸</span><span>飞花令</span>
                </button>
                <button class="mode-tab" data-mode="chain" onclick="game.switchMode('chain')">
                    <span class="icon">⛓️</span><span>接龙</span>
                </button>
                <button class="mode-tab" data-mode="learn" onclick="game.switchMode('learn')">
                    <span class="icon">📚</span><span>学习</span>
                </button>
            </nav>
        </header>

        <main id="gameMain"></main>

        <footer>
            <div class="status-bar">
                <div class="status-item">
                    <span style="font-size: 20px;">❤️</span>
                    <div class="hearts" id="heartsDisplay">
                        <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
                    </div>
                </div>
                <div class="status-item" id="streakContainer" style="display: none;">
                    <span class="streak-badge" id="streakBadge">连击 x0</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="hintBtn" onclick="game.useHint()">💡 提示</button>
                <button class="action-btn" onclick="game.restart()">🔄 重开</button>
            </div>
        </footer>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 36px; color: var(--accent); margin-bottom: 20px;">游戏结束</div>
            <div style="font-size: 48px; font-weight: 700; color: var(--accent); margin-bottom: 10px; font-family: 'ZCOOL XiaoWei', serif;" id="finalScore">0</div>
            <div style="color: var(--ink-light); margin-bottom: 30px;">最高连击: <span id="finalStreak">0</span> | 收藏诗词: <span id="finalCollected">0</span>首</div>
            <button class="action-btn" style="background: var(--accent); color: white; padding: 15px 40px; font-size: 18px;" onclick="game.restart()">再玩一次</button>
        </div>
    </div>

<script>


// ==================== 诗词数据库（150首精选）====================
const PoemDatabase = {
    poems: [
        // 李白 20首
        {id: 1, up: "床前明月光", down: "疑是地上霜", author: "李白", dynasty: "唐", tags: ["思乡", "月亮"], difficulty: 1,
         background: "此诗为李白漫游扬州时所作。诗人客居他乡，秋夜难眠，见明月而思乡。", note: "床：指井边栏杆。疑：怀疑。",
         fullPoem: "床前明月光，疑是地上霜。举头望明月，低头思故乡。"},
        {id: 2, up: "举头望明月", down: "低头思故乡", author: "李白", dynasty: "唐", tags: ["思乡", "月亮"], difficulty: 1, background: "《静夜思》后两句，直接抒发思乡之情。"},
        {id: 3, up: "朝辞白帝彩云间", down: "千里江陵一日还", author: "李白", dynasty: "唐", tags: ["山水", "行旅"], difficulty: 2,
         background: "唐肃宗乾元二年，李白流放夜郎，行至白帝城遇赦，乘舟东归所作。", note: "白帝城：在今重庆奉节。江陵：今湖北荆州。"},
        {id: 4, up: "两岸猿声啼不住", down: "轻舟已过万重山", author: "李白", dynasty: "唐", tags: ["山水", "行旅"], difficulty: 2, background: "写舟行如飞，长江三峡的壮丽景色。"},
        {id: 5, up: "桃花潭水深千尺", down: "不及汪伦送我情", author: "李白", dynasty: "唐", tags: ["友情", "离别"], difficulty: 1,
         background: "李白游泾县桃花潭，村民汪伦常酿美酒款待，李白临行作诗相赠。", note: "桃花潭：在今安徽泾县。"},
        {id: 6, up: "天门中断楚江开", down: "碧水东流至此回", author: "李白", dynasty: "唐", tags: ["山水"], difficulty: 2,
         background: "唐玄宗开元十三年，李白出蜀途中，舟行长江，望天门山所作。", note: "天门山：在今安徽当涂。"},
        {id: 7, up: "两岸青山相对出", down: "孤帆一片日边来", author: "李白", dynasty: "唐", tags: ["山水"], difficulty: 2},
        {id: 8, up: "长风破浪会有时", down: "直挂云帆济沧海", author: "李白", dynasty: "唐", tags: ["壮志", "励志"], difficulty: 2,
         background: "李白被赐金放还后，在长安所作，抒发虽遭挫折但仍怀壮志。", note: "长风破浪：比喻志向远大。"},
        {id: 9, up: "天生我材必有用", down: "千金散尽还复来", author: "李白", dynasty: "唐", tags: ["励志", "豪放"], difficulty: 2,

        {id: 77, up: "水光潋滟晴方好", down: "山色空蒙雨亦奇", author: "苏轼", dynasty: "宋", tags: ["山水", "雨"], difficulty: 2, note: "潋滟：水波荡漾的样子。空蒙：细雨迷蒙。"},
        {id: 78, up: "但愿人长久", down: "千里共婵娟", author: "苏轼", dynasty: "宋", tags: ["相思", "月亮", "中秋"], difficulty: 2,
         background: "苏轼中秋望月怀人，思念弟弟苏辙所作。", note: "婵娟：月亮。", fullPoem: "明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"},
        {id: 79, up: "人有悲欢离合", down: "月有阴晴圆缺", author: "苏轼", dynasty: "宋", tags: ["人生", "月亮", "哲理"], difficulty: 2},
        {id: 80, up: "竹外桃花三两枝", down: "春江水暖鸭先知", author: "苏轼", dynasty: "宋", tags: ["春天", "花", "自然"], difficulty: 2,
         background: "苏轼题惠崇和尚的画作，写早春江景。", note: "惠崇：北宋名僧，画家。"},
        {id: 81, up: "大江东去", down: "浪淘尽", author: "苏轼", dynasty: "宋", tags: ["历史", "豪放"], difficulty: 3,
         background: "苏轼游览赤壁古战场，怀古伤今，豪放词代表作。", fullPoem: "大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。故国神游，多情应笑我，早生华发。人生如梦，一尊还酹江月。"},
        {id: 82, up: "十年生死两茫茫", down: "不思量自难忘", author: "苏轼", dynasty: "宋", tags: ["悼亡", "相思"], difficulty: 3,
         background: "苏轼悼念亡妻王弗，词中真情流露，感人至深。", note: "乙卯正月二十日夜记梦"},
        {id: 83, up: "回首向来萧瑟处", down: "归去也无风雨也无晴", author: "苏轼", dynasty: "宋", tags: ["人生", "雨", "豁达"], difficulty: 3,
         background: "苏轼途中遇雨，借景抒怀，表现出豁达超脱的人生态度。", fullPoem: "莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。料峭春风吹酒醒，微冷，山头斜照却相迎。回首向来萧瑟处，归去，也无风雨也无晴。"},
        {id: 84, up: "一年好景君须记", down: "最是橙黄橘绿时", author: "苏轼", dynasty: "宋", tags: ["秋天", "勉励"], difficulty: 2,
         background: "苏轼赠好友刘景文，勉励其虽年迈仍有作为。", note: "刘景文：苏轼好友。"},
        {id: 85, up: "枝上柳绵吹又少", down: "天涯何处无芳草", author: "苏轼", dynasty: "宋", tags: ["春天", "离别", "豁达"], difficulty: 3, background: "苏轼被贬惠州时所作，词中寓含身世之感。"},

        // 李清照 8首
        {id: 86, up: "昨夜雨疏风骤", down: "浓睡不消残酒", author: "李清照", dynasty: "宋", tags: ["春天", "花", "雨"], difficulty: 2,
         background: "李清照早期作品，写惜花之情，含蓄婉约。", fullPoem: "昨夜雨疏风骤，浓睡不消残酒。试问卷帘人，却道海棠依旧。知否，知否？应是绿肥红瘦。"},
        {id: 87, up: "知否知否", down: "应是绿肥红瘦", author: "李清照", dynasty: "宋", tags: ["春天", "花"], difficulty: 2, note: "绿肥红瘦：绿叶繁茂，红花凋零。"},
        {id: 88, up: "生当作人杰", down: "死亦为鬼雄", author: "李清照", dynasty: "宋", tags: ["壮志", "历史"], difficulty: 2,
         background: "李清照南渡后，路过乌江，追思项羽，讽刺南宋朝廷苟安。", fullPoem: "生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},
        {id: 89, up: "至今思项羽", down: "不肯过江东", author: "李清照", dynasty: "宋", tags: ["历史", "壮志"], difficulty: 2, note: "项羽：西楚霸王，兵败乌江自刎。"},
        {id: 90, up: "寻寻觅觅", down: "冷冷清清凄凄惨惨戚戚", author: "李清照", dynasty: "宋", tags: ["秋天", "愁绪"], difficulty: 3,
         background: "李清照晚年所作，开篇连用七组叠字，写尽孤寂凄凉。", fullPoem: "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急！雁过也，正伤心，却是旧时相识。满地黄花堆积，憔悴损，如今有谁堪摘？守着窗儿，独自怎生得黑！梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！"},
        {id: 91, up: "这次第", down: "怎一个愁字了得", author: "李清照", dynasty: "宋", tags: ["秋天", "愁绪"], difficulty: 3, note: "次第：情形。"},
        {id: 92, up: "莫道不销魂", down: "帘卷西风人比黄花瘦", author: "李清照", dynasty: "宋", tags: ["秋天", "相思"], difficulty: 3,
         background: "李清照婚后所作，重阳思夫，以黄花比人，写出相思之苦。", fullPoem: "薄雾浓云愁永昼，瑞脑销金兽。佳节又重阳，玉枕纱厨，半夜凉初透。东篱把酒黄昏后，有暗香盈袖。莫道不销魂，帘卷西风，人比黄花瘦。"},
        {id: 93, up: "物是人非事事休", down: "欲语泪先流", author: "李清照", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 3, background: "李清照南渡后，物是人非，感慨所作。"},

        // 辛弃疾 8首
        {id: 94, up: "众里寻他千百度", down: "蓦然回首那人却在灯火阑珊处", author: "辛弃疾", dynasty: "宋", tags: ["元宵", "爱情"], difficulty: 3,
         background: "辛弃疾元宵夜，写情人约会，后多喻指治学或事业追求。", note: "阑珊：稀疏。", fullPoem: "东风夜放花千树，更吹落、星如雨。宝马雕车香满路。凤箫声动，玉壶光转，一夜鱼龙舞。蛾儿雪柳黄金缕，笑语盈盈暗香去。众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。"},
        {id: 95, up: "醉里挑灯看剑", down: "梦回吹角连营", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "战争"], difficulty: 3,
         background: "辛弃疾闲居信州，梦见军营生活，抒发壮志难酬的悲愤。", fullPoem: "醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生！"},
        {id: 96, up: "了却君王天下事", down: "赢得生前身后名", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "战争"], difficulty: 3},
        {id: 97, up: "可怜白发生", down: "", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "感慨"], difficulty: 3, upOnly: true},
        {id: 98, up: "稻花香里说丰年", down: "听取蛙声一片", author: "辛弃疾", dynasty: "宋", tags: ["田园", "夏天"], difficulty: 2,
         background: "辛弃疾闲居带湖，写夏夜农村风光，洋溢着丰收的喜悦。", fullPoem: "明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。"},
        {id: 99, up: "青山遮不住", down: "毕竟东流去", author: "辛弃疾", dynasty: "宋", tags: ["山水", "哲理"], difficulty: 2,
         background: "辛弃疾被贬后，以江水喻指时局，表达抗金决心不可阻挡。", note: "郁孤台：在今江西赣州。"},
        {id: 100, up: "少年不识愁滋味", down: "爱上层楼", author: "辛弃疾", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 2,
         background: "辛弃疾以少年与老年对比，写不同人生阶段的愁绪。", fullPoem: "少年不识愁滋味，爱上层楼。爱上层楼，为赋新词强说愁。而今识尽愁滋味，欲说还休。欲说还休，却道天凉好个秋。"},
        {id: 101, up: "而今识尽愁滋味", down: "欲说还休", author: "辛弃疾", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 2},

        // 继续扩充其他名家...
        {id: 102, up: "人生自古谁无死", down: "留取丹心照汗青", author: "文天祥", dynasty: "宋", tags: ["爱国", "壮志"], difficulty: 2,
         background: "文天祥兵败被俘，过零丁洋时所作，表明以死明志的决心。", note: "汗青：史册。"},
        {id: 103, up: "山河破碎风飘絮", down: "身世浮沉雨打萍", author: "文天祥", dynasty: "宋", tags: ["爱国", "愁绪"], difficulty: 3, background: "以柳絮、浮萍比喻国家和个人命运。"},
        {id: 104, up: "无可奈何花落去", down: "似曾相识燕归来", author: "晏殊", dynasty: "宋", tags: ["春天", "花", "时间"], difficulty: 2,
         background: "晏殊感叹春光易逝，人事变迁，对仗工整，成为名句。", fullPoem: "一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？无可奈何花落去，似曾相识燕归来。小园香径独徘徊。"},
        {id: 105, up: "昨夜西风凋碧树", down: "独上高楼望尽天涯路", author: "晏殊", dynasty: "宋", tags: ["秋天", "孤独"], difficulty: 3,
         background: "王国维《人间词话》以此为古今之成大事业者必经的第一境界。", fullPoem: "槛菊愁烟兰泣露，罗幕轻寒，燕子双飞去。明月不谙离恨苦，斜光到晓穿朱户。昨夜西风凋碧树，独上高楼，望尽天涯路。欲寄彩笺兼尺素，山长水阔知何处？"},
        {id: 106, up: "衣带渐宽终不悔", down: "为伊消得人憔悴", author: "柳永", dynasty: "宋", tags: ["相思", "爱情"], difficulty: 2,
         background: "柳永写相思之苦，王国维以此为成大事业者第二境界。", fullPoem: "伫倚危楼风细细，望极春愁，黯黯生天际。草色烟光残照里，无言谁会凭阑意。拟把疏狂图一醉，对酒当歌，强乐还无味。衣带渐宽终不悔，为伊消得人憔悴。"},
        {id: 107, up: "今宵酒醒何处", down: "杨柳岸晓风残月", author: "柳永", dynasty: "宋", tags: ["离别", "月亮", "柳"], difficulty: 3,
         background: "柳永离别情人，设想酒醒后的凄凉景象，脍炙人口。"},
        {id: 108, up: "两情若是久长时", down: "又岂在朝朝暮暮", author: "秦观", dynasty: "宋", tags: ["爱情", "七夕"], difficulty: 2,
         background: "秦观七夕词，写牛郎织女，歌颂坚贞爱情，立意高远。", fullPoem: "纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水，佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。"},

        // 唐诗补充
        {id: 109, up: "海内存知己", down: "天涯若比邻", author: "王勃", dynasty: "唐", tags: ["友情", "离别"], difficulty: 2,
         background: "王勃送别友人，一扫送别诗的悲戚，气势豪迈。", fullPoem: "城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。"},
        {id: 110, up: "落霞与孤鹜齐飞", down: "秋水共长天一色", author: "王勃", dynasty: "唐", tags: ["秋天", "自然"], difficulty: 3,
         background: "《滕王阁序》名句，写滕王阁秋日美景，成为千古绝唱。"},
        {id: 111, up: "慈母手中线", down: "游子身上衣", author: "孟郊", dynasty: "唐", tags: ["亲情", "母爱"], difficulty: 1,
         background: "孟郊贫寒中感念母爱，写出千古传诵的母爱诗。", fullPoem: "慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。"},
        {id: 112, up: "谁言寸草心", down: "报得三春晖", author: "孟郊", dynasty: "唐", tags: ["亲情", "母爱"], difficulty: 1, note: "三春晖：春天的阳光，比喻母爱。"},
        {id: 113, up: "少小离家老大回", down: "乡音无改鬓毛衰", author: "贺知章", dynasty: "唐", tags: ["思乡", "时间"], difficulty: 2,
         background: "贺知章八十六岁辞官归乡，感慨万千。", fullPoem: "少小离家老大回，乡音无改鬓毛衰。儿童相见不相识，笑问客从何处来。"},
        {id: 114, up: "儿童相见不相识", down: "笑问客从何处来", author: "贺知章", dynasty: "唐", tags: ["思乡", "时间"], difficulty: 2},
        {id: 115, up: "春江潮水连海平", down: "海上明月共潮生", author: "张若虚", dynasty: "唐", tags: ["春天", "月亮", "水"], difficulty: 3,
         background: "《春江花月夜》开篇，写春江月夜美景，被誉为孤篇盖全唐。", fullPoem: "春江潮水连海平，海上明月共潮生。滟滟随波千万里，何处春江无月明！江流宛转绕芳甸，月照花林皆似霰。空里流霜不觉飞，汀上白沙看不见。江天一色无纤尘，皎皎空中孤月轮。江畔何人初见月？江月何年初照人？人生代代无穷已，江月年年望相似。不知江月待何人，但见长江送流水。白云一片去悠悠，青枫浦上不胜愁。谁家今夜扁舟子？何处相思明月楼？可怜楼上月徘徊，应照离人妆镜台。玉户帘中卷不去，捣衣砧上拂还来。此时相望不相闻，愿逐月华流照君。鸿雁长飞光不度，鱼龙潜跃水成文。昨夜闲潭梦落花，可怜春半不还家。江水流春去欲尽，江潭落月复西斜。斜月沉沉藏海雾，碣石潇湘无限路。不知乘月几人归，落月摇情满江树。"},
        {id: 116, up: "江畔何人初见月", down: "江月何年初照人", author: "张若虚", dynasty: "唐", tags: ["月亮", "时间", "哲理"], difficulty: 3, background: "对人生和宇宙的深刻思考。"},
        {id: 117, up: "清明时节雨纷纷", down: "路上行人欲断魂", author: "杜牧", dynasty: "唐", tags: ["清明", "雨", "愁绪"], difficulty: 1,
         background: "杜牧清明踏青，写雨中行人的愁绪。", fullPoem: "清明时节雨纷纷，路上行人欲断魂。借问酒家何处有，牧童遥指杏花村。"},
        {id: 118, up: "借问酒家何处有", down: "牧童遥指杏花村", author: "杜牧", dynasty: "唐", tags: ["清明", "春天", "花"], difficulty: 1},
        {id: 119, up: "停车坐爱枫林晚", down: "霜叶红于二月花", author: "杜牧", dynasty: "唐", tags: ["秋天", "自然"], difficulty: 1,
         background: "杜牧秋游，发现枫叶比春花更红，立意新颖。", fullPoem: "远上寒山石径斜，白云生处有人家。停车坐爱枫林晚，霜叶红于二月花。"},
        {id: 120, up: "南朝四百八十寺", down: "多少楼台烟雨中", author: "杜牧", dynasty: "唐", tags: ["历史", "春天", "雨"], difficulty: 2,
         background: "杜牧江南春景，凭吊南朝佛教兴盛的遗迹。", note: "四百八十寺：形容寺庙之多。"},
        {id: 121, up: "商女不知亡国恨", down: "隔江犹唱后庭花", author: "杜牧", dynasty: "唐", tags: ["忧国", "历史"], difficulty: 2,
         background: "杜牧夜泊秦淮，听亡国之音，讽刺晚唐统治者。", note: "后庭花：南朝陈后主所作亡国之音。"},
        {id: 122, up: "东风不与周郎便", down: "铜雀春深锁二乔", author: "杜牧", dynasty: "唐", tags: ["历史", "赤壁"], difficulty: 3,
         background: "杜牧过赤壁，假设历史，感叹机遇的重要性。", fullPoem: "折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。"},

        // 更多宋词和名句
        {id: 123, up: "问君能有几多愁", down: "恰似一江春水向东流", author: "李煜", dynasty: "五代", tags: ["愁绪", "水", "春天"], difficulty: 2,
         background: "南唐后主李煜亡国后被囚汴京，写尽亡国之痛。", note: "虞美人", fullPoem: "春花秋月何时了，往事知多少。小楼昨夜又东风，故国不堪回首月明中。雕栏玉砌应犹在，只是朱颜改。问君能有几多愁？恰似一江春水向东流。"},

    keywords: ["花", "月", "春", "山", "水", "风", "雨", "云", "人", "情", "梦", "酒", "夜", "雪", "秋", "江", "柳", "梅", "愁", "思"],

    index: { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} },

    buildIndex() {
        this.poems.forEach(poem => {
            if (!this.index.byAuthor[poem.author]) this.index.byAuthor[poem.author] = [];
            this.index.byAuthor[poem.author].push(poem);
            this.index.byDifficulty[poem.difficulty].push(poem);
            poem.tags.forEach(tag => {
                if (!this.index.byTag[tag]) this.index.byTag[tag] = [];
                this.index.byTag[tag].push(poem);
            });
            const text = poem.up + poem.down;
            this.keywords.forEach(kw => {
                if (text.includes(kw)) {
                    if (!this.index.byKeyword[kw]) this.index.byKeyword[kw] = [];
                    if (!this.index.byKeyword[kw].includes(poem)) this.index.byKeyword[kw].push(poem);
                }
            });
        });
    },

    query({difficulty, excludeIds = [], limit = 10, requireKeyword = null, author = null, tag = null} = {}) {
        let pool = difficulty ? [...this.index.byDifficulty[difficulty]] : [...this.poems];
        if (author) pool = pool.filter(p => p.author === author);
        if (tag) pool = pool.filter(p => p.tags.includes(tag));
        if (requireKeyword) pool = pool.filter(p => (p.up + p.down).includes(requireKeyword));
        pool = pool.filter(p => !excludeIds.includes(p.id));
        return pool.sort(() => Math.random() - 0.5).slice(0, limit);
    },

    fuzzyMatch(input, target, tolerance = 0.85) {
        if (input === target) return {match: true, score: 1};
        const cleanInput = input.replace(/[，。？！、；：""''（）【】]/g, '');
        const cleanTarget = target.replace(/[，。？！、；：""''（）【】]/g, '');
        if (cleanInput === cleanTarget) return {match: true, score: 0.98};
        const distance = this.levenshtein(cleanInput, cleanTarget);
        const maxLen = Math.max(cleanInput.length, cleanTarget.length);
        const similarity = 1 - distance / maxLen;
        if (similarity >= tolerance) return {match: true, score: similarity};
        const commonChars = [...cleanInput].filter(c => cleanTarget.includes(c)).length;
        const overlapRatio = commonChars / Math.min(cleanInput.length, cleanTarget.length);
        if (overlapRatio >= 0.7) return {match: true, score: overlapRatio * 0.9, hint: "音近字"};
        return {match: false, score: similarity};
    },

    levenshtein(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                matrix[i][j] = b.charAt(i-1) === a.charAt(j-1) ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1] + 1, matrix[i][j-1] + 1, matrix[i-1][j] + 1);
            }
        }
        return matrix[b.length][a.length];
    }
};

// ==================== 音效引擎 ====================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.init();
    }
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    ensureContext() {
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    play(type) {
        if (!this.enabled || !this.ctx) return;
        this.ensureContext();
        const t = this.ctx.currentTime;
        switch(type) {
            case 'correct': this.playChord([523.25, 659.25, 783.99], 0.3, 'sine', 0.5); break;
            case 'wrong': this.playTone(200, 0.3, 'sawtooth', 0.25, 150); break;
            case 'combo': this.playSequence([523.25, 659.25, 783.99, 1046.50], 0.1, 'triangle'); break;
            case 'collect': this.playChord([392, 523.25, 659.25], 0.2, 'sine', 0.6); break;
        }
    }
    playTone(freq, duration, type, vol, freqEnd = null) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (freqEnd) osc.frequency.setValueAtTime(freqEnd, this.ctx.currentTime + duration * 0.5);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
    playChord(freqs, vol, type, duration) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, duration, type, vol * (1 - i*0.1)), i * 50));
    }
    playSequence(freqs, interval, type) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, interval * 2, type, 0.2), i * interval * 1000));
    }
}

// ==================== 游戏状态 ====================
class GameState {
    constructor() {
        this.reset();
        this.load();
    }
    reset() {
        this.mode = 'fill';
        this.difficulty = 'MEDIUM';
        this.score = 0;
        this.streak = 0;
        this.maxStreak = 0;
        this.hearts = 3;
        this.hintsUsed = 0;
        this.hintLimit = 3;
        this.collectedPoems = new Set();
        this.usedPoemIds = [];
        this.comboCount = 0;
        this.isProcessing = false;
        this.timer = null;
    }
    load() {
        const saved = localStorage.getItem('poemGameV2');
        if (saved) {
            const data = JSON.parse(saved);
            this.highScore = data.highScore || 0;
            this.collectedPoems = new Set(data.collected || []);
        } else {
            this.highScore = 0;
        }
    }
    save() {
        const data = {
            highScore: Math.max(this.score, this.highScore),
            collected: Array.from(this.collectedPoems),
            timestamp: Date.now()
        };
        localStorage.setItem('poemGameV2', JSON.stringify(data));
    }
    addScore(points) {
        this.score += points;
        if (this.score > this.highScore) this.highScore = this.score;
    }
    addStreak() {
        this.streak++;
        this.comboCount++;
        if (this.streak > this.maxStreak) this.maxStreak = this.streak;
        if (this.streak % 3 === 0) { this.addScore(5); return true; }
        return false;
    }
    breakStreak() { this.streak = 0; this.comboCount = 0; }
    loseHeart() { this.hearts--; this.breakStreak(); return this.hearts <= 0; }
    useHint() {
        if (this.hintsUsed >= this.hintLimit || this.score < 5) return false;
        this.hintsUsed++; this.score -= 5; return true;
    }
    collectPoem(id) {
        this.collectedPoems.add(id);
        this.save();
    }
    setDifficulty(diff) {
        this.difficulty = diff;
        this.hintLimit = {EASY: 5, MEDIUM: 3, HARD: 2, EXPERT: 1}[diff] || 3;
    }
}

class PoemGame {
    constructor() {
        this.state = new GameState();
        this.sound = new SoundEngine();
        this.currentQuestion = null;
        this.matchState = null;
        this.chainState = null;
        this.canvas = null;
        this.ctx = null;
        this.init();
    }
    init() {
        this.updateUI();
        this.switchMode('fill');
        window.addEventListener('beforeunload', () => this.state.save());
    }
    switchMode(mode) {
        this.state.mode = mode;
        this.state.isProcessing = false;
        if (this.state.timer) { clearInterval(this.state.timer); this.state.timer = null; }
        document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));
        const main = document.getElementById('gameMain');
        main.innerHTML = '';
        switch(mode) {
            case 'fill': this.initFillMode(); break;
            case 'challenge': this.initChallengeMode(); break;
            case 'match': this.initMatchMode(); break;
            case 'feihua': this.initFeihuaMode(); break;
            case 'chain': this.initChainMode(); break;
            case 'learn': this.initLearnMode(); break;
        }
        this.updateUI();
    }

    // 填空模式
    initFillMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="difficulty-selector">
                <button class="difficulty-btn easy ${this.state.difficulty === 'EASY' ? 'active' : ''}" onclick="game.setDifficulty('EASY')">简单</button>
                <button class="difficulty-btn medium ${this.state.difficulty === 'MEDIUM' ? 'active' : ''}" onclick="game.setDifficulty('MEDIUM')">中等</button>
                <button class="difficulty-btn hard ${this.state.difficulty === 'HARD' ? 'active' : ''}" onclick="game.setDifficulty('HARD')">困难</button>
                <button class="difficulty-btn expert ${this.state.difficulty === 'EXPERT' ? 'active' : ''}" onclick="game.setDifficulty('EXPERT')">专家</button>
            </div>
            <div id="fillContent"></div>
        `;
        this.generateFillQuestion();
    }
    setDifficulty(diff) {
        this.state.setDifficulty(diff);
        this.state.usedPoemIds = [];
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.classList.contains(diff.toLowerCase())) btn.classList.add('active');
        });
        this.generateFillQuestion();
    }
    generateFillQuestion() {
        if (this.state.hearts <= 0) return;
        const content = document.getElementById('fillContent');
        const diffMap = {EASY: 1, MEDIUM: 2, HARD: 3, EXPERT: 3};
        let effectiveDiff = diffMap[this.state.difficulty];
        if (this.state.score >= 50 && this.state.difficulty === 'EASY') effectiveDiff = 2;
        if (this.state.score >= 100 && this.state.difficulty === 'MEDIUM') effectiveDiff = 3;

        const pool = PoemDatabase.query({difficulty: effectiveDiff, excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateFillQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'fill', answer: poem.down};

        content.innerHTML = `
            <div class="poem-display" id="poemDisplay">
                <div class="poem-text">${poem.up}</div>
                <div class="poem-hint">${poem.dynasty} · ${poem.author}</div>
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('optionsGrid');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFillAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }
    generateOptions(correctPoem, field) {
        const correct = correctPoem[field];
        const options = [correct];
        const diffMap = {EASY: 1, MEDIUM: 2, HARD: 3, EXPERT: 3};
        const pool = PoemDatabase.query({difficulty: diffMap[this.state.difficulty], limit: 20})
            .filter(p => p.id !== correctPoem.id && p[field] !== correct);
        const shuffled = pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3 && i < shuffled.length; i++) {
            const opt = shuffled[i][field];
            if (!options.includes(opt)) options.push(opt);
        }
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            if (!options.includes(random[field])) options.push(random[field]);
        }
        return options.sort(() => Math.random() - 0.5);
    }
    checkFillAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            document.getElementById('poemDisplay').classList.add('ink-spread');
            this.sound.play('correct');
            this.state.addScore(10);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
            setTimeout(() => this.generateFillQuestion(), 3000);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFillQuestion(), 1800);
        }
        this.updateUI();
    }
    showLearnPanel(poem) {
        const panel = document.getElementById('learnPanel');
        const isCollected = this.state.collectedPoems.has(poem.id);
        panel.innerHTML = `
            <div class="learn-panel">
                <div class="learn-header">
                    <div class="learn-title">📚 诗词赏析</div>
                    <button class="learn-close" onclick="this.parentElement.parentElement.remove()">×</button>
                </div>
                <div class="learn-section">
                    <div class="learn-section-title">📝 全诗</div>
                    <div class="learn-content" style="font-family: 'Ma Shan Zheng', cursive; font-size: 20px;">${poem.fullPoem || poem.up + '，' + poem.down}</div>
                </div>
                <div class="learn-section">
                    <div class="learn-section-title">📖 创作背景</div>
                    <div class="learn-content">${poem.background || '暂无背景介绍'}</div>
                </div>
                ${poem.note ? `<div class="learn-section"><div class="learn-section-title">💡 注释</div><div class="learn-content">${poem.note}</div></div>` : ''}
                <div class="learn-tags">
                    ${poem.tags.map(tag => `<span class="learn-tag">${tag}</span>`).join('')}
                </div>
                <button class="collect-btn ${isCollected ? 'collected' : ''}" onclick="game.collectCurrentPoem()">
                    ${isCollected ? '⭐ 已收藏' : '⭐ 收藏'}
                </button>
            </div>
        `;
    }
    collectCurrentPoem() {
        if (this.currentQuestion && this.currentQuestion.poem) {
            this.state.collectPoem(this.currentQuestion.poem.id);
            this.sound.play('collect');
            this.updateUI();
            const btn = document.querySelector('.collect-btn');
            if (btn) { btn.classList.add('collected'); btn.innerHTML = '⭐ 已收藏'; }
        }
    }

    // 挑战模式
    initChallengeMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="challengeContent"></div>`;
        this.generateChallengeQuestion();
    }
    generateChallengeQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChallengeQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'challenge', answer: poem.down};

        const content = document.getElementById('challengeContent');
        const contextTypes = ['background', 'author', 'tags'];
        const contextType = contextTypes[Math.floor(Math.random() * contextTypes.length)];
        let challengeText = '';
        switch(contextType) {
            case 'background': challengeText = `📖 背景提示：<br>${poem.background ? poem.background.substring(0, 60) + '...' : '这是一首' + poem.dynasty + '代' + poem.author + '的诗'}`; break;
            case 'author': challengeText = `👤 作者：${poem.dynasty} · ${poem.author}<br>🏷️ 标签：${poem.tags.join('、')}`; break;
            case 'tags': challengeText = `🏷️ 主题：${poem.tags.join('、')}<br>提示：上句是"${poem.up.substring(0, 2)}..."`; break;
        }

        content.innerHTML = `
            <div class="challenge-context">
                <div class="challenge-title">🎯 挑战模式</div>
                <div class="challenge-desc">${challengeText}</div>
            </div>
            <div class="poem-display">
                <div class="poem-text" style="font-size: 24px;">请根据提示选择正确的下句</div>
            </div>
            <div class="options-grid" id="challengeOptions"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('challengeOptions');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkChallengeAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }
    checkChallengeAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(15);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
            setTimeout(() => this.generateChallengeQuestion(), 3000);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateChallengeQuestion(), 1800);
        }
        this.updateUI();
    }

    // 配对模式
    initMatchMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="match-container">
                <canvas id="matchCanvas"></canvas>
                <div class="match-area" id="matchArea">
                    <div class="match-column" id="leftColumn"><div class="column-title">诗句上句</div></div>
                    <div class="match-column" id="rightColumn"><div class="column-title">作者 / 下句</div></div>
                </div>
            </div>
        `;
        this.initCanvas();
        this.generateMatchGame();
    }
    initCanvas() {
        const canvas = document.getElementById('matchCanvas');
        if (!canvas) return;
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
    }
    resizeCanvas() {
        if (!this.canvas) return;
        const container = document.querySelector('.match-container');
        if (container) { this.canvas.width = container.offsetWidth; this.canvas.height = container.offsetHeight; }
    }
    generateMatchGame() {
        let pairCount = Math.min(3 + Math.floor(this.state.score / 50), 5);
        const pool = PoemDatabase.query({limit: pairCount * 2});
        const selected = pool.slice(0, pairCount);
        this.matchState = {poems: selected, selectedLeft: null, selectedRight: null, matched: 0, target: pairCount, isProcessing: false};

        const leftCol = document.getElementById('leftColumn');
        const rightCol = document.getElementById('rightColumn');
        leftCol.innerHTML = '<div class="column-title">诗句上句</div>';
        rightCol.innerHTML = '<div class="column-title">作者 / 下句</div>';

        selected.forEach((poem, idx) => {
            const item = document.createElement('div');
            item.className = 'match-item';
            item.textContent = poem.up;
            item.dataset.index = idx;
            item.onclick = () => this.selectMatchItem(item, 'left');
            leftCol.appendChild(item);
        });

        const rightItems = [];
        selected.forEach((poem, idx) => {
            rightItems.push({text: poem.author, index: idx, type: 'author'});
            rightItems.push({text: poem.down, index: idx, type: 'down'});
        });
        rightItems.sort(() => Math.random() - 0.5);
        rightItems.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'match-item';
            div.textContent = item.text;
            div.dataset.index = item.index;
            div.dataset.type = item.type;
            div.onclick = () => this.selectMatchItem(div, 'right');
            rightCol.appendChild(div);
        });
    }
    selectMatchItem(item, side) {
        if (this.matchState.isProcessing || item.classList.contains('matched')) return;
        document.querySelectorAll(`[data-side="${side}"]`).forEach(el => { if (!el.classList.contains('matched')) el.classList.remove('selected'); });
        item.classList.add('selected');
        if (side === 'left') this.matchState.selectedLeft = item; else this.matchState.selectedRight = item;
        if (this.matchState.selectedLeft && this.matchState.selectedRight) this.checkMatch();
    }
    checkMatch() {
        const state = this.matchState;
        state.isProcessing = true;
        const leftIdx = parseInt(state.selectedLeft.dataset.index);
        const rightIdx = parseInt(state.selectedRight.dataset.index);
        if (leftIdx === rightIdx) {
            state.selectedLeft.classList.remove('selected'); state.selectedRight.classList.remove('selected');
            state.selectedLeft.classList.add('matched'); state.selectedRight.classList.add('matched');
            if (window.innerWidth > 768) this.drawMatchLine(state.selectedLeft, state.selectedRight);
            this.sound.play('correct');
            this.state.addScore(10);
            state.matched++;
            if (state.matched >= state.target) {
                this.sound.play('combo');
                setTimeout(() => this.generateMatchGame(), 1500);
            } else { state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false; }
        } else {
            state.selectedLeft.classList.add('wrong'); state.selectedRight.classList.add('wrong');
            this.sound.play('wrong');
            setTimeout(() => {
                state.selectedLeft.classList.remove('wrong', 'selected');
                state.selectedRight.classList.remove('wrong', 'selected');
                state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false;
            }, 800);
        }
        this.updateUI();
    }
    drawMatchLine(leftItem, rightItem) {
        if (!this.ctx) return;
        const container = document.querySelector('.match-container').getBoundingClientRect();
        const leftRect = leftItem.getBoundingClientRect();
        const rightRect = rightItem.getBoundingClientRect();
        const startX = leftRect.right - container.left;
        const startY = leftRect.top + leftRect.height / 2 - container.top;
        const endX = rightRect.left - container.left;
        const endY = rightRect.top + rightRect.height / 2 - container.top;
        const cpX = (startX + endX) / 2;
        this.ctx.beginPath();
        this.ctx.moveTo(startX, startY);
        this.ctx.quadraticCurveTo(cpX, startY, cpX, (startY + endY) / 2);
        this.ctx.quadraticCurveTo(cpX, endY, endX, endY);
        this.ctx.strokeStyle = '#2e7d32'; this.ctx.lineWidth = 3; this.ctx.stroke();
        setTimeout(() => this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height), 1000);
    }

    // 飞花令
    initFeihuaMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="feihuaContent"></div>`;
        this.generateFeihuaQuestion();
    }
    generateFeihuaQuestion() {
        if (this.state.hearts <= 0) return;
        const keyword = PoemDatabase.keywords[Math.floor(Math.random() * PoemDatabase.keywords.length)];
        const matching = PoemDatabase.query({requireKeyword: keyword, limit: 8});
        if (matching.length < 4) { this.generateFeihuaQuestion(); return; }

        const selected = matching[0];
        const isUp = selected.up.includes(keyword);
        const displayText = isUp ? selected.down : selected.up;
        const answer = isUp ? selected.up : selected.down;
        this.currentQuestion = {answer, keyword, poem: selected, type: 'feihua'};

        document.getElementById('feihuaContent').innerHTML = `
            <div style="text-align: center;">
                <div class="feihua-keyword">${keyword}</div>
                <div class="feihua-context">请选出含有"${keyword}"字的诗句</div>
            </div>
            <div class="poem-display" style="min-height: 80px;"><div class="poem-text">${displayText}</div></div>
            <div class="options-grid" id="feihuaOptions"></div>
        `;

        const options = [answer];
        const distractors = matching.slice(1).filter(p => p.id !== selected.id);
        for (let i = 0; i < 3 && i < distractors.length; i++) {
            const p = distractors[i];
            const opt = p.up.includes(keyword) ? p.up : p.down;
            if (!options.includes(opt)) options.push(opt);
        }
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            const text = random.up + random.down;
            if (text.includes(keyword) && !options.includes(random.up) && !options.includes(random.down)) {
                options.push(random.up.includes(keyword) ? random.up : random.down);
            }
        }

        const grid = document.getElementById('feihuaOptions');
        options.sort(() => Math.random() - 0.5).forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFeihuaAnswer(card, opt);
            grid.appendChild(card);
        });
    }
    checkFeihuaAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(12);
            if (this.state.addStreak()) this.showComboBonus();
            setTimeout(() => this.generateFeihuaQuestion(), 1200);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFeihuaQuestion(), 1800);
        }
        this.updateUI();
    }

    // 接龙模式
    initChainMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div id="chainContent">
                <div class="poem-display" style="margin-bottom: 20px;">
                    <div class="poem-text" id="chainPrompt">准备开始...</div>
                </div>
                <div class="chain-input-area">
                    <div class="chain-hint">输入下句完成接龙 | 支持同音字容错</div>
                    <input type="text" class="chain-input" id="chainInput" placeholder="请输入下句..." autocomplete="off">
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button class="action-btn" onclick="game.submitChain()" style="background: var(--accent); color: white;">提交</button>
                        <button class="action-btn" onclick="game.skipChain()">跳过 (-5分)</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('chainInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') this.submitChain(); });
        this.generateChainQuestion();
    }
    generateChainQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChainQuestion(); return; }
        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.chainState = {poem, answer: poem.down};
        document.getElementById('chainPrompt').textContent = poem.up;
        const input = document.getElementById('chainInput');
        input.value = '';
        input.classList.remove('correct', 'wrong');
        input.disabled = false;
        input.focus();
    }
    submitChain() {
        if (this.state.isProcessing) return;
        const input = document.getElementById('chainInput');
        const userAnswer = input.value.trim();
        if (!userAnswer) return;
        this.state.isProcessing = true;
        const result = PoemDatabase.fuzzyMatch(userAnswer, this.chainState.answer);
        if (result.match) {
            input.classList.add('correct');
            input.disabled = true;
            this.sound.play('correct');
            let points = result.score < 1 ? 12 : 15;
            this.state.addScore(points);
            if (this.state.addStreak()) this.showComboBonus();
            setTimeout(() => { this.state.isProcessing = false; this.generateChainQuestion(); }, 1500);
        } else {
            input.classList.add('wrong');
            this.sound.play('wrong');
            setTimeout(() => { input.classList.remove('wrong'); this.state.isProcessing = false; }, 500);
        }
        this.updateUI();
    }
    skipChain() {
        if (this.state.score < 5) return;
        this.state.score -= 5;
        this.generateChainQuestion();
        this.updateUI();
    }

    // 学习模式 - 收藏夹
    initLearnMode() {
        const main = document.getElementById('gameMain');
        const collected = Array.from(this.state.collectedPoems).map(id => PoemDatabase.poems.find(p => p.id === id)).filter(Boolean);

        main.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 28px; color: var(--accent); margin-bottom: 10px;">📚 我的收藏</div>
                <div style="color: var(--ink-light);">共收藏 ${collected.length} 首诗词</div>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
        `;

        const grid = document.getElementById('collectionGrid');
        if (collected.length === 0) {
            grid.innerHTML = '<div style="text-align: center; color: var(--ink-light); padding: 40px;">暂无收藏，去游戏中发现喜欢的诗词吧！</div>';
        } else {
            collected.forEach(poem => {
                const card = document.createElement('div');
                card.className = 'collection-card';
                card.innerHTML = `
                    <div class="collection-poem">${poem.up}</div>
                    <div class="collection-author">${poem.dynasty} · ${poem.author}</div>
                    <div class="collection-preview">${poem.down}</div>
                `;
                card.onclick = () => this.showPoemDetail(poem);
                grid.appendChild(card);
            });
        }
    }
    showPoemDetail(poem) {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="learn-panel" style="margin: 0;">
                <div class="learn-header">
                    <div class="learn-title">${poem.up}</div>
                    <button class="learn-close" onclick="game.initLearnMode()">← 返回</button>
                </div>
                <div class="learn-section">
                    <div class="learn-section-title">📝 全诗</div>
                    <div class="learn-content" style="font-family: 'Ma Shan Zheng', cursive; font-size: 24px; line-height: 2;">${poem.fullPoem || poem.up + '，' + poem.down}</div>
                </div>
                <div class="learn-section">
                    <div class="learn-section-title">👤 作者</div>
                    <div class="learn-content">${poem.dynasty} · ${poem.author}</div>
                </div>
                <div class="learn-section">
                    <div class="learn-section-title">📖 创作背景</div>
                    <div class="learn-content">${poem.background || '暂无背景介绍'}</div>
                </div>
                ${poem.note ? `<div class="learn-section"><div class="learn-section-title">💡 注释</div><div class="learn-content">${poem.note}</div></div>` : ''}
                <div class="learn-tags">
                    ${poem.tags.map(tag => `<span class="learn-tag">${tag}</span>`).join('')}
                </div>
            </div>
        `;
    }

    // 通用功能
    showComboBonus() {
        this.sound.play('combo');
        const popup = document.createElement('div');
        popup.className = 'combo-popup';
        popup.textContent = `🔥 ${this.state.streak}连击! +5分!`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
    }
    useHint() {
        if (this.state.mode === 'fill' && this.currentQuestion) {
            if (!this.state.useHint()) { this.showFloatingText('提示次数已用完', '#c62828'); return; }
            document.querySelectorAll('#optionsGrid .option-card, #challengeOptions .option-card').forEach(card => {
                if (card.textContent === this.currentQuestion.answer) {
                    card.classList.add('correct');
                    setTimeout(() => card.classList.remove('correct'), 2000);
                }
            });
            this.updateUI();
        }
    }
    showFloatingText(text, color) {
        const el = document.createElement('div');
        el.className = 'floating-feedback';
        el.style.color = color;
        el.textContent = text;
        el.style.left = '50%'; el.style.top = '40%';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
    gameOver() {
        this.state.save();
        document.getElementById('finalScore').textContent = this.state.score;
        document.getElementById('finalStreak').textContent = this.state.maxStreak;
        document.getElementById('finalCollected').textContent = this.state.collectedPoems.size;
        document.getElementById('gameOverModal').classList.add('active');
    }
    restart() {
        this.state.reset();
        document.getElementById('gameOverModal').classList.remove('active');
        if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.switchMode(this.state.mode);
        this.updateUI();
    }
    updateUI() {
        document.getElementById('scoreValue').textContent = this.state.score;
        document.getElementById('collectValue').textContent = this.state.collectedPoems.size;
        document.querySelectorAll('.heart').forEach((h, i) => h.classList.toggle('lost', i >= this.state.hearts));
        const streakContainer = document.getElementById('streakContainer');
        const streakBadge = document.getElementById('streakBadge');
        if (this.state.streak > 0) { streakContainer.style.display = 'flex'; streakBadge.textContent = `连击 x${this.state.streak}`; }
        else streakContainer.style.display = 'none';
        const hintBtn = document.getElementById('hintBtn');
        if (this.state.mode === 'fill' || this.state.mode === 'challenge') {
            hintBtn.style.display = 'block';
            hintBtn.disabled = this.state.hintsUsed >= this.state.hintLimit || this.state.score < 5;
        } else hintBtn.style.display = 'none';
    }
}

const game = new PoemGame();
window.addEventListener('keydown', (e) => { if (e.code === 'Space' && e.target.tagName !== 'INPUT') e.preventDefault(); });
</script>
