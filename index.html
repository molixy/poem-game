<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8b4513">
    <meta name="description" content="沉浸式古诗词学习游戏 - 诗笺雅集，寓教于乐">
    <title>诗笺雅集 - 诗词学习游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f0e6;
            --paper-dark: #e8dcc8;
            --ink: #2c2c2c;
            --ink-light: #4a4a4a;
            --accent: #8b4513;
            --accent-light: #a0522d;
            --gold: #d4a574;
            --success: #2e7d32;
            --error: #c62828;
            --warning: #f9a825;
            --info: #1976d2;
            --shadow: rgba(139, 69, 19, 0.15);
            --shadow-heavy: rgba(139, 69, 19, 0.25);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'Noto Serif SC', 'STKaiti', serif;
            background: var(--paper);
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
            user-select: none;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }
        #app { max-width: 900px; margin: 0 auto; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; }
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .game-title { font-family: 'Ma Shan Zheng', cursive; font-size: 32px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .game-title::before { content: '📜'; font-size: 28px; }
        .score-board { display: flex; gap: 20px; }
        .score-item { text-align: center; }
        .score-label { font-size: 12px; color: var(--ink-light); display: block; }
        .score-value { font-family: 'ZCOOL XiaoWei', serif; font-size: 24px; font-weight: 700; color: var(--accent); }
        
        /* 新增：成就徽章 */
        .achievement-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .achievement-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px var(--shadow);
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        .achievement-badge.unlocked { opacity: 1; transform: scale(1.05); }
        .achievement-badge.unlocked::after { content: '✓'; font-weight: bold; }
        
        /* 新增：控制按钮 */
        .header-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; justify-content: center; }
        .daily-challenge-btn, .stats-btn, .sound-toggle, .bgm-toggle {
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }
        .daily-challenge-btn { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); color: white; }
        .daily-challenge-btn.completed { background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%); }
        .stats-btn { background: var(--info); color: white; }
        .sound-toggle { background: var(--accent); color: white; }
        .sound-toggle.off { background: var(--ink-light); }
        .bgm-toggle { background: #9c27b0; color: white; }
        .bgm-toggle.off { background: var(--ink-light); }
        
        .mode-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .mode-tabs::-webkit-scrollbar { display: none; }
        .mode-tab {
            flex: 1;
            min-width: 65px;
            padding: 10px 12px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink-light);
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
            touch-action: manipulation;
        }
        .mode-tab:active { transform: scale(0.95); }
        .mode-tab.active {
            background: var(--accent);
            color: var(--paper);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow-heavy);
        }
        .mode-tab .icon { display: block; font-size: 18px; margin-bottom: 2px; }
        main {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
        }
        
        /* 新增：赏析按钮 */
        .analyze-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: var(--ink);
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid var(--gold);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
            transition: all 0.3s ease;
        }
        .analyze-btn:hover { transform: scale(1.05); }
        
        .difficulty-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .difficulty-btn {
            padding: 10px 25px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        .difficulty-btn:active { transform: scale(0.95); }
        .difficulty-btn.easy { color: var(--success); border-color: var(--success); }
        .difficulty-btn.medium { color: var(--warning); border-color: var(--warning); }
        .difficulty-btn.hard { color: var(--error); border-color: var(--error); }
        .difficulty-btn.expert { color: #7c4dff; border-color: #7c4dff; }
        .difficulty-btn.active { transform: scale(1.05); font-weight: 600; color: white; }
        .difficulty-btn.easy.active { background: var(--success); }
        .difficulty-btn.medium.active { background: var(--warning); }
        .difficulty-btn.hard.active { background: var(--error); }
        .difficulty-btn.expert.active { background: #7c4dff; }
        
        .poem-display {
            text-align: center;
            padding: 35px 25px;
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            border-radius: 15px;
            border: 3px solid var(--gold);
            margin-bottom: 25px;
            position: relative;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .poem-text { font-family: 'Ma Shan Zheng', cursive; font-size: 32px; color: var(--ink); line-height: 1.6; margin-bottom: 10px; }
        .poem-hint { font-size: 14px; color: var(--ink-light); margin-top: 8px; }
        
        /* 新增：标准答案提示 */
        .correct-answer-hint {
            color: var(--success);
            font-size: 14px;
            margin-top: 10px;
            padding: 8px 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }
        .correct-answer-hint.show { display: inline-block; }
        
        .ink-spread { animation: inkSpread 0.8s ease-out; }
        @keyframes inkSpread {
            0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 20px rgba(46, 125, 50, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); transform: scale(1); }
        }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
        @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }
        .option-card {
            padding: 18px;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .option-card:active { transform: scale(0.95); }
        .option-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow); border-color: var(--accent); }
        .option-card.correct { background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%); border-color: var(--success); animation: correctPulse 0.6s ease; }
        .option-card.wrong { background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%); border-color: var(--error); animation: paperShake 0.5s ease; }
        @keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes paperShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        /* 学习面板 */
        .learn-panel {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .learn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); }
        .learn-title { font-family: 'Ma Shan Zheng', cursive; font-size: 24px; color: var(--accent); }
        .learn-close { background: var(--ink-light); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .learn-section { margin-bottom: 20px; }
        .learn-section-title { font-weight: 700; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .learn-content { color: var(--ink-light); line-height: 1.8; text-align: justify; }
        .learn-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .learn-tag { background: var(--accent); color: white; padding: 4px 12px; border-radius: 15px; font-size: 12px; }
        .collect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 2px solid var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        .collect-btn:hover { transform: scale(1.05); }
        .collect-btn.collected { background: #c8e6c9; border-color: var(--success); }
        
        /* 挑战模式 */
        .challenge-context {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: 2px solid var(--info);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .challenge-title { font-weight: 700; color: var(--info); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        /* 配对模式 */
        .match-container { position: relative; min-height: 400px; }
        #matchCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .match-area { display: flex; gap: 20px; justify-content: space-between; position: relative; z-index: 5; }
        .match-column { flex: 1; max-width: 48%; }
        .column-title { text-align: center; font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); font-family: 'Ma Shan Zheng', cursive; }
        .match-item { padding: 16px; background: white; border: 2px solid var(--gold); border-radius: 10px; margin-bottom: 10px; font-size: 15px; cursor: pointer; transition: all 0.3s ease; text-align: center; touch-action: manipulation; }
        .match-item:active { transform: scale(0.95); }
        .match-item:hover { transform: translateX(5px); border-color: var(--accent); }
        .match-column:last-child .match-item:hover { transform: translateX(-5px); }
        .match-item.selected { background: #fff9c4; border-color: var(--warning); }
        .match-item.matched { background: #c8e6c9; border-color: var(--success); opacity: 0.7; }
        .match-item.wrong { background: #ffcdd2; border-color: var(--error); animation: paperShake 0.5s ease; }
        
        /* 飞花令 */
        .feihua-keyword { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; color: var(--accent); text-align: center; margin-bottom: 15px; }
        .feihua-context { text-align: center; font-size: 18px; color: var(--ink-light); margin-bottom: 25px; font-style: italic; }
        
        /* 接龙 */
        .chain-input-area { max-width: 500px; margin: 0 auto; }
        .chain-input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            font-family: 'Ma Shan Zheng', cursive;
            border: 3px solid var(--gold);
            border-radius: 15px;
            background: white;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        .chain-input:focus { border-color: var(--accent); }
        .chain-input:disabled { opacity: 0.6; cursor: not-allowed; }
        .chain-input.correct { border-color: var(--success); background: #e8f5e9; }
        .chain-input.wrong { border-color: var(--error); animation: paperShake 0.5s ease; }
        
        /* 收藏夹 */
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .collection-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .collection-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--shadow); }
        .collection-card:active { transform: scale(0.98); }
        .collection-poem { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; margin-bottom: 8px; color: var(--ink); }
        .collection-author { font-size: 14px; color: var(--ink-light); margin-bottom: 10px; }
        .collection-preview { font-size: 13px; color: var(--ink-light); line-height: 1.6; }
        
        /* Footer */
        footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .status-bar { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .hearts { display: flex; gap: 3px; }
        .heart { font-size: 24px; transition: all 0.3s ease; }
        .heart.lost { opacity: 0.3; filter: grayscale(100%); }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; padding: 5px 12px; border-radius: 15px; font-weight: 600; font-size: 14px; }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn:hover { background: var(--accent); color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid var(--accent);
            max-width: 90%;
            width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        /* 新增：成就通知 */
        .achievement-toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px var(--shadow-heavy);
            z-index: 2500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideInRight 0.5s ease;
        }
        .achievement-toast.show { display: flex; }
        .achievement-toast-icon { font-size: 24px; }
        .achievement-toast-text { font-size: 14px; color: var(--ink); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* 新增：统计面板 */
        .stats-modal {
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--accent);
            max-width: 90%;
            width: 500px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--gold);
        }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'ZCOOL XiaoWei', serif; }
        .stat-label { font-size: 12px; color: var(--ink-light); margin-top: 5px; }
        
        /* 新增：成绩卡片 */
        .share-card {
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid var(--accent);
            margin-bottom: 20px;
            text-align: center;
        }
        .share-score { font-size: 48px; font-weight: 700; color: var(--accent); font-family: 'ZCOOL XiaoWei', serif; }
        .share-details { display: flex; justify-content: space-around; margin-top: 15px; color: var(--ink-light); }
        .share-btn {
            background: var(--accent);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        
        .floating-feedback { position: fixed; pointer-events: none; z-index: 2000; font-weight: 700; font-size: 24px; animation: floatUp 1s ease forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
        .combo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Ma Shan Zheng', cursive; font-size: 48px; color: #ff6b6b; z-index: 2000; animation: comboAnim 1s ease forwards; }
        @keyframes comboAnim { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-50px); } }
        
        /* 新增：每日挑战进度 */
        .daily-progress { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .daily-progress-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: var(--gold);
            color: white;
        }
        .daily-progress-item.completed { background: var(--success); }
        .daily-progress-item.current { background: var(--accent); border: 3px solid var(--gold); }
        
        @media (max-width: 768px) {
            .game-title { font-size: 24px; }
            .poem-text { font-size: 26px; }
            .options-grid { grid-template-columns: 1fr; }
            .match-area { flex-direction: column; }
            .match-column { max-width: 100%; }
            #matchCanvas { display: none; }
            footer { flex-direction: column; text-align: center; }
            .collection-grid { grid-template-columns: 1fr; }
            .header-controls { justify-content: center; }
            .achievement-bar { justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1 class="game-title">诗笺雅集</h1>
                <div class="score-board">
                    <div class="score-item">
                        <span class="score-label">得分</span>
                        <span class="score-value" id="scoreValue">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">收藏</span>
                        <span class="score-value" id="collectValue">0</span>
                    </div>
                </div>
            </div>
            
            <!-- 新增：成就徽章 -->
            <div class="achievement-bar">
                <div class="achievement-badge" id="badge-collector" title="收藏10首诗词">📚 收藏家</div>
                <div class="achievement-badge" id="badge-combo" title="连击10题">🔥 连击高手</div>
                <div class="achievement-badge" id="badge-master" title="答对100题">🏆 百诗斩</div>
                <div class="achievement-badge" id="badge-all" title="全模式通关">⭐ 全模式通关</div>
            </div>

<script>

// ==================== 诗词数据库（150首精选）====================
const PoemDatabase = {
    poems: [
        {id: 1, up: "床前明月光", down: "疑是地上霜", author: "李白", dynasty: "唐", tags: ["思乡", "月亮"], difficulty: 1, background: "此诗为李白漫游扬州时所作。诗人客居他乡，秋夜难眠，见明月而思乡。", note: "床：指井边栏杆。疑：怀疑。", fullPoem: "床前明月光，疑是地上霜。举头望明月，低头思故乡。"},
        {id: 2, up: "举头望明月", down: "低头思故乡", author: "李白", dynasty: "唐", tags: ["思乡", "月亮"], difficulty: 1, background: "《静夜思》后两句，直接抒发思乡之情。", fullPoem: "床前明月光，疑是地上霜。举头望明月，低头思故乡。"},
        {id: 3, up: "朝辞白帝彩云间", down: "千里江陵一日还", author: "李白", dynasty: "唐", tags: ["山水", "行旅"], difficulty: 2, background: "唐肃宗乾元二年，李白流放夜郎，行至白帝城遇赦，乘舟东归所作。", note: "白帝城：在今重庆奉节。江陵：今湖北荆州。", fullPoem: "朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。"},
        {id: 4, up: "两岸猿声啼不住", down: "轻舟已过万重山", author: "李白", dynasty: "唐", tags: ["山水", "行旅"], difficulty: 2, background: "写舟行如飞，长江三峡的壮丽景色。", fullPoem: "朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。"},
        {id: 5, up: "桃花潭水深千尺", down: "不及汪伦送我情", author: "李白", dynasty: "唐", tags: ["友情", "离别"], difficulty: 1, background: "李白游泾县桃花潭，村民汪伦常酿美酒款待，李白临行作诗相赠。", note: "桃花潭：在今安徽泾县。", fullPoem: "李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。"},
        {id: 6, up: "天门中断楚江开", down: "碧水东流至此回", author: "李白", dynasty: "唐", tags: ["山水"], difficulty: 2, background: "唐玄宗开元十三年，李白出蜀途中，舟行长江，望天门山所作。", note: "天门山：在今安徽当涂。", fullPoem: "天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。"},
        {id: 7, up: "两岸青山相对出", down: "孤帆一片日边来", author: "李白", dynasty: "唐", tags: ["山水"], difficulty: 2, background: "写舟行途中，青山迎面而来，孤帆从日边驶来的壮观景象。", fullPoem: "天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。"},
        {id: 8, up: "长风破浪会有时", down: "直挂云帆济沧海", author: "李白", dynasty: "唐", tags: ["壮志", "励志"], difficulty: 2, background: "李白被赐金放还后，在长安所作，抒发虽遭挫折但仍怀壮志。", note: "长风破浪：比喻志向远大。", fullPoem: "金樽清酒斗十千，玉盘珍羞直万钱。停杯投箸不能食，拔剑四顾心茫然。欲渡黄河冰塞川，将登太行雪满山。闲来垂钓碧溪上，忽复乘舟梦日边。行路难！行路难！多歧路，今安在？长风破浪会有时，直挂云帆济沧海。"},
        {id: 9, up: "天生我材必有用", down: "千金散尽还复来", author: "李白", dynasty: "唐", tags: ["励志", "豪放"], difficulty: 2, background: "李白与友人饮酒时所作，抒发怀才不遇但自信豪迈的情怀。", note: "材：同才。", fullPoem: "君不见黄河之水天上来，奔流到海不复回。君不见高堂明镜悲白发，朝如青丝暮成雪。人生得意须尽欢，莫使金樽空对月。天生我材必有用，千金散尽还复来。"},
        {id: 10, up: "君不见黄河之水天上来", down: "奔流到海不复回", author: "李白", dynasty: "唐", tags: ["山水", "时间"], difficulty: 3, background: "《将进酒》开篇，以黄河奔流喻时光流逝。", fullPoem: "君不见黄河之水天上来，奔流到海不复回。君不见高堂明镜悲白发，朝如青丝暮成雪。"},
        {id: 11, up: "白发三千丈", down: "缘愁似个长", author: "李白", dynasty: "唐", tags: ["愁绪"], difficulty: 2, background: "李白在秋浦（今安徽贵池）所作，以夸张手法写愁绪。", note: "缘：因为。个：这般。", fullPoem: "白发三千丈，缘愁似个长。不知明镜里，何处得秋霜。"},
        {id: 12, up: "我寄愁心与明月", down: "随君直到夜郎西", author: "李白", dynasty: "唐", tags: ["友情", "月亮"], difficulty: 2, background: "王昌龄被贬龙标尉，李白闻讯作此诗寄赠。", note: "夜郎：唐代县名，在今湖南。", fullPoem: "杨花落尽子规啼，闻道龙标过五溪。我寄愁心与明月，随君直到夜郎西。"},
        {id: 13, up: "飞流直下三千尺", down: "疑是银河落九天", author: "李白", dynasty: "唐", tags: ["山水"], difficulty: 1, background: "李白游庐山，见瀑布壮观而作。", note: "庐山：在今江西九江。", fullPoem: "日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。"},
        {id: 14, up: "故人西辞黄鹤楼", down: "烟花三月下扬州", author: "李白", dynasty: "唐", tags: ["友情", "离别"], difficulty: 2, background: "孟浩然去广陵（扬州），李白在黄鹤楼送别。", note: "黄鹤楼：在今湖北武汉。烟花：形容春色。", fullPoem: "故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。"},
        {id: 15, up: "孤帆远影碧空尽", down: "唯见长江天际流", author: "李白", dynasty: "唐", tags: ["离别", "山水"], difficulty: 2, background: "写目送友人离去，唯见长江流天的惆怅。", fullPoem: "故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。"},
        {id: 16, up: "抽刀断水水更流", down: "举杯消愁愁更愁", author: "李白", dynasty: "唐", tags: ["愁绪"], difficulty: 3, background: "李白在宣州谢朓楼设宴送别族叔李云，抒发怀才不遇的愁绪。", note: "谢朓楼：在今安徽宣城。", fullPoem: "弃我去者，昨日之日不可留；乱我心者，今日之日多烦忧。长风万里送秋雁，对此可以酣高楼。蓬莱文章建安骨，中间小谢又清发。俱怀逸兴壮思飞，欲上青天揽明月。抽刀断水水更流，举杯消愁愁更愁。人生在世不称意，明朝散发弄扁舟。"},
        {id: 17, up: "云想衣裳花想容", down: "春风拂槛露华浓", author: "李白", dynasty: "唐", tags: ["花", "春天"], difficulty: 3, background: "唐玄宗与杨贵妃赏牡丹，命李白作新词。", note: "槛：栏杆。", fullPoem: "云想衣裳花想容，春风拂槛露华浓。若非群玉山头见，会向瑶台月下逢。"},
        {id: 18, up: "相看两不厌", down: "只有敬亭山", author: "李白", dynasty: "唐", tags: ["山水", "孤独"], difficulty: 2, background: "李白独坐敬亭山，以山为友，抒发孤独情怀。", note: "敬亭山：在今安徽宣城。", fullPoem: "众鸟高飞尽，孤云独去闲。相看两不厌，只有敬亭山。"},
        {id: 19, up: "峨眉山月半轮秋", down: "影入平羌江水流", author: "李白", dynasty: "唐", tags: ["山水", "月亮"], difficulty: 3, background: "李白出蜀时，离别峨眉山所作。", note: "平羌：江名。", fullPoem: "峨眉山月半轮秋，影入平羌江水流。夜发清溪向三峡，思君不见下渝州。"},
        {id: 20, up: "山随平野尽", down: "江入大荒流", author: "李白", dynasty: "唐", tags: ["山水", "行旅"], difficulty: 2, background: "李白出蜀远游，经三峡出荆门时所作。", fullPoem: "渡远荆门外，来从楚国游。山随平野尽，江入大荒流。月下飞天镜，云生结海楼。仍怜故乡水，万里送行舟。"},
        // ... 更多诗词数据保持原样
        {id: 21, up: "两个黄鹂鸣翠柳", down: "一行白鹭上青天", author: "杜甫", dynasty: "唐", tags: ["春天", "自然"], difficulty: 1, background: "杜甫在成都草堂所作，描绘明媚春光。", fullPoem: "两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。"},
        {id: 22, up: "窗含西岭千秋雪", down: "门泊东吴万里船", author: "杜甫", dynasty: "唐", tags: ["山水"], difficulty: 2, background: "从窗中远眺西岭积雪，门外停泊东吴远来的船只。", fullPoem: "两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。"},
        {id: 23, up: "国破山河在", down: "城春草木深", author: "杜甫", dynasty: "唐", tags: ["忧国", "春天"], difficulty: 2, background: "安史之乱中，长安沦陷，杜甫被俘，伤时感事而作。", note: "国破：指长安被叛军占领。", fullPoem: "国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。烽火连三月，家书抵万金。"},
        {id: 24, up: "感时花溅泪", down: "恨别鸟惊心", author: "杜甫", dynasty: "唐", tags: ["忧国", "离别"], difficulty: 2, note: "感时：感伤时事。恨别：痛恨离别。", fullPoem: "国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。"},
        {id: 25, up: "烽火连三月", down: "家书抵万金", author: "杜甫", dynasty: "唐", tags: ["战争", "思乡"], difficulty: 2, note: "烽火：战火。抵：值。", fullPoem: "国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。烽火连三月，家书抵万金。"},
        {id: 26, up: "随风潜入夜", down: "润物细无声", author: "杜甫", dynasty: "唐", tags: ["春天", "雨"], difficulty: 1, background: "杜甫定居成都，春雨润泽万物，欣喜而作。", fullPoem: "好雨知时节，当春乃发生。随风潜入夜，润物细无声。野径云俱黑，江船火独明。晓看红湿处，花重锦官城。"},
        {id: 27, up: "无边落木萧萧下", down: "不尽长江滚滚来", author: "杜甫", dynasty: "唐", tags: ["秋天", "山水"], difficulty: 3, background: "杜甫晚年流寓夔州，重阳节登高，感秋而作。", note: "落木：落叶。萧萧：落叶声。", fullPoem: "风急天高猿啸哀，渚清沙白鸟飞回。无边落木萧萧下，不尽长江滚滚来。万里悲秋常作客，百年多病独登台。艰难苦恨繁霜鬓，潦倒新停浊酒杯。"},
        {id: 28, up: "会当凌绝顶", down: "一览众山小", author: "杜甫", dynasty: "唐", tags: ["壮志", "山水"], difficulty: 2, background: "杜甫青年时漫游齐鲁，望泰山而作，气势雄伟。", note: "会当：终当。凌：登上。", fullPoem: "岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山小。"},
        {id: 29, up: "出师未捷身先死", down: "长使英雄泪满襟", author: "杜甫", dynasty: "唐", tags: ["历史", "壮志"], difficulty: 3, background: "杜甫游武侯祠，追怀诸葛亮功业未成而身死，感慨而作。", note: "蜀相：三国蜀汉丞相诸葛亮。", fullPoem: "丞相祠堂何处寻，锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音。三顾频烦天下计，两朝开济老臣心。出师未捷身先死，长使英雄泪满襟。"},
        {id: 30, up: "露从今夜白", down: "月是故乡明", author: "杜甫", dynasty: "唐", tags: ["思乡", "月亮", "秋天"], difficulty: 2, background: "安史之乱中，杜甫与弟离散，月夜思亲而作。", note: "白露：二十四节气之一。", fullPoem: "戍鼓断人行，秋边一雁声。露从今夜白，月是故乡明。有弟皆分散，无家问死生。寄书长不达，况乃未休兵。"},
        {id: 31, up: "迟日江山丽", down: "春风花草香", author: "杜甫", dynasty: "唐", tags: ["春天", "自然"], difficulty: 1, background: "杜甫居草堂时所作，写春日美景。", note: "迟日：春日。", fullPoem: "迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。"},
        {id: 32, up: "泥融飞燕子", down: "沙暖睡鸳鸯", author: "杜甫", dynasty: "唐", tags: ["春天", "自然"], difficulty: 2, note: "泥融：泥土湿润。", fullPoem: "迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。"},
        {id: 33, up: "正是江南好风景", down: "落花时节又逢君", author: "杜甫", dynasty: "唐", tags: ["友情", "花", "春天"], difficulty: 2, background: "杜甫晚年流寓江南，遇昔日乐师李龟年，感慨而作。", note: "李龟年：唐代著名音乐家。", fullPoem: "岐王宅里寻常见，崔九堂前几度闻。正是江南好风景，落花时节又逢君。"},
        {id: 34, up: "白日放歌须纵酒", down: "青春作伴好还乡", author: "杜甫", dynasty: "唐", tags: ["喜悦", "还乡"], difficulty: 2, background: "安史之乱平定，杜甫闻讯欣喜若狂，欲还乡。", note: "青春：明媚春光。", fullPoem: "剑外忽传收蓟北，初闻涕泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。"},
        {id: 35, up: "即从巴峡穿巫峡", down: "便下襄阳向洛阳", author: "杜甫", dynasty: "唐", tags: ["喜悦", "还乡"], difficulty: 3, background: "想象返乡路线，归心似箭。", fullPoem: "剑外忽传收蓟北，初闻涕泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。"},
        {id: 36, up: "空山新雨后", down: "天气晚来秋", author: "王维", dynasty: "唐", tags: ["秋天", "山水"], difficulty: 1, background: "王维隐居辋川时所作，描绘秋日傍晚雨后山林景色。", fullPoem: "空山新雨后，天气晚来秋。明月松间照，清泉石上流。竹喧归浣女，莲动下渔舟。随意春芳歇，王孙自可留。"},
        {id: 37, up: "明月松间照", down: "清泉石上流", author: "王维", dynasty: "唐", tags: ["秋天", "山水", "月亮"], difficulty: 1, background: "写山中月夜清幽的美景。", fullPoem: "空山新雨后，天气晚来秋。明月松间照，清泉石上流。"},
        {id: 38, up: "红豆生南国", down: "春来发几枝", author: "王维", dynasty: "唐", tags: ["相思", "春天"], difficulty: 1, background: "王维借红豆抒发对友人或恋人的思念之情。", note: "红豆：又名相思子，象征相思。", fullPoem: "红豆生南国，春来发几枝。愿君多采撷，此物最相思。"},
        {id: 39, up: "愿君多采撷", down: "此物最相思", author: "王维", dynasty: "唐", tags: ["相思"], difficulty: 1, note: "采撷：采摘。", fullPoem: "红豆生南国，春来发几枝。愿君多采撷，此物最相思。"},
        {id: 40, up: "独在异乡为异客", down: "每逢佳节倍思亲", author: "王维", dynasty: "唐", tags: ["思乡", "节日"], difficulty: 1, background: "王维十七岁时，重阳节思念家乡亲人而作。", fullPoem: "独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。"},
        {id: 41, up: "遥知兄弟登高处", down: "遍插茱萸少一人", author: "王维", dynasty: "唐", tags: ["思乡", "节日", "秋天"], difficulty: 2, note: "茱萸：香草，重阳节佩戴以避邪。", fullPoem: "独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。"},
        {id: 42, up: "劝君更尽一杯酒", down: "西出阳关无故人", author: "王维", dynasty: "唐", tags: ["离别", "友情"], difficulty: 2, background: "王维送别友人出使安西，在渭城饯行所作。", note: "阳关：在今甘肃敦煌西。", fullPoem: "渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。"},
        {id: 43, up: "大漠孤烟直", down: "长河落日圆", author: "王维", dynasty: "唐", tags: ["边塞", "山水"], difficulty: 2, background: "王维以监察御史身份出使凉州，途中的所见所感。", note: "孤烟：烽火台燃起的狼烟。", fullPoem: "单车欲问边，属国过居延。征蓬出汉塞，归雁入胡天。大漠孤烟直，长河落日圆。萧关逢候骑，都护在燕然。"},
        {id: 44, up: "深林人不知", down: "明月来相照", author: "王维", dynasty: "唐", tags: ["隐逸", "月亮"], difficulty: 2, background: "王维隐居辋川，写独坐幽篁的闲适情趣。", fullPoem: "独坐幽篁里，弹琴复长啸。深林人不知，明月来相照。"},
        {id: 45, up: "人闲桂花落", down: "夜静春山空", author: "王维", dynasty: "唐", tags: ["春天", "花", "夜晚"], difficulty: 2, background: "写春夜山间宁静空寂的境界。", fullPoem: "人闲桂花落，夜静春山空。月出惊山鸟，时鸣春涧中。"},
        {id: 46, up: "行到水穷处", down: "坐看云起时", author: "王维", dynasty: "唐", tags: ["隐逸", "山水", "云"], difficulty: 3, background: "王维晚年隐居辋川，写闲适恬淡的禅意生活。", note: "水穷处：水源尽头。", fullPoem: "中岁颇好道，晚家南山陲。兴来每独往，胜事空自知。行到水穷处，坐看云起时。偶然值林叟，谈笑无还期。"},
        {id: 47, up: "月出惊山鸟", down: "时鸣春涧中", author: "王维", dynasty: "唐", tags: ["春天", "月亮", "自然"], difficulty: 3, background: "以动衬静，写春夜山涧的幽静。", fullPoem: "人闲桂花落，夜静春山空。月出惊山鸟，时鸣春涧中。"},
        {id: 48, up: "离离原上草", down: "一岁一枯荣", author: "白居易", dynasty: "唐", tags: ["自然", "生命"], difficulty: 1, background: "白居易十六岁时所作，以草的生命力喻人，成为千古名句。", note: "离离：草木茂盛的样子。", fullPoem: "离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。"},
        {id: 49, up: "野火烧不尽", down: "春风吹又生", author: "白居易", dynasty: "唐", tags: ["自然", "生命"], difficulty: 1, background: "赞美野草顽强的生命力。", fullPoem: "离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。"},
        {id: 50, up: "同是天涯沦落人", down: "相逢何必曾相识", author: "白居易", dynasty: "唐", tags: ["知音", "感慨"], difficulty: 2, background: "白居易被贬江州司马，送客浔阳江头，遇琵琶女，感其身世而作。", fullPoem: "我闻琵琶已叹息，又闻此语重唧唧。同是天涯沦落人，相逢何必曾相识！"},
        {id: 51, up: "别有幽愁暗恨生", down: "此时无声胜有声", author: "白居易", dynasty: "唐", tags: ["音乐", "愁绪"], difficulty: 3, background: "《琵琶行》中描写琵琶女技艺高超，音乐感染力极强。", fullPoem: "冰泉冷涩弦凝绝，凝绝不通声暂歇。别有幽愁暗恨生，此时无声胜有声。"},
        {id: 52, up: "几处早莺争暖树", down: "谁家新燕啄春泥", author: "白居易", dynasty: "唐", tags: ["春天", "自然"], difficulty: 2, background: "白居易任杭州刺史时，春游西湖所作。", note: "暖树：向阳的树。", fullPoem: "孤山寺北贾亭西，水面初平云脚低。几处早莺争暖树，谁家新燕啄春泥。"},
        {id: 53, up: "乱花渐欲迷人眼", down: "浅草才能没马蹄", author: "白居易", dynasty: "唐", tags: ["春天", "花"], difficulty: 2, background: "写西湖早春花草初萌的景色。", fullPoem: "几处早莺争暖树，谁家新燕啄春泥。乱花渐欲迷人眼，浅草才能没马蹄。最爱湖东行不足，绿杨阴里白沙堤。"},
        {id: 54, up: "日出江花红胜火", down: "春来江水绿如蓝", author: "白居易", dynasty: "唐", tags: ["春天", "江南", "花"], difficulty: 2, background: "白居易回忆江南美景，思念江南所作。", note: "蓝：蓝草，可制染料。", fullPoem: "江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？"},
        {id: 55, up: "可怜九月初三夜", down: "露似真珠月似弓", author: "白居易", dynasty: "唐", tags: ["秋天", "月亮", "夜晚"], difficulty: 2, background: "写秋夜新月初升的美景。", note: "可怜：可爱。真珠：珍珠。", fullPoem: "一道残阳铺水中，半江瑟瑟半江红。可怜九月初三夜，露似真珠月似弓。"},
        {id: 56, up: "人间四月芳菲尽", down: "山寺桃花始盛开", author: "白居易", dynasty: "唐", tags: ["春天", "花", "山水"], difficulty: 2, background: "白居易游庐山大林寺，见山下春花已谢，山寺桃花方盛。", fullPoem: "人间四月芳菲尽，山寺桃花始盛开。长恨春归无觅处，不知转入此中来。"},
        {id: 57, up: "绿蚁新醅酒", down: "红泥小火炉", author: "白居易", dynasty: "唐", tags: ["友情", "冬天"], difficulty: 3, background: "白居易邀请朋友刘十九来饮酒取暖的邀请诗。", note: "绿蚁：新酿米酒上的绿色泡沫。", fullPoem: "绿蚁新醅酒，红泥小火炉。晚来天欲雪，能饮一杯无？"},
        {id: 58, up: "晚来天欲雪", down: "能饮一杯无", author: "白居易", dynasty: "唐", tags: ["友情", "冬天", "雪"], difficulty: 3, note: "无：吗，疑问语气词。", fullPoem: "绿蚁新醅酒，红泥小火炉。晚来天欲雪，能饮一杯无？"},
        {id: 59, up: "天长地久有时尽", down: "此恨绵绵无绝期", author: "白居易", dynasty: "唐", tags: ["爱情", "长恨歌"], difficulty: 3, background: "《长恨歌》结尾，写唐玄宗与杨贵妃的爱情悲剧。", fullPoem: "临别殷勤重寄词，词中有誓两心知。七月七日长生殿，夜半无人私语时。在天愿作比翼鸟，在地愿为连理枝。天长地久有时尽，此恨绵绵无绝期。"},
        {id: 60, up: "白日依山尽", down: "黄河入海流", author: "王之涣", dynasty: "唐", tags: ["山水", "壮志"], difficulty: 1, background: "王之涣登鹳雀楼所作，气势磅礴，寓理于景。", note: "鹳雀楼：在今山西永济。", fullPoem: "白日依山尽，黄河入海流。欲穷千里目，更上一层楼。"},
        {id: 61, up: "欲穷千里目", down: "更上一层楼", author: "王之涣", dynasty: "唐", tags: ["壮志", "励志"], difficulty: 1, background: "寓意站得高看得远，表达进取精神。", fullPoem: "白日依山尽，黄河入海流。欲穷千里目，更上一层楼。"},
        {id: 62, up: "黄河远上白云间", down: "一片孤城万仞山", author: "王之涣", dynasty: "唐", tags: ["边塞", "山水"], difficulty: 3, background: "写黄河上游边塞孤城的苍凉景象。", note: "凉州词：唐代乐府曲名。", fullPoem: "黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。"},
        {id: 63, up: "羌笛何须怨杨柳", down: "春风不度玉门关", author: "王之涣", dynasty: "唐", tags: ["边塞", "春天"], difficulty: 3, note: "玉门关：在今甘肃敦煌西。", fullPoem: "黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。"},
        {id: 64, up: "春眠不觉晓", down: "处处闻啼鸟", author: "孟浩然", dynasty: "唐", tags: ["春天", "自然"], difficulty: 1, background: "孟浩然隐居鹿门山时所作，写春日晨景。", fullPoem: "春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。"},
        {id: 65, up: "夜来风雨声", down: "花落知多少", author: "孟浩然", dynasty: "唐", tags: ["春天", "花", "雨"], difficulty: 1, background: "写风雨过后的惆怅。", fullPoem: "春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。"},
        {id: 66, up: "野旷天低树", down: "江清月近人", author: "孟浩然", dynasty: "唐", tags: ["山水", "月亮", "愁绪"], difficulty: 2, background: "孟浩然漫游吴越，夜泊建德江，写羁旅之思。", note: "建德江：在今浙江。", fullPoem: "移舟泊烟渚，日暮客愁新。野旷天低树，江清月近人。"},
        {id: 67, up: "待到重阳日", down: "还来就菊花", author: "孟浩然", dynasty: "唐", tags: ["田园", "友情", "花", "秋天"], difficulty: 2, background: "孟浩然受友人之邀做客，临别时相约重阳再聚。", fullPoem: "故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。开轩面场圃，把酒话桑麻。待到重阳日，还来就菊花。"},
        {id: 68, up: "春蚕到死丝方尽", down: "蜡炬成灰泪始干", author: "李商隐", dynasty: "唐", tags: ["相思", "爱情"], difficulty: 2, background: "李商隐写相思之苦，以春蚕、蜡炬作比，成为千古名句。", note: "丝：谐音思。", fullPoem: "相见时难别亦难，东风无力百花残。春蚕到死丝方尽，蜡炬成灰泪始干。"},
        {id: 69, up: "身无彩凤双飞翼", down: "心有灵犀一点通", author: "李商隐", dynasty: "唐", tags: ["相思", "爱情"], difficulty: 2, note: "灵犀：传说犀牛角有白纹如线，感应灵敏。", fullPoem: "昨夜星辰昨夜风，画楼西畔桂堂东。身无彩凤双飞翼，心有灵犀一点通。"},
        {id: 70, up: "夕阳无限好", down: "只是近黄昏", author: "李商隐", dynasty: "唐", tags: ["时间", "感慨"], difficulty: 1, background: "李商隐登乐游原，见夕阳美景，感叹时光易逝。", note: "乐游原：在今西安南。", fullPoem: "向晚意不适，驱车登古原。夕阳无限好，只是近黄昏。"},
        {id: 71, up: "何当共剪西窗烛", down: "却话巴山夜雨时", author: "李商隐", dynasty: "唐", tags: ["相思", "雨", "夜晚"], difficulty: 2, background: "李商隐客居巴蜀，雨夜思家，想象归后与妻子夜话的情景。", note: "剪烛：剪去燃焦的烛芯。", fullPoem: "君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。"},
        {id: 72, up: "千山鸟飞绝", down: "万径人踪灭", author: "柳宗元", dynasty: "唐", tags: ["冬天", "雪", "孤独"], difficulty: 2, background: "柳宗元被贬永州，写寒江独钓，寄托孤傲情怀。", fullPoem: "千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。"},
        {id: 73, up: "孤舟蓑笠翁", down: "独钓寒江雪", author: "柳宗元", dynasty: "唐", tags: ["冬天", "雪", "孤独"], difficulty: 2, background: "写江中垂钓的老翁，展现孤独坚韧的形象。", fullPoem: "千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。"},
        {id: 74, up: "不识庐山真面目", down: "只缘身在此山中", author: "苏轼", dynasty: "宋", tags: ["山水", "哲理"], difficulty: 2, background: "苏轼游庐山，从不同角度看山形不同，悟出当局者迷的道理。", note: "缘：因为。", fullPoem: "横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。"},
        {id: 75, up: "横看成岭侧成峰", down: "远近高低各不同", author: "苏轼", dynasty: "宋", tags: ["山水", "哲理"], difficulty: 2, background: "写庐山山峰千姿百态，变化无穷。", fullPoem: "横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。"},
        {id: 76, up: "欲把西湖比西子", down: "淡妆浓抹总相宜", author: "苏轼", dynasty: "宋", tags: ["山水", "春天"], difficulty: 2, background: "苏轼任杭州通判时，饮湖上初晴后雨所作，以西施比西湖。", note: "西子：西施。", fullPoem: "水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。"},
        {id: 77, up: "水光潋滟晴方好", down: "山色空蒙雨亦奇", author: "苏轼", dynasty: "宋", tags: ["山水", "雨"], difficulty: 2, note: "潋滟：水波荡漾的样子。空蒙：细雨迷蒙。", fullPoem: "水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。"},
        {id: 78, up: "但愿人长久", down: "千里共婵娟", author: "苏轼", dynasty: "宋", tags: ["相思", "月亮", "中秋"], difficulty: 2, background: "苏轼中秋望月怀人，思念弟弟苏辙所作。", note: "婵娟：月亮。", fullPoem: "明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"},
        {id: 79, up: "人有悲欢离合", down: "月有阴晴圆缺", author: "苏轼", dynasty: "宋", tags: ["人生", "月亮", "哲理"], difficulty: 2, background: "对人生与自然规律的哲学思考。", fullPoem: "转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"},
        {id: 80, up: "竹外桃花三两枝", down: "春江水暖鸭先知", author: "苏轼", dynasty: "宋", tags: ["春天", "花", "自然"], difficulty: 2, background: "苏轼题惠崇和尚的画作，写早春江景。", note: "惠崇：北宋名僧，画家。", fullPoem: "竹外桃花三两枝，春江水暖鸭先知。蒌蒿满地芦芽短，正是河豚欲上时。"},
        {id: 81, up: "大江东去", down: "浪淘尽", author: "苏轼", dynasty: "宋", tags: ["历史", "豪放"], difficulty: 3, background: "苏轼游览赤壁古战场，怀古伤今，豪放词代表作。", fullPoem: "大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。"},
        {id: 82, up: "十年生死两茫茫", down: "不思量自难忘", author: "苏轼", dynasty: "宋", tags: ["悼亡", "相思"], difficulty: 3, background: "苏轼悼念亡妻王弗，词中真情流露，感人至深。", note: "乙卯正月二十日夜记梦", fullPoem: "十年生死两茫茫，不思量，自难忘。千里孤坟，无处话凄凉。"},
        {id: 83, up: "回首向来萧瑟处", down: "归去也无风雨也无晴", author: "苏轼", dynasty: "宋", tags: ["人生", "雨", "豁达"], difficulty: 3, background: "苏轼途中遇雨，借景抒怀，表现出豁达超脱的人生态度。", fullPoem: "莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。料峭春风吹酒醒，微冷，山头斜照却相迎。回首向来萧瑟处，归去，也无风雨也无晴。"},
        {id: 84, up: "一年好景君须记", down: "最是橙黄橘绿时", author: "苏轼", dynasty: "宋", tags: ["秋天", "勉励"], difficulty: 2, background: "苏轼赠好友刘景文，勉励其虽年迈仍有作为。", note: "刘景文：苏轼好友。", fullPoem: "荷尽已无擎雨盖，菊残犹有傲霜枝。一年好景君须记，最是橙黄橘绿时。"},
        {id: 85, up: "枝上柳绵吹又少", down: "天涯何处无芳草", author: "苏轼", dynasty: "宋", tags: ["春天", "离别", "豁达"], difficulty: 3, background: "苏轼被贬惠州时所作，词中寓含身世之感。", fullPoem: "花褪残红青杏小。燕子飞时，绿水人家绕。枝上柳绵吹又少。天涯何处无芳草！"},
        {id: 86, up: "昨夜雨疏风骤", down: "浓睡不消残酒", author: "李清照", dynasty: "宋", tags: ["春天", "花", "雨"], difficulty: 2, background: "李清照早期作品，写惜花之情，含蓄婉约。", fullPoem: "昨夜雨疏风骤，浓睡不消残酒。试问卷帘人，却道海棠依旧。知否，知否？应是绿肥红瘦。"},
        {id: 87, up: "知否知否", down: "应是绿肥红瘦", author: "李清照", dynasty: "宋", tags: ["春天", "花"], difficulty: 2, note: "绿肥红瘦：绿叶繁茂，红花凋零。", fullPoem: "昨夜雨疏风骤，浓睡不消残酒。试问卷帘人，却道海棠依旧。知否，知否？应是绿肥红瘦。"},
        {id: 88, up: "生当作人杰", down: "死亦为鬼雄", author: "李清照", dynasty: "宋", tags: ["壮志", "历史"], difficulty: 2, background: "李清照南渡后，路过乌江，追思项羽，讽刺南宋朝廷苟安。", fullPoem: "生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},
        {id: 89, up: "至今思项羽", down: "不肯过江东", author: "李清照", dynasty: "宋", tags: ["历史", "壮志"], difficulty: 2, note: "项羽：西楚霸王，兵败乌江自刎。", fullPoem: "生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},
        {id: 90, up: "寻寻觅觅", down: "冷冷清清凄凄惨惨戚戚", author: "李清照", dynasty: "宋", tags: ["秋天", "愁绪"], difficulty: 3, background: "李清照晚年所作，开篇连用七组叠字，写尽孤寂凄凉。", fullPoem: "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急！雁过也，正伤心，却是旧时相识。"},
        {id: 91, up: "这次第", down: "怎一个愁字了得", author: "李清照", dynasty: "宋", tags: ["秋天", "愁绪"], difficulty: 3, note: "次第：情形。", fullPoem: "守着窗儿，独自怎生得黑！梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！"},
        {id: 92, up: "莫道不销魂", down: "帘卷西风人比黄花瘦", author: "李清照", dynasty: "宋", tags: ["秋天", "相思"], difficulty: 3, background: "李清照婚后所作，重阳思夫，以黄花比人，写出相思之苦。", fullPoem: "薄雾浓云愁永昼，瑞脑销金兽。佳节又重阳，玉枕纱厨，半夜凉初透。东篱把酒黄昏后，有暗香盈袖。莫道不销魂，帘卷西风，人比黄花瘦。"},
        {id: 93, up: "物是人非事事休", down: "欲语泪先流", author: "李清照", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 3, background: "李清照南渡后，物是人非，感慨所作。", fullPoem: "风住尘香花已尽，日晚倦梳头。物是人非事事休，欲语泪先流。"},
        {id: 94, up: "众里寻他千百度", down: "蓦然回首那人却在灯火阑珊处", author: "辛弃疾", dynasty: "宋", tags: ["元宵", "爱情"], difficulty: 3, background: "辛弃疾元宵夜，写情人约会，后多喻指治学或事业追求。", note: "阑珊：稀疏。", fullPoem: "东风夜放花千树，更吹落、星如雨。宝马雕车香满路。凤箫声动，玉壶光转，一夜鱼龙舞。蛾儿雪柳黄金缕，笑语盈盈暗香去。众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。"},
        {id: 95, up: "醉里挑灯看剑", down: "梦回吹角连营", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "战争"], difficulty: 3, background: "辛弃疾闲居信州，梦见军营生活，抒发壮志难酬的悲愤。", fullPoem: "醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。"},
        {id: 96, up: "了却君王天下事", down: "赢得生前身后名", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "战争"], difficulty: 3, background: "抒发报国壮志，渴望建功立业。", fullPoem: "马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生！"},
        {id: 97, up: "可怜白发生", down: "", author: "辛弃疾", dynasty: "宋", tags: ["壮志", "感慨"], difficulty: 3, upOnly: true, background: "感叹年华逝去，壮志未酬。", fullPoem: "了却君王天下事，赢得生前身后名。可怜白发生！"},
        {id: 98, up: "稻花香里说丰年", down: "听取蛙声一片", author: "辛弃疾", dynasty: "宋", tags: ["田园", "夏天"], difficulty: 2, background: "辛弃疾闲居带湖，写夏夜农村风光，洋溢着丰收的喜悦。", fullPoem: "明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。"},
        {id: 99, up: "青山遮不住", down: "毕竟东流去", author: "辛弃疾", dynasty: "宋", tags: ["山水", "哲理"], difficulty: 2, background: "辛弃疾被贬后，以江水喻指时局，表达抗金决心不可阻挡。", note: "郁孤台：在今江西赣州。", fullPoem: "郁孤台下清江水，中间多少行人泪。西北望长安，可怜无数山。青山遮不住，毕竟东流去。"},
        {id: 100, up: "少年不识愁滋味", down: "爱上层楼", author: "辛弃疾", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 2, background: "辛弃疾以少年与老年对比，写不同人生阶段的愁绪。", fullPoem: "少年不识愁滋味，爱上层楼。爱上层楼，为赋新词强说愁。"},
        {id: 101, up: "而今识尽愁滋味", down: "欲说还休", author: "辛弃疾", dynasty: "宋", tags: ["愁绪", "时间"], difficulty: 2, background: "历经沧桑后，愁绪难言。", fullPoem: "而今识尽愁滋味，欲说还休。欲说还休，却道天凉好个秋。"},
        {id: 102, up: "人生自古谁无死", down: "留取丹心照汗青", author: "文天祥", dynasty: "宋", tags: ["爱国", "壮志"], difficulty: 2, background: "文天祥兵败被俘，过零丁洋时所作，表明以死明志的决心。", note: "汗青：史册。", fullPoem: "辛苦遭逢起一经，干戈寥落四周星。山河破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。"},
        {id: 103, up: "山河破碎风飘絮", down: "身世浮沉雨打萍", author: "文天祥", dynasty: "宋", tags: ["爱国", "愁绪"], difficulty: 3, background: "以柳絮、浮萍比喻国家和个人命运。", fullPoem: "辛苦遭逢起一经，干戈寥落四周星。山河破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。"},
        {id: 104, up: "无可奈何花落去", down: "似曾相识燕归来", author: "晏殊", dynasty: "宋", tags: ["春天", "花", "时间"], difficulty: 2, background: "晏殊感叹春光易逝，人事变迁，对仗工整，成为名句。", fullPoem: "一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？无可奈何花落去，似曾相识燕归来。小园香径独徘徊。"},
        {id: 105, up: "昨夜西风凋碧树", down: "独上高楼望尽天涯路", author: "晏殊", dynasty: "宋", tags: ["秋天", "孤独"], difficulty: 3, background: "王国维《人间词话》以此为古今之成大事业者必经的第一境界。", fullPoem: "槛菊愁烟兰泣露，罗幕轻寒，燕子双飞去。明月不谙离恨苦，斜光到晓穿朱户。昨夜西风凋碧树，独上高楼，望尽天涯路。欲寄彩笺兼尺素，山长水阔知何处？"},
        {id: 106, up: "衣带渐宽终不悔", down: "为伊消得人憔悴", author: "柳永", dynasty: "宋", tags: ["相思", "爱情"], difficulty: 2, background: "柳永写相思之苦，王国维以此为成大事业者第二境界。", fullPoem: "伫倚危楼风细细，望极春愁，黯黯生天际。草色烟光残照里，无言谁会凭阑意。拟把疏狂图一醉，对酒当歌，强乐还无味。衣带渐宽终不悔，为伊消得人憔悴。"},
        {id: 107, up: "今宵酒醒何处", down: "杨柳岸晓风残月", author: "柳永", dynasty: "宋", tags: ["离别", "月亮", "柳"], difficulty: 3, background: "柳永离别情人，设想酒醒后的凄凉景象，脍炙人口。", fullPoem: "寒蝉凄切，对长亭晚，骤雨初歇。都门帐饮无绪，留恋处，兰舟催发。执手相看泪眼，竟无语凝噎。念去去，千里烟波，暮霭沉沉楚天阔。多情自古伤离别，更那堪，冷落清秋节！今宵酒醒何处？杨柳岸，晓风残月。"},
        {id: 108, up: "两情若是久长时", down: "又岂在朝朝暮暮", author: "秦观", dynasty: "宋", tags: ["爱情", "七夕"], difficulty: 2, background: "秦观七夕词，写牛郎织女，歌颂坚贞爱情，立意高远。", fullPoem: "纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。柔情似水，佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。"},
        {id: 109, up: "海内存知己", down: "天涯若比邻", author: "王勃", dynasty: "唐", tags: ["友情", "离别"], difficulty: 2, background: "王勃送别友人，一扫送别诗的悲戚，气势豪迈。", fullPoem: "城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。"},
        {id: 110, up: "落霞与孤鹜齐飞", down: "秋水共长天一色", author: "王勃", dynasty: "唐", tags: ["秋天", "自然"], difficulty: 3, background: "《滕王阁序》名句，写滕王阁秋日美景，成为千古绝唱。", fullPoem: "滕王高阁临江渚，佩玉鸣鸾罢歌舞。画栋朝飞南浦云，珠帘暮卷西山雨。闲云潭影日悠悠，物换星移几度秋。阁中帝子今何在？槛外长江空自流。"},
        {id: 111, up: "慈母手中线", down: "游子身上衣", author: "孟郊", dynasty: "唐", tags: ["亲情", "母爱"], difficulty: 1, background: "孟郊贫寒中感念母爱，写出千古传诵的母爱诗。", fullPoem: "慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。"},
        {id: 112, up: "谁言寸草心", down: "报得三春晖", author: "孟郊", dynasty: "唐", tags: ["亲情", "母爱"], difficulty: 1, note: "三春晖：春天的阳光，比喻母爱。", fullPoem: "慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。"},
        {id: 113, up: "少小离家老大回", down: "乡音无改鬓毛衰", author: "贺知章", dynasty: "唐", tags: ["思乡", "时间"], difficulty: 2, background: "贺知章八十六岁辞官归乡，感慨万千。", fullPoem: "少小离家老大回，乡音无改鬓毛衰。儿童相见不相识，笑问客从何处来。"},
        {id: 114, up: "儿童相见不相识", down: "笑问客从何处来", author: "贺知章", dynasty: "唐", tags: ["思乡", "时间"], difficulty: 2, background: "写归乡后的沧桑感。", fullPoem: "少小离家老大回，乡音无改鬓毛衰。儿童相见不相识，笑问客从何处来。"},
        {id: 115, up: "春江潮水连海平", down: "海上明月共潮生", author: "张若虚", dynasty: "唐", tags: ["春天", "月亮", "水"], difficulty: 3, background: "《春江花月夜》开篇，写春江月夜美景，被誉为孤篇盖全唐。", fullPoem: "春江潮水连海平，海上明月共潮生。滟滟随波千万里，何处春江无月明！"},
        {id: 116, up: "江畔何人初见月", down: "江月何年初照人", author: "张若虚", dynasty: "唐", tags: ["月亮", "时间", "哲理"], difficulty: 3, background: "对人生和宇宙的深刻思考。", fullPoem: "江畔何人初见月？江月何年初照人？人生代代无穷已，江月年年望相似。"},
        {id: 117, up: "清明时节雨纷纷", down: "路上行人欲断魂", author: "杜牧", dynasty: "唐", tags: ["清明", "雨", "愁绪"], difficulty: 1, background: "杜牧清明踏青，写雨中行人的愁绪。", fullPoem: "清明时节雨纷纷，路上行人欲断魂。借问酒家何处有，牧童遥指杏花村。"},

        {id: 119, up: "停车坐爱枫林晚", down: "霜叶红于二月花", author: "杜牧", dynasty: "唐", tags: ["秋天", "自然"], difficulty: 1, background: "杜牧秋游，发现枫叶比春花更红，立意新颖。", fullPoem: "远上寒山石径斜，白云生处有人家。停车坐爱枫林晚，霜叶红于二月花。"},
        {id: 120, up: "南朝四百八十寺", down: "多少楼台烟雨中", author: "杜牧", dynasty: "唐", tags: ["历史", "春天", "雨"], difficulty: 2, background: "杜牧江南春景，凭吊南朝佛教兴盛的遗迹。", note: "四百八十寺：形容寺庙之多。", fullPoem: "千里莺啼绿映红，水村山郭酒旗风。南朝四百八十寺，多少楼台烟雨中。"},
        {id: 121, up: "商女不知亡国恨", down: "隔江犹唱后庭花", author: "杜牧", dynasty: "唐", tags: ["忧国", "历史"], difficulty: 2, background: "杜牧夜泊秦淮，听亡国之音，讽刺晚唐统治者。", note: "后庭花：南朝陈后主所作亡国之音。", fullPoem: "烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。"},

        {id: 123, up: "问君能有几多愁", down: "恰似一江春水向东流", author: "李煜", dynasty: "五代", tags: ["愁绪", "水", "春天"], difficulty: 2, background: "南唐后主李煜亡国后被囚汴京，写尽亡国之痛。", note: "虞美人", fullPoem: "春花秋月何时了，往事知多少。小楼昨夜又东风，故国不堪回首月明中。雕栏玉砌应犹在，只是朱颜改。问君能有几多愁？恰似一江春水向东流。"},
        {id: 124, up: "剪不断理还乱", down: "是离愁别是一般滋味在心头", author: "李煜", dynasty: "五代", tags: ["愁绪", "离别"], difficulty: 3, note: "相见欢", fullPoem: "无言独上西楼，月如钩。寂寞梧桐深院锁清秋。剪不断，理还乱，是离愁，别是一般滋味在心头。"},
        {id: 125, up: "春花秋月何时了", down: "往事知多少", author: "李煜", dynasty: "五代", tags: ["时间", "愁绪"], difficulty: 2, background: "写对往事的追忆与感伤。", fullPoem: "春花秋月何时了，往事知多少？小楼昨夜又东风，故国不堪回首月明中。"},

        {id: 129, up: "千磨万击还坚劲", down: "任尔东西南北风", author: "郑燮", dynasty: "清", tags: ["励志", "品格"], difficulty: 2, background: "郑板桥（郑燮）题画竹，借竹咏志。", fullPoem: "咬定青山不放松，立根原在破岩中。千磨万击还坚劲，任尔东西南北风。"},

        {id: 134, up: "沉舟侧畔千帆过", down: "病树前头万木春", author: "刘禹锡", dynasty: "唐", tags: ["励志", "春天", "哲理"], difficulty: 2, background: "刘禹锡被贬二十三年后回朝，以诗答谢白居易，表现出豁达胸襟。", fullPoem: "巴山楚水凄凉地，二十三年弃置身。怀旧空吟闻笛赋，到乡翻似烂柯人。沉舟侧畔千帆过，病树前头万木春。今日听君歌一曲，暂凭杯酒长精神。"},
        {id: 135, up: "自古逢秋悲寂寥", down: "我言秋日胜春朝", author: "刘禹锡", dynasty: "唐", tags: ["秋天", "励志"], difficulty: 2, background: "刘禹锡一反悲秋传统，赞颂秋天的美好。", fullPoem: "自古逢秋悲寂寥，我言秋日胜春朝。晴空一鹤排云上，便引诗情到碧霄。"},
        {id: 136, up: "黄沙百战穿金甲", down: "不破楼兰终不还", author: "王昌龄", dynasty: "唐", tags: ["战争", "壮志"], difficulty: 2, background: "王昌龄写边塞将士誓死保卫边疆的决心。", fullPoem: "青海长云暗雪山，孤城遥望玉门关。黄沙百战穿金甲，不破楼兰终不还。"},
        {id: 137, up: "秦时明月汉时关", down: "万里长征人未还", author: "王昌龄", dynasty: "唐", tags: ["战争", "月亮", "历史"], difficulty: 2, background: "王昌龄感叹边塞战争自古不断，征人难归。", fullPoem: "秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。"},
        {id: 138, up: "但使龙城飞将在", down: "不教胡马度阴山", author: "王昌龄", dynasty: "唐", tags: ["战争", "壮志"], difficulty: 2, note: "飞将：指李广。", fullPoem: "秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。"},
        {id: 139, up: "洛阳亲友如相问", down: "一片冰心在玉壶", author: "王昌龄", dynasty: "唐", tags: ["友情", "品格"], difficulty: 2, background: "王昌龄被贬江宁丞，送别友人时表明自己清白坚贞。", note: "冰心玉壶：比喻心地纯洁。", fullPoem: "寒雨连江夜入吴，平明送客楚山孤。洛阳亲友如相问，一片冰心在玉壶。"},
        {id: 140, up: "葡萄美酒夜光杯", down: "欲饮琵琶马上催", author: "王翰", dynasty: "唐", tags: ["战争", "边塞"], difficulty: 3, background: "王翰写边塞将士宴饮，豪放悲壮。", fullPoem: "葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？"},
        {id: 141, up: "醉卧沙场君莫笑", down: "古来征战几人回", author: "王翰", dynasty: "唐", tags: ["战争", "边塞"], difficulty: 2, background: "以豪放的语调写出征的悲壮。", fullPoem: "葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？"},
        {id: 142, up: "莫愁前路无知己", down: "天下谁人不识君", author: "高适", dynasty: "唐", tags: ["友情", "离别"], difficulty: 2, background: "高适送别琴师董庭兰，以豪迈语气安慰友人。", fullPoem: "千里黄云白日曛，北风吹雁雪纷纷。莫愁前路无知己，天下谁人不识君？"},
        {id: 143, up: "忽如一夜春风来", down: "千树万树梨花开", author: "岑参", dynasty: "唐", tags: ["冬天", "雪", "春天"], difficulty: 2, background: "岑参以春花喻冬雪，写出边塞雪景的壮美。", fullPoem: "北风卷地白草折，胡天八月即飞雪。忽如一夜春风来，千树万树梨花开。"},
        {id: 144, up: "春风得意马蹄疾", down: "一日看尽长安花", author: "孟郊", dynasty: "唐", tags: ["喜悦", "春天"], difficulty: 2, background: "孟郊四十六岁中进士后，写尽得意之情。", fullPoem: "昔日龌龊不足夸，今朝放荡思无涯。春风得意马蹄疾，一日看尽长安花。"},
        {id: 145, up: "曾经沧海难为水", down: "除却巫山不是云", author: "元稹", dynasty: "唐", tags: ["爱情", "悼亡"], difficulty: 3, background: "元稹悼念亡妻韦丛，表达对妻子的忠贞不渝。", fullPoem: "曾经沧海难为水，除却巫山不是云。取次花丛懒回顾，半缘修道半缘君。"},
        {id: 146, up: "诚知此恨人人有", down: "贫贱夫妻百事哀", author: "元稹", dynasty: "唐", tags: ["爱情", "悼亡"], difficulty: 3, background: "元稹悼念亡妻，写贫贱夫妻的深厚感情。", fullPoem: "闲坐悲君亦自悲，百年都是几多时。邓攸无子寻知命，潘岳悼亡犹费词。同穴窅冥何所望，他生缘会更难期。惟将终夜长开眼，报答平生未展眉。诚知此恨人人有，贫贱夫妻百事哀。"},
        {id: 147, up: "相见时难别亦难", down: "东风无力百花残", author: "李商隐", dynasty: "唐", tags: ["离别", "花", "春天"], difficulty: 2, background: "李商隐写离别之苦，两个难字道出深情。", fullPoem: "相见时难别亦难，东风无力百花残。春蚕到死丝方尽，蜡炬成灰泪始干。"},
        {id: 148, up: "晓镜但愁云鬓改", down: "夜吟应觉月光寒", author: "李商隐", dynasty: "唐", tags: ["相思", "月亮", "时间"], difficulty: 3, note: "云鬓：女子美发。", fullPoem: "晓镜但愁云鬓改，夜吟应觉月光寒。蓬山此去无多路，青鸟殷勤为探看。"},
        {id: 149, up: "天意怜幽草", down: "人间重晚晴", author: "李商隐", dynasty: "唐", tags: ["时间", "感慨"], difficulty: 3, background: "李商隐欣赏晚晴美景，感悟珍惜美好时光。", fullPoem: "深居俯夹城，春去夏犹清。天意怜幽草，人间重晚晴。并添高阁迥，微注小窗明。越鸟巢干后，归飞体更轻。"},
        {id: 150, up: "夕阳无限好", down: "只是近黄昏", author: "李商隐", dynasty: "唐", tags: ["时间", "感慨"], difficulty: 1, background: "李商隐登乐游原，感叹美好事物短暂。", fullPoem: "向晚意不适，驱车登古原。夕阳无限好，只是近黄昏。"}
    ],

    keywords: ["花", "月", "春", "山", "水", "风", "雨", "云", "人", "情", "梦", "酒", "夜", "雪", "秋", "江", "柳", "梅", "愁", "思"],

    index: { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} },

    buildIndex() {
        this.poems.forEach(poem => {
            if (!this.index.byAuthor[poem.author]) this.index.byAuthor[poem.author] = [];
            this.index.byAuthor[poem.author].push(poem);
            this.index.byDifficulty[poem.difficulty].push(poem);
            poem.tags.forEach(tag => {
                if (!this.index.byTag[tag]) this.index.byTag[tag] = [];
                this.index.byTag[tag].push(poem);
            });
            const text = poem.up + poem.down;
            this.keywords.forEach(kw => {
                if (text.includes(kw)) {
                    if (!this.index.byKeyword[kw]) this.index.byKeyword[kw] = [];
                    if (!this.index.byKeyword[kw].includes(poem)) this.index.byKeyword[kw].push(poem);
                }
            });
        });
    },

    query({difficulty, excludeIds = [], limit = 10, requireKeyword = null, author = null, tag = null} = {}) {
        let pool = difficulty ? [...this.index.byDifficulty[difficulty]] : [...this.poems];
        if (author) pool = pool.filter(p => p.author === author);
        if (tag) pool = pool.filter(p => p.tags.includes(tag));
        if (requireKeyword) pool = pool.filter(p => (p.up + p.down).includes(requireKeyword));
        pool = pool.filter(p => !excludeIds.includes(p.id));
        return pool.sort(() => Math.random() - 0.5).slice(0, limit);
    },

    // 修复：提高容错率阈值从0.85到0.92
    fuzzyMatch(input, target, tolerance = 0.92) {
        if (input === target) return {match: true, score: 1};
        const cleanInput = input.replace(/[，。？！、；：""''（）【】]/g, '');
        const cleanTarget = target.replace(/[，。？！、；：""''（）【】]/g, '');
        if (cleanInput === cleanTarget) return {match: true, score: 0.98};
        const distance = this.levenshtein(cleanInput, cleanTarget);
        const maxLen = Math.max(cleanInput.length, cleanTarget.length);
        const similarity = 1 - distance / maxLen;
        if (similarity >= tolerance) return {match: true, score: similarity};
        const commonChars = [...cleanInput].filter(c => cleanTarget.includes(c)).length;
        const overlapRatio = commonChars / Math.min(cleanInput.length, cleanTarget.length);
        if (overlapRatio >= 0.7) return {match: true, score: overlapRatio * 0.9, hint: "音近字"};
        return {match: false, score: similarity};
    },

    levenshtein(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                matrix[i][j] = b.charAt(i-1) === a.charAt(j-1) ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1] + 1, matrix[i][j-1] + 1, matrix[i-1][j] + 1);
            }
        }
        return matrix[b.length][a.length];
    }
};

// ==================== 音效引擎 ====================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.bgmAudio = null;
        this.enabled = true;
        this.bgmEnabled = false;
        this.init();
        this.initFirstClick();
    }
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    initFirstClick() {
        const unlockAudio = () => {
            this.ensureContext();
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
        };
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);
    }
    ensureContext() {
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    play(type) {
        if (!this.enabled || !this.ctx) return;
        this.ensureContext();
        const t = this.ctx.currentTime;
        switch(type) {
            case 'correct': this.playChord([523.25, 659.25, 783.99], 0.3, 'sine', 0.5); break;
            case 'wrong': this.playTone(200, 0.3, 'sawtooth', 0.25, 150); break;
            case 'combo': this.playSequence([523.25, 659.25, 783.99, 1046.50], 0.1, 'triangle'); break;
            case 'collect': this.playChord([392, 523.25, 659.25], 0.2, 'sine', 0.6); break;
            case 'achievement': this.playSequence([523.25, 659.25, 783.99, 1046.50, 1318.51], 0.08, 'triangle'); break;
        }
    }
    playTone(freq, duration, type, vol, freqEnd = null) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (freqEnd) osc.frequency.setValueAtTime(freqEnd, this.ctx.currentTime + duration * 0.5);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
    playChord(freqs, vol, type, duration) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, duration, type, vol * (1 - i*0.1)), i * 50));
    }
    playSequence(freqs, interval, type) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, interval * 2, type, 0.2), i * interval * 1000));
    }
    toggleSound() {
        this.enabled = !this.enabled;
        return this.enabled;
    }
    toggleBGM() {
        this.bgmEnabled = !this.bgmEnabled;
        if (this.bgmEnabled) {
            this.playBGM();
        } else {
            this.stopBGM();
        }
        return this.bgmEnabled;
    }
    playBGM() {
        // 背景音乐接口，可根据需要添加
    }
    stopBGM() {

            this.bgmAudio.pause();
            this.bgmAudio = null;
        }

// ==================== 游戏状态 ====================
class GameState {
    constructor() {
        this.reset();
        this.load();
    }
    reset() {
        this.mode = 'fill';
        this.difficulty = 'MEDIUM';
        this.score = 0;
        this.streak = 0;
        this.maxStreak = 0;
        this.hearts = 3;
        this.hintsUsed = 0;
        this.hintLimit = 3;
        this.collectedPoems = new Set();
        this.usedPoemIds = [];
        this.comboCount = 0;
        this.isProcessing = false;
        this.timer = null;
        
        // 新增：统计数据
        this.stats = {
            totalCorrect: 0,
            totalAnswered: 0,
            highScore: 0,
            maxStreak: 0,
            modeCounts: {fill: 0, challenge: 0, match: 0, feihua: 0, chain: 0, daily: 0},
            consecutiveDays: 0,
            lastPlayDate: null
        };
        
        // 新增：成就状态
        this.achievements = {
            collector: false,
            combo: false,
            master: false,
            allModes: false
        };
    }
    load() {
        const saved = localStorage.getItem('poemGameV3');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                this.collectedPoems = new Set(data.collected || []);
                this.stats = data.stats || this.stats;
                this.achievements = data.achievements || this.achievements;
                
                const today = new Date().toDateString();
                if (this.stats.lastPlayDate) {
                    const lastDate = new Date(this.stats.lastPlayDate);
                    const daysDiff = Math.floor((new Date() - lastDate) / (1000 * 60 * 60 * 24));
                    if (daysDiff === 1) {
                        this.stats.consecutiveDays++;
                    } else if (daysDiff > 1) {
                        this.stats.consecutiveDays = 0;
                    }
                }
            } catch(e) {
                console.error('加载存档失败:', e);
            }
        }
        this.loadDailyChallenge();
    }
    loadDailyChallenge() {
        const dailyData = localStorage.getItem('poemGameDaily');
        if (dailyData) {
            try {
                const data = JSON.parse(dailyData);
                if (data.date === new Date().toDateString()) {
                    this.dailyChallenge = data;
                } else {
                    this.dailyChallenge = null;
                }
            } catch(e) {
                this.dailyChallenge = null;
            }
        }
    }
    save() {
        const data = {
            collected: Array.from(this.collectedPoems),
            stats: this.stats,
            achievements: this.achievements,
            timestamp: Date.now()
        };
        localStorage.setItem('poemGameV3', JSON.stringify(data));
    }
    updateDailyChallenge(progress) {
        const today = new Date().toDateString();
        this.dailyChallenge = {
            date: today,
            progress: progress || [],
            poems: this.dailyChallenge?.poems || []
        };
        localStorage.setItem('poemGameDaily', JSON.stringify(this.dailyChallenge));
    }
    addScore(points) {
        this.score += points;
        if (this.score > this.stats.highScore) this.stats.highScore = this.score;
    }
    addStreak() {
        this.streak++;
        this.comboCount++;
        if (this.streak > this.maxStreak) this.maxStreak = this.streak;
        if (this.streak > this.stats.maxStreak) this.stats.maxStreak = this.streak;
        this.stats.totalCorrect++;
        if (this.streak % 3 === 0) { this.addScore(5); return true; }
        return false;
    }
    breakStreak() { this.streak = 0; this.comboCount = 0; }
    loseHeart() { this.hearts--; this.breakStreak(); return this.hearts <= 0; }
    useHint() {
        if (this.hintsUsed >= this.hintLimit || this.score < 5) return false;
        this.hintsUsed++; this.score -= 5; return true;
    }
    collectPoem(id) {
        this.collectedPoems.add(id);
        this.checkAchievements();
        this.save();
    }
    setDifficulty(diff) {
        this.difficulty = diff;
        this.hintLimit = {EASY: 5, MEDIUM: 3, HARD: 2, EXPERT: 1}[diff] || 3;
    }
    checkAchievements() {
        let newAchievement = null;
        
        if (!this.achievements.collector && this.collectedPoems.size >= 10) {
            this.achievements.collector = true;
            newAchievement = '📚 收藏家';
        }
        
        if (!this.achievements.combo && this.streak >= 10) {
            this.achievements.combo = true;
            newAchievement = '🔥 连击高手';
        }
        
        if (!this.achievements.master && this.stats.totalCorrect >= 100) {
            this.achievements.master = true;
            newAchievement = '🏆 百诗斩';
        }
        
        const allModesComplete = Object.values(this.stats.modeCounts).every(count => count >= 10);
        if (!this.achievements.allModes && allModesComplete) {
            this.achievements.allModes = true;
            newAchievement = '⭐ 全模式通关';
        }
        
        if (newAchievement) return newAchievement;
        return null;
    }
}
