<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8b4513">
    <meta name="description" content="沉浸式古诗词学习游戏 - 诗笺雅集,寓教于乐">
    <title>诗笺雅集 - 诗词学习游戏</title>

    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #f5f0e6;
            --paper-dark: #e8dcc8;
            --ink: #2c2c2c;
            --ink-light: #4a4a4a;
            --accent: #8b4513;
            --accent-light: #a0522d;
            --gold: #d4a574;
            --success: #2e7d32;
            --error: #c62828;
            --warning: #f9a825;
            --info: #1976d2;
            --shadow: rgba(139, 69, 19, 0.15);
            --shadow-heavy: rgba(139, 69, 19, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            font-family: 'Noto Serif SC', 'STKaiti', serif;
            background: var(--paper);
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        #app {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-title::before { content: '📜'; font-size: 28px; }

        .score-board { display: flex; gap: 20px; }
        .score-item { text-align: center; }
        .score-label { font-size: 12px; color: var(--ink-light); display: block; }
        .score-value {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .mode-tabs::-webkit-scrollbar { display: none; }

        .mode-tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 12px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink-light);
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
        }

        .mode-tab.active {
            background: var(--accent);
            color: var(--paper);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow-heavy);
        }

        .mode-tab .icon { display: block; font-size: 18px; margin-bottom: 2px; }

        main {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 10px 25px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .difficulty-btn.easy { color: var(--success); border-color: var(--success); }
        .difficulty-btn.medium { color: var(--warning); border-color: var(--warning); }
        .difficulty-btn.hard { color: var(--error); border-color: var(--error); }
        .difficulty-btn.expert { color: #7c4dff; border-color: #7c4dff; }

        .difficulty-btn.active { transform: scale(1.05); font-weight: 600; color: white; }
        .difficulty-btn.easy.active { background: var(--success); }
        .difficulty-btn.medium.active { background: var(--warning); }
        .difficulty-btn.hard.active { background: var(--error); }
        .difficulty-btn.expert.active { background: #7c4dff; }

        .poem-display {
            text-align: center;
            padding: 35px 25px;
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            border-radius: 15px;
            border: 3px solid var(--gold);
            margin-bottom: 25px;
            position: relative;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .poem-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            color: var(--ink);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .poem-hint {
            font-size: 14px;
            color: var(--ink-light);
            margin-top: 8px;
        }

        .ink-spread { animation: inkSpread 0.8s ease-out; }

        @keyframes inkSpread {
            0% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 0 20px rgba(46, 125, 50, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); transform: scale(1); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

        .option-card {
            padding: 18px;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow);
            border-color: var(--accent);
        }

        .option-card.correct {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            border-color: var(--success);
            animation: correctPulse 0.6s ease;
        }

        .option-card.wrong {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            border-color: var(--error);
            animation: paperShake 0.5s ease;
        }

        @keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes paperShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ==================== 挑战模式样式 ==================== */
        .challenge-context {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border-radius: 15px;
            border: 2px solid var(--gold);
            margin-bottom: 20px;
        }

        .challenge-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .challenge-desc {
            font-size: 16px;
            line-height: 1.8;
            color: var(--ink-light);
        }

        /* ==================== 配对模式样式 ==================== */
        .match-container {
            padding: 10px 0;
        }

        .match-area {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .match-area {
                flex-direction: column;
                gap: 15px;
            }
        }

        .match-column {
            flex: 1;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 48%;
        }

        @media (max-width: 768px) {
            .match-column {
                max-width: 100%;
            }
        }

        .column-title {
            text-align: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 20px;
            color: var(--accent);
            padding-bottom: 10px;
            border-bottom: 2px dashed var(--gold);
            margin-bottom: 5px;
        }

        .match-item {
            padding: 15px 12px;
            background: var(--paper);
            border: 2px solid var(--gold);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .match-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow);
        }

        .match-item.selected {
            background: linear-gradient(135deg, #ffecb3 0%, #ffe082 100%);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .match-item.matched {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            border-color: var(--success);
            opacity: 0.6;
            cursor: not-allowed;
        }

        .match-item.wrong {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            border-color: var(--error);
            animation: paperShake 0.5s ease;
        }

        /* ==================== 接龙模式样式 ==================== */
        .chain-input-area {
            padding: 10px 0;
        }

        .chain-input {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            display: block;
            padding: 15px 20px;
            font-size: 18px;
            font-family: 'Noto Serif SC', serif;
            border: 2px solid var(--gold);
            border-radius: 12px;
            background: white;
            transition: all 0.3s ease;
        }

        .chain-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--shadow);
        }

        .chain-input.correct {
            border-color: var(--success);
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .chain-input.wrong {
            border-color: var(--error);
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            animation: paperShake 0.5s ease;
        }

        /* ==================== 飞花令样式 ==================== */
        .feihua-keyword {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 15px;
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ffecb3 0%, #ffe082 100%);
            border-radius: 20px;
            border: 3px solid var(--gold);
        }

        .feihua-context {
            font-size: 16px;
            color: var(--ink-light);
            margin-bottom: 20px;
        }

        /* ==================== 学习模式收藏网格样式 ==================== */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 10px 0;
        }

        @media (max-width: 768px) {
            .collection-grid {
                grid-template-columns: 1fr;
            }
        }

        .collection-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .collection-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
            border-color: var(--accent);
        }

        .collection-poem {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 22px;
            color: var(--ink);
            margin-bottom: 10px;
            text-align: center;
        }

        .collection-author {
            font-size: 14px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--gold);
        }

        .collection-preview {
            font-size: 15px;
            color: var(--ink-light);
            text-align: center;
            line-height: 1.6;
        }

        /* ==================== 优化后的学习面板 ==================== */
        .learn-panel {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            border: 2px solid var(--gold);
            border-radius: 15px;
            margin-top: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .learn-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(139, 69, 19, 0.05);
            border-bottom: 2px solid var(--gold);
            cursor: pointer;
            user-select: none;
            transition: background 0.3s ease;
        }

        .learn-header:hover {
            background: rgba(139, 69, 19, 0.1);
        }

        .learn-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 22px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .learn-close {
            background: var(--gold);
            color: var(--ink);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .learn-close:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
        }

        .learn-content-wrapper {
            max-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .learn-content-wrapper.expanded {
            max-height: 70vh;
        }

        /* 自定义滚动条 */
        .learn-content-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .learn-content-wrapper::-webkit-scrollbar-track {
            background: rgba(139, 69, 19, 0.05);
            border-radius: 4px;
        }

        .learn-content-wrapper::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        .learn-content-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .learn-section {
            padding: 20px;
            border-bottom: 1px dashed var(--gold);
        }

        .learn-section:last-child {
            border-bottom: none;
        }

        .learn-section-title {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        /* 诗歌正文样式 - 垂直居中 */
        .learn-poem-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 24px;
            color: var(--ink);
            line-height: 2.2;
            text-align: center;
            margin: 15px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .learn-content {
            color: var(--ink-light);
            line-height: 1.9;
            text-align: justify;
            font-size: 15px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .learn-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .learn-tag {
            background: var(--accent);
            color: white;
            padding: 5px 14px;
            border-radius: 15px;
            font-size: 12px;
            transition: transform 0.2s ease;
        }

        .learn-tag:hover {
            transform: scale(1.05);
        }

        .collect-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: 2px solid var(--gold);
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 15px 20px 20px;
            transition: all 0.3s ease;
            width: calc(100% - 40px);
        }

        .collect-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px var(--shadow);
        }

        .collect-btn.collected {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            border-color: var(--success);
            color: var(--success);
        }

        /* 展开按钮 */
        .expand-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.5);
            border-top: 1px solid var(--gold);
            cursor: pointer;
            color: var(--accent);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .expand-btn .arrow {
            transition: transform 0.3s ease;
            font-size: 18px;
        }

        .expand-btn.expanded .arrow {
            transform: rotate(180deg);
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .game-title { font-size: 24px; }
            .poem-text { font-size: 26px; }
            .options-grid { grid-template-columns: 1fr; }

            .learn-content-wrapper.expanded {
                max-height: 60vh;
            }

            .learn-poem-text {
                font-size: 20px;
                line-height: 2;
            }

            .learn-content {
                font-size: 14px;
                line-height: 1.8;
            }

            .learn-section {
                padding: 15px;
            }

            .learn-title {
                font-size: 18px;
            }

            .collect-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .learn-content-wrapper.expanded {
                max-height: 50vh;
            }

            .learn-poem-text {
                font-size: 18px;
                line-height: 1.8;
            }
        }

        /* Footer */
        footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 2px solid var(--gold);
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-bar { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .hearts { display: flex; gap: 3px; }
        .heart { font-size: 24px; transition: all 0.3s ease; }
        .heart.lost { opacity: 0.3; filter: grayscale(100%); }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; padding: 5px 12px; border-radius: 15px; font-weight: 600; font-size: 14px; }

        .action-buttons { display: flex; gap: 10px; }
        .action-btn {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: white;
            color: var(--accent);
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--accent); color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 弹窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #faf8f3 0%, var(--paper) 100%);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 3px solid var(--accent);
            max-width: 90%;
            width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .floating-feedback { position: fixed; pointer-events: none; z-index: 2000; font-weight: 700; font-size: 24px; animation: floatUp 1s ease forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        .combo-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Ma Shan Zheng', cursive; font-size: 48px; color: #ff6b6b; z-index: 2000; animation: comboAnim 1s ease forwards; }
        @keyframes comboAnim { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-50px); } }

        /* 加载界面样式 */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--paper);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gold);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: var(--accent);
            font-family: 'Ma Shan Zheng', cursive;
        }

        .loading-error {
            max-width: 400px;
            text-align: center;
            padding: 30px;
        }

        .loading-error h2 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 28px;
            color: var(--error);
            margin-bottom: 15px;
        }

    </style>
</head>

<script>
// ==================== 数据加载器 ====================
class DataLoader {
    constructor() {
        this.dataUrls = {
            poems: './data/poems.json',
            quizzes: './data/quizzes.json',
            keywords: './data/keywords.json'
        };
    }

    async loadAll() {
        try {
            const [poems, quizzes, keywords] = await Promise.all([
                fetch(this.dataUrls.poems).then(res => this.handleResponse(res, '诗词数据')),
                fetch(this.dataUrls.quizzes).then(res => this.handleResponse(res, '问答题数据')),
                fetch(this.dataUrls.keywords).then(res => this.handleResponse(res, '飞花令关键字'))
            ]);

            window.gameData = {
                poems: poems,
                quizzes: quizzes,
                keywords: keywords
            };

            return { success: true };
        } catch (error) {
            console.error('数据加载失败:', error);
            return { success: false, error: error.message };
        }
    }

    async handleResponse(response, dataName) {
        if (!response.ok) {
            throw new Error(`${dataName}加载失败 (HTTP ${response.status})`);
        }
        return await response.json();
    }

    showError(error) {
        const loadingScreen = document.getElementById('loadingScreen');
        loadingScreen.innerHTML = `
            <div class="loading-error">
                <h2>⚠️ 加载失败</h2>
                <p>${error}</p>
                <p style="font-size: 14px; margin-top: 10px;">
                    <strong>注意:</strong> 如果您是通过本地文件直接打开 (file://),<br>
                    由于浏览器的安全限制,可能无法加载外部 JSON 文件。<br>
                    建议使用本地服务器运行此游戏,例如:
                </p>
                <ul style="text-align: left; font-size: 14px; margin: 15px 0 20px 30px; color: var(--ink-light);">
                    <li>VS Code: 安装 "Live Server" 插件,右键选择 "Open with Live Server"</li>
                    <li>Python: 在项目目录运行 <code>python -m http.server</code></li>
                    <li>Node.js: 安装 <code>http-server</code> 后运行</li>
                </ul>
                <button class="retry-btn" onclick="location.reload()">🔄 重新加载</button>
            </div>
        `;
    }

    hideLoadingScreen() {
        const loadingScreen = document.getElementById('loadingScreen');
        const app = document.getElementById('app');

        loadingScreen.style.display = 'none';
        app.style.display = 'flex';
    }
}

// ==================== 诗词数据库 ====================
const PoemDatabase = {
    poems: [],
    keywords: [],
    quizzes: [],
    index: { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} },

    init() {
        if (!window.gameData) {
            throw new Error('游戏数据未加载');
        }
        this.poems = window.gameData.poems || [];
        this.keywords = window.gameData.keywords || [];
        this.quizzes = window.gameData.quizzes || [];
        this.buildIndex();
    },

    buildIndex() {
        this.index = { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} };
        this.poems.forEach(poem => {
            if (!this.index.byAuthor[poem.author]) this.index.byAuthor[poem.author] = [];
            this.index.byAuthor[poem.author].push(poem);
            this.index.byDifficulty[poem.difficulty].push(poem);
            poem.tags.forEach(tag => {
                if (!this.index.byTag[tag]) this.index.byTag[tag] = [];
                this.index.byTag[tag].push(poem);
            });
            const text = poem.up + poem.down;
            this.keywords.forEach(kw => {
                if (text.includes(kw)) {
                    if (!this.index.byKeyword[kw]) this.index.byKeyword[kw] = [];
                    if (!this.index.byKeyword[kw].includes(poem)) this.index.byKeyword[kw].push(poem);
                }
            });
        });
    },

    query({difficulty, excludeIds = [], limit = 10, requireKeyword = null, author = null, tag = null} = {}) {
        let pool = difficulty ? [...this.index.byDifficulty[difficulty]] : [...this.poems];
        if (author) pool = pool.filter(p => p.author === author);
        if (tag) pool = pool.filter(p => p.tags.includes(tag));
        if (requireKeyword) pool = pool.filter(p => (p.up + p.down).includes(requireKeyword));
        pool = pool.filter(p => !excludeIds.includes(p.id));
        return pool.sort(() => Math.random() - 0.5).slice(0, limit);
    },

    fuzzyMatch(input, target, tolerance = 0.85) {
        if (input === target) return {match: true, score: 1};
        const cleanInput = input.replace(/[，。？！、；：""''（）【】]/g, '');
        const cleanTarget = target.replace(/[，。？！、；：""''（）【】]/g, '');
        if (cleanInput === cleanTarget) return {match: true, score: 0.98};
        const distance = this.levenshtein(cleanInput, cleanTarget);
        const maxLen = Math.max(cleanInput.length, cleanTarget.length);
        const similarity = 1 - distance / maxLen;
        if (similarity >= tolerance) return {match: true, score: similarity};
        const commonChars = [...cleanInput].filter(c => cleanTarget.includes(c)).length;
        const overlapRatio = commonChars / Math.min(cleanInput.length, cleanTarget.length);
        if (overlapRatio >= 0.7) return {match: true, score: overlapRatio * 0.9, hint: "音近字"};
        return {match: false, score: similarity};
    },

    levenshtein(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                matrix[i][j] = b.charAt(i-1) === a.charAt(j-1) ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1] + 1, matrix[i][j-1] + 1, matrix[i-1][j] + 1);
            }
        }
        return matrix[b.length][a.length];
    }
};

// ==================== 音效引擎 ====================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.init();
    }
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    ensureContext() {
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    play(type) {
        if (!this.enabled || !this.ctx) return;
        this.ensureContext();
        const t = this.ctx.currentTime;
        switch(type) {
            case 'correct': this.playChord([523.25, 659.25, 783.99], 0.3, 'sine', 0.5); break;
            case 'wrong': this.playTone(200, 0.3, 'sawtooth', 0.25, 150); break;
            case 'combo': this.playSequence([523.25, 659.25, 783.99, 1046.50], 0.1, 'triangle'); break;
            case 'collect': this.playChord([392, 523.25, 659.25], 0.2, 'sine', 0.6); break;
        }
    }
    playTone(freq, duration, type, vol, freqEnd = null) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (freqEnd) osc.frequency.setValueAtTime(freqEnd, this.ctx.currentTime + duration * 0.5);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
    playChord(freqs, vol, type, duration) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, duration, type, vol * (1 - i*0.1)), i * 50));
    }
    playSequence(freqs, interval, type) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, interval * 2, type, 0.2), i * interval * 1000));
    }
}

// ==================== 游戏状态 ====================
class GameState {
    constructor() {
        this.reset();
        this.load();
    }
    reset() {
        this.mode = 'fill';
        this.difficulty = 'MEDIUM';
        this.score = 0;
        this.streak = 0;
        this.maxStreak = 0;
        this.hearts = 3;
        this.hintsUsed = 0;
        this.hintLimit = 3;
        this.collectedPoems = new Set();
        this.usedPoemIds = [];
        this.comboCount = 0;
        this.isProcessing = false;
        this.timer = null;
    }
    load() {
        const saved = localStorage.getItem('poemGameV2');
        if (saved) {
            const data = JSON.parse(saved);
            this.highScore = data.highScore || 0;
            this.collectedPoems = new Set(data.collected || []);
        } else {
            this.highScore = 0;
        }
    }
    save() {
        const data = {
            highScore: Math.max(this.score, this.highScore),
            collected: Array.from(this.collectedPoems),
            timestamp: Date.now()
        };
        localStorage.setItem('poemGameV2', JSON.stringify(data));
    }
    addScore(points) {
        this.score += points;
        if (this.score > this.highScore) this.highScore = this.score;
    }
    addStreak() {
        this.streak++;
        this.comboCount++;
        if (this.streak > this.maxStreak) this.maxStreak = this.streak;
        if (this.streak % 3 === 0) { this.addScore(5); return true; }
        return false;
    }
    breakStreak() { this.streak = 0; this.comboCount = 0; }
    loseHeart() { this.hearts--; this.breakStreak(); return this.hearts <= 0; }
    useHint() {
        if (this.hintsUsed >= this.hintLimit || this.score < 5) return false;
        this.hintsUsed++; this.score -= 5; return true;
    }
    collectPoem(id) {
        this.collectedPoems.add(id);
        this.save();
    }
    setDifficulty(diff) {
        this.difficulty = diff;
        this.hintLimit = {EASY: 5, MEDIUM: 3, HARD: 2, EXPERT: 1}[diff] || 3;
    }
}

// ==================== 游戏主类 ====================
class PoemGame {
    constructor() {
        this.state = new GameState();
        this.sound = new SoundEngine();
        this.currentQuestion = null;
        this.matchState = null;
        this.chainState = null;
        this.canvas = null;
        this.ctx = null;
        this.learnPanelExpanded = false;
        this.autoTransitionTimer = null;
    }

    async init() {
        const loader = new DataLoader();
        const result = await loader.loadAll();

        if (result.success) {
            try {
                PoemDatabase.init();
                loader.hideLoadingScreen();
                this.updateUI();
                this.switchMode('fill');
                window.addEventListener('beforeunload', () => this.state.save());
            } catch (error) {
                loader.showError('数据初始化失败: ' + error.message);
            }
        } else {
            loader.showError(result.error);
        }
    }

    switchMode(mode) {
        this.state.mode = mode;
        this.state.isProcessing = false;
        if (this.state.timer) { clearInterval(this.state.timer); this.state.timer = null; }
        this.clearAutoTransition();
        document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));
        const main = document.getElementById('gameMain');
        main.innerHTML = '';
        switch(mode) {
            case 'fill': this.initFillMode(); break;
            case 'challenge': this.initChallengeMode(); break;
            case 'match': this.initMatchMode(); break;
            case 'feihua': this.initFeihuaMode(); break;
            case 'chain': this.initChainMode(); break;
            case 'learn': this.initLearnMode(); break;
        }
        this.updateUI();
    }

    clearAutoTransition() {
        if (this.autoTransitionTimer) {
            clearTimeout(this.autoTransitionTimer);
            this.autoTransitionTimer = null;
        }
    }

    initFillMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="difficulty-selector">
                <button class="difficulty-btn easy ${this.state.difficulty === 'EASY' ? 'active' : ''}" onclick="game.setDifficulty('EASY')">简单</button>
                <button class="difficulty-btn medium ${this.state.difficulty === 'MEDIUM' ? 'active' : ''}" onclick="game.setDifficulty('MEDIUM')">中等</button>
                <button class="difficulty-btn hard ${this.state.difficulty === 'HARD' ? 'active' : ''}" onclick="game.setDifficulty('HARD')">困难</button>
                <button class="difficulty-btn expert ${this.state.difficulty === 'EXPERT' ? 'active' : ''}" onclick="game.setDifficulty('EXPERT')">专家</button>
            </div>
            <div id="fillContent"></div>
        `;
        this.generateFillQuestion();
    }

    setDifficulty(diff) {
        this.state.setDifficulty(diff);
        this.state.usedPoemIds = [];
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.classList.contains(diff.toLowerCase())) btn.classList.add('active');
        });
        this.generateFillQuestion();
    }

    generateFillQuestion() {
        if (this.state.hearts <= 0) return;
        const content = document.getElementById('fillContent');
        const diffMap = {EASY: 1, MEDIUM: 2, HARD: 3, EXPERT: 3};
        let effectiveDiff = diffMap[this.state.difficulty];
        if (this.state.score >= 50 && this.state.difficulty === 'EASY') effectiveDiff = 2;
        if (this.state.score >= 100 && this.state.difficulty === 'MEDIUM') effectiveDiff = 3;

        const pool = PoemDatabase.query({difficulty: effectiveDiff, excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateFillQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'fill', answer: poem.down};

        content.innerHTML = `
            <div class="poem-display" id="poemDisplay">
                <div class="poem-text">${poem.up}</div>
                <div class="poem-hint">${poem.dynasty} · ${poem.author}</div>
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('optionsGrid');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFillAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }

    generateOptions(correctPoem, field) {
        const correct = correctPoem[field];
        const options = [correct];
        const diffMap = {EASY: 1, MEDIUM: 2, HARD: 3, EXPERT: 3};
        const pool = PoemDatabase.query({difficulty: diffMap[this.state.difficulty], limit: 20})
            .filter(p => p.id !== correctPoem.id && p[field] !== correct);
        const shuffled = pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3 && i < shuffled.length; i++) {
            const opt = shuffled[i][field];
            if (!options.includes(opt)) options.push(opt);
        }
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            if (!options.includes(random[field])) options.push(random[field]);
        }
        return options.sort(() => Math.random() - 0.5);
    }

    checkFillAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            document.getElementById('poemDisplay').classList.add('ink-spread');
            this.sound.play('correct');
            this.state.addScore(10);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFillQuestion(), 1800);
        }
        this.updateUI();
    }

    showLearnPanel(poem) {
        this.clearAutoTransition();

        const panel = document.getElementById('learnPanel');
        const isCollected = this.state.collectedPoems.has(poem.id);
        const fullPoemText = poem.fullPoem || (poem.up + ',' + poem.down);

        panel.innerHTML = `
            <div class="learn-panel">
                <div class="learn-header" onclick="game.toggleLearnPanel()">
                    <div class="learn-title">📚 诗词赏析</div>
                    <button class="learn-close" onclick="event.stopPropagation(); game.closeLearnPanel()">×</button>
                </div>
                <div class="learn-content-wrapper expanded" id="learnContentWrapper">
                    <div class="learn-section">
                        <div class="learn-section-title">📝 全诗</div>
                        <div class="learn-poem-text">${fullPoemText}</div>
                    </div>
                    <div class="learn-section">
                        <div class="learn-section-title">📖 创作背景</div>
                        <div class="learn-content">${poem.background || '暂无背景介绍'}</div>
                    </div>
                    ${poem.note ? `<div class="learn-section"><div class="learn-section-title">💡 注释</div><div class="learn-content">${poem.note}</div></div>` : ''}
                    <div class="learn-section">
                        <div class="learn-section-title">🏷️ 标签</div>
                        <div class="learn-tags">
                            ${poem.tags.map(tag => `<span class="learn-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <button class="collect-btn ${isCollected ? 'collected' : ''}" onclick="game.collectCurrentPoem(${poem.id})">
                        ${isCollected ? '⭐ 已收藏' : '⭐ 收藏'}
                    </button>
                </div>
                <div class="expand-btn" onclick="game.toggleLearnPanel()">
                    <span class="arrow">▼</span>
                    <span id="expandBtnText">收起</span>
                </div>
            </div>
        `;

        this.learnPanelExpanded = true;
    }

    toggleLearnPanel() {
        const wrapper = document.getElementById('learnContentWrapper');
        const expandBtn = document.querySelector('.expand-btn');
        const arrow = expandBtn.querySelector('.arrow');
        const text = document.getElementById('expandBtnText');

        if (this.learnPanelExpanded) {
            wrapper.classList.remove('expanded');
            arrow.classList.remove('expanded');
            text.textContent = '展开查看赏析';
            this.learnPanelExpanded = false;
        } else {
            wrapper.classList.add('expanded');
            arrow.classList.add('expanded');
            text.textContent = '收起';
            this.learnPanelExpanded = true;
        }
    }

    closeLearnPanel() {
        const panel = document.getElementById('learnPanel');
        if (panel) {
            panel.innerHTML = '';
        }
        this.learnPanelExpanded = false;
        setTimeout(() => {
            if (this.state.hearts > 0) {
                if (this.state.mode === 'fill' || this.state.mode === 'match' || this.state.mode === 'feihua' || this.state.mode === 'chain') {
                    if (this.state.mode === 'fill') {
                        this.generateFillQuestion();
                    } else if (this.state.mode === 'match') {
                        this.generateMatchGame();
                    } else if (this.state.mode === 'feihua') {
                        this.generateFeihuaQuestion();
                    } else if (this.state.mode === 'chain') {
                        this.generateChainQuestion();
                    }
                }
            }
        }, 300);
    }

    collectCurrentPoem(poemId) {
        this.state.collectPoem(poemId);
        this.sound.play('collect');
        this.updateUI();
        const btn = document.querySelector('.collect-btn');
        if (btn) {
            btn.classList.add('collected');
            btn.innerHTML = '⭐ 已收藏';
        }
    }

    initChallengeMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="challengeContent"></div>`;
        this.generateChallengeQuestion();
    }

    generateChallengeQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChallengeQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'challenge', answer: poem.down};

        const content = document.getElementById('challengeContent');
        const contextTypes = ['background', 'author', 'tags'];
        const contextType = contextTypes[Math.floor(Math.random() * contextTypes.length)];
        let challengeText = '';
        switch(contextType) {
            case 'background': challengeText = `📖 背景提示:<br>${poem.background ? poem.background.substring(0, 60) + '...' : '这是一首' + poem.dynasty + '代' + poem.author + '的诗'}`; break;
            case 'author': challengeText = `👤 作者:${poem.dynasty} · ${poem.author}<br>🏷️ 标签:${poem.tags.join('、')}`; break;
            case 'tags': challengeText = `🏷️ 主题:${poem.tags.join('、')}<br>提示:上句是"${poem.up.substring(0, 2)}..."`; break;
        }

        content.innerHTML = `
            <div class="challenge-context">
                <div class="challenge-title">🎯 挑战模式</div>
                <div class="challenge-desc">${challengeText}</div>
            </div>
            <div class="poem-display">
                <div class="poem-text" style="font-size: 24px;">请根据提示选择正确的下句</div>
            </div>
            <div class="options-grid" id="challengeOptions"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('challengeOptions');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkChallengeAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }

    checkChallengeAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(15);
            if (this.state.addStreak()) this.showComboBonus();
            setTimeout(() => this.generateChallengeQuestion(), 1200);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateChallengeQuestion(), 1800);
        }
        this.updateUI();
    }

    initMatchMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="match-container">
                <div class="match-area" id="matchArea">
                    <div class="match-column" id="leftColumn"><div class="column-title">诗句上句</div></div>
                    <div class="match-column" id="rightColumn"><div class="column-title">作者 / 下句</div></div>
                </div>
                <div id="learnPanel"></div>
            </div>
        `;
        this.generateMatchGame();
    }

    generateMatchGame() {
        let pairCount = Math.min(3 + Math.floor(this.state.score / 50), 5);
        const pool = PoemDatabase.query({limit: pairCount * 2});
        const selected = pool.slice(0, pairCount);
        this.matchState = {poems: selected, selectedLeft: null, selectedRight: null, matched: 0, target: pairCount, isProcessing: false};

        const leftCol = document.getElementById('leftColumn');
        const rightCol = document.getElementById('rightColumn');
        leftCol.innerHTML = '<div class="column-title">诗句上句</div>';
        rightCol.innerHTML = '<div class="column-title">作者 / 下句</div>';

        selected.forEach((poem, idx) => {
            const item = document.createElement('div');
            item.className = 'match-item';
            item.textContent = poem.up;
            item.dataset.index = idx;
            item.dataset.side = 'left';
            item.onclick = () => this.selectMatchItem(item, 'left');
            leftCol.appendChild(item);
        });

        const rightItems = [];
        selected.forEach((poem, idx) => {
            rightItems.push({text: poem.author, index: idx, type: 'author'});
            rightItems.push({text: poem.down, index: idx, type: 'down'});
        });
        rightItems.sort(() => Math.random() - 0.5);
        rightItems.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'match-item';
            div.textContent = item.text;
            div.dataset.index = item.index;
            div.dataset.type = item.type;
            div.dataset.side = 'right';
            div.onclick = () => this.selectMatchItem(div, 'right');
            rightCol.appendChild(div);
        });

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    selectMatchItem(item, side) {
        if (this.matchState.isProcessing || item.classList.contains('matched')) return;
        document.querySelectorAll(`[data-side="${side}"]`).forEach(el => { if (!el.classList.contains('matched')) el.classList.remove('selected'); });
        item.classList.add('selected');
        if (side === 'left') this.matchState.selectedLeft = item; else this.matchState.selectedRight = item;
        if (this.matchState.selectedLeft && this.matchState.selectedRight) this.checkMatch();
    }

    checkMatch() {
        const state = this.matchState;
        state.isProcessing = true;
        const leftIdx = parseInt(state.selectedLeft.dataset.index);
        const rightIdx = parseInt(state.selectedRight.dataset.index);
        if (leftIdx === rightIdx) {
            state.selectedLeft.classList.remove('selected'); state.selectedRight.classList.remove('selected');
            state.selectedLeft.classList.add('matched'); state.selectedRight.classList.add('matched');
            this.sound.play('correct');
            this.state.addScore(10);
            state.matched++;
            if (state.matched >= state.target) {
                this.sound.play('combo');
                const lastPoem = state.poems[state.poems.length - 1];
                this.showLearnPanel(lastPoem);
            } else { state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false; }
        } else {
            state.selectedLeft.classList.add('wrong'); state.selectedRight.classList.add('wrong');
            this.sound.play('wrong');
            setTimeout(() => {
                state.selectedLeft.classList.remove('wrong', 'selected');
                state.selectedRight.classList.remove('wrong', 'selected');
                state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false;
            }, 800);
        }
        this.updateUI();
    }

    initFeihuaMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="feihuaContent"></div>`;
        this.generateFeihuaQuestion();
    }

    generateFeihuaQuestion() {
        if (this.state.hearts <= 0) return;
        const keyword = PoemDatabase.keywords[Math.floor(Math.random() * PoemDatabase.keywords.length)];
        const matching = PoemDatabase.query({requireKeyword: keyword, limit: 8});
        if (matching.length < 4) { this.generateFeihuaQuestion(); return; }

        const selected = matching[0];
        const isUp = selected.up.includes(keyword);
        const displayText = isUp ? selected.down : selected.up;
        const answer = isUp ? selected.up : selected.down;
        this.currentQuestion = {answer, keyword, poem: selected, type: 'feihua'};

        document.getElementById('feihuaContent').innerHTML = `
            <div style="text-align: center;">
                <div class="feihua-keyword">${keyword}</div>
                <div class="feihua-context">请选出含有"${keyword}"字的诗句</div>
            </div>
            <div class="poem-display" style="min-height: 80px;"><div class="poem-text">${displayText}</div></div>
            <div class="options-grid" id="feihuaOptions"></div>
            <div id="learnPanel"></div>
        `;

        const options = [answer];
        const distractors = matching.slice(1).filter(p => p.id !== selected.id);
        for (let i = 0; i < 3 && i < distractors.length; i++) {
            const p = distractors[i];
            const opt = p.up.includes(keyword) ? p.up : p.down;
            if (!options.includes(opt)) options.push(opt);
        }
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            const text = random.up + random.down;
            if (text.includes(keyword) && !options.includes(random.up) && !options.includes(random.down)) {
                options.push(random.up.includes(keyword) ? random.up : random.down);
            }
        }

        const grid = document.getElementById('feihuaOptions');
        options.sort(() => Math.random() - 0.5).forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFeihuaAnswer(card, opt);
            grid.appendChild(card);
        });
    }

    checkFeihuaAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(12);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFeihuaQuestion(), 1800);
        }
        this.updateUI();
    }

    initChainMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="chain-input-area">
                <div class="poem-display" style="min-height: 80px;">
                    <div class="poem-text" id="chainPoemText">请输入上句诗词</div>
                </div>
                <input type="text" class="chain-input" id="chainInput" placeholder="输入诗词..." onkeypress="if(event.key==='Enter')game.checkChainAnswer()">
                <div style="text-align: center; margin-top: 15px;">
                    <button class="action-btn" onclick="game.checkChainAnswer()">提交</button>
                    <button class="action-btn" onclick="game.skipChain()">跳过 (-5分)</button>
                </div>
                <div id="learnPanel"></div>
            </div>
        `;
        this.generateChainQuestion();
    }

    generateChainQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChainQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'chain', answer: poem.down};

        document.getElementById('chainPoemText').textContent = poem.up;
        document.getElementById('chainInput').value = '';
        document.getElementById('chainInput').focus();
        this.state.isProcessing = false;

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    checkChainAnswer() {
        if (this.state.isProcessing) return;
        const input = document.getElementById('chainInput').value.trim();
        if (!input) return;

        this.state.isProcessing = true;
        const result = PoemDatabase.fuzzyMatch(input, this.currentQuestion.answer);

        if (result.match) {
            this.sound.play('correct');
            this.state.addScore(15);
            if (this.state.addStreak()) this.showComboBonus();
            document.getElementById('chainInput').classList.add('correct');
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            this.sound.play('wrong');
            document.getElementById('chainInput').classList.add('wrong');
            setTimeout(() => {
                document.getElementById('chainInput').classList.remove('wrong');
                this.state.isProcessing = false;
                document.getElementById('chainInput').focus();
            }, 1000);
        }
    }

    skipChain() {
        if (this.state.score >= 5) {
            this.state.score -= 5;
            this.state.breakStreak();
            document.getElementById('chainInput').value = '';
            this.generateChainQuestion();
            this.updateUI();
        }
    }

    initLearnMode() {
        const main = document.getElementById('gameMain');
        const collectedPoems = PoemDatabase.poems.filter(p => this.state.collectedPoems.has(p.id));

        main.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 28px; color: var(--accent);">📚 我的收藏</div>
                <div style="color: var(--ink-light);">共收藏 ${collectedPoems.length} 首诗词</div>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
            <div id="learnPanel"></div>
        `;

        const grid = document.getElementById('collectionGrid');
        if (collectedPoems.length === 0) {
            grid.innerHTML = '<div style="text-align: center; color: var(--ink-light); padding: 40px;">暂无收藏,快去游戏中收集吧!</div>';
            return;
        }

        collectedPoems.forEach(poem => {
            const card = document.createElement('div');
            card.className = 'collection-card';
            card.innerHTML = `
                <div class="collection-poem">${poem.up}</div>
                <div class="collection-author">${poem.dynasty} · ${poem.author}</div>
                <div class="collection-preview">${poem.down}</div>
            `;
            card.onclick = () => {
                this.currentQuestion = {poem, type: 'learn'};
                this.showLearnPanel(poem);
            };
            grid.appendChild(card);
        });

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    showComboBonus() {
        const popup = document.createElement('div');
        popup.className = 'combo-popup';
        popup.textContent = `🔥 连击 x${this.state.streak}!`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
    }

    updateUI() {
        document.getElementById('scoreValue').textContent = this.state.score;
        document.getElementById('collectValue').textContent = this.state.collectedPoems.size;

        document.querySelectorAll('.heart').forEach((heart, i) => {
            heart.classList.toggle('lost', i >= this.state.hearts);
        });

        const streakContainer = document.getElementById('streakContainer');
        const streakBadge = document.getElementById('streakBadge');
        if (this.state.streak > 0) {
            streakContainer.style.display = 'flex';
            streakBadge.textContent = `连击 x${this.state.streak}`;
        } else {
            streakContainer.style.display = 'none';
        }

        const hintBtn = document.getElementById('hintBtn');
        if (hintBtn) {
            hintBtn.disabled = this.state.hintsUsed >= this.state.hintLimit || this.state.score < 5;
        }
    }

    useHint() {
        if (!this.state.useHint()) return;

        const gridId = this.state.mode === 'fill' ? 'optionsGrid' : 'challengeOptions';
        const grid = document.getElementById(gridId);
        if (!grid) return;

        const cards = grid.querySelectorAll('.option-card');
        cards.forEach(card => {
            if (card.textContent === this.currentQuestion.answer) {
                card.style.opacity = '1';
                card.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    card.style.transform = 'scale(1)';
                }, 300);
            } else {
                card.style.opacity = '0.3';
                setTimeout(() => {
                    card.style.opacity = '1';
                }, 2000);
            }
        });

        this.sound.play('correct');
        this.updateUI();
    }

    gameOver() {
        this.state.save();
        document.getElementById('finalScore').textContent = this.state.score;
        document.getElementById('finalStreak').textContent = this.state.maxStreak;
        document.getElementById('finalCollected').textContent = this.state.collectedPoems.size;
        document.getElementById('gameOverModal').classList.add('active');
    }

    restart() {
        this.state.reset();
        this.state.load();
        document.getElementById('gameOverModal').classList.remove('active');
        this.clearAutoTransition();
        this.init();
    }
}

// 初始化游戏
const game = new PoemGame();
game.init();

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        game.useHint();
    }
});
</script>
