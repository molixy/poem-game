<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#795548">
    <meta name="description" content="沉浸式古诗词学习游戏 - 诗笺雅集,寓教于乐">
    <title>诗笺雅集 - 诗词学习游戏</title>

    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <script src="utils.js"></script>
    <script src="poemDatabase.js"></script>
    <script src="dataLoader.js"></script>
    <script src="config.js"></script>
    <script>
        // 页面加载时预加载数据
        window.addEventListener('load', async () => {
            try {
                await DataLoader.preloadAll();
                console.log('数据预加载成功');
            } catch (error) {
                console.error('数据预加载失败:', error);
                // 显示错误提示给用户
                const mainContent = document.getElementById('gameMain');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <div class="error-message">
                            <h3>数据加载失败</h3>
                            <p>请刷新页面重试</p>
                            <button class="action-btn" onclick="location.reload()">刷新页面</button>
                        </div>
                    `;
                }
            }
        });

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (window.game) {
                window.game.destroy();
            }
        });

        // ==================== 游戏核心逻辑 ====================
        class Game {
            constructor() {
                this.currentMode = 'fill';
                this.currentDifficulty = 'EASY';
                this.score = 0;
                this.hearts = CONFIG.GAME.MAX_HEARTS;
                this.streak = 0;
                this.maxStreak = 0;
                this.collectedPoems = new Set();
                this.achievements = new Set();
                this.achievementProgress = {};
                this.dailyTasks = JSON.parse(JSON.stringify(CONFIG.DAILY_TASKS));
                this.dailyStreak = 0;
                this.lastDailyReset = null;
                this.gameState = {
                    currentPoem: null,
                    currentQuestion: null,
                    options: [],
                    selectedAnswer: null,
                    matchedPairs: [],
                    chainPoems: [],
                    feihuaKeyword: '',
                    feihuaPoems: []
                };
                this.settings = {
                    sound: true,
                    autoSave: true,
                    animation: true,
                    speech: true
                };
                this.stats = {
                    totalGames: 0,
                    totalScore: 0,
                    totalCorrect: 0,
                    totalWrong: 0,
                    averageScore: 0,
                    bestStreak: 0,
                    totalPlayTime: 0,
                    lastPlayed: null,
                    modesPlayed: new Set()
                };
                // 存储事件监听器，用于后续清理
                this.eventListeners = [];
                // 存储定时器ID，用于后续清理
                this.autoSaveInterval = null;
                this.initialize();
            }

            async initialize() {
                this.loadData();
                this.startAutoSave();
                
                // 等待 DOM 元素加载完成后再进行渲染
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => {
                        this.setupEventListeners();
                        this.switchMode('fill');
                    });
                } else {
                    this.setupEventListeners();
                    this.switchMode('fill');
                }
            }

            loadData() {
                try {
                    const savedData = localStorage.getItem(CONFIG.STORAGE_KEY);
                    if (savedData) {
                        const allData = JSON.parse(savedData);
                        
                        // 加载游戏数据
                        if (allData.game) {
                            const gameData = allData.game;
                            this.score = gameData.score || 0;
                            this.hearts = gameData.hearts || CONFIG.GAME.MAX_HEARTS;
                            this.streak = gameData.streak || 0;
                            this.maxStreak = gameData.maxStreak || 0;
                            this.collectedPoems = new Set(Array.isArray(gameData.collectedPoems) ? gameData.collectedPoems : []);
                            this.achievements = new Set(Array.isArray(gameData.achievements) ? gameData.achievements : []);
                            this.currentMode = gameData.currentMode || 'fill';
                            this.currentDifficulty = gameData.currentDifficulty || 'EASY';
                        }

                        // 加载设置数据
                        if (allData.settings) {
                            this.settings = { ...this.settings, ...allData.settings };
                        }

                        // 加载统计数据
                        if (allData.stats) {
                            this.stats = { ...this.stats, ...allData.stats };
                            this.stats.modesPlayed = new Set(Array.isArray(this.stats.modesPlayed) ? this.stats.modesPlayed : []);
                        }

                        // 加载成就数据
                        if (allData.achievements) {
                            this.achievementProgress = allData.achievements.achievementProgress || {};
                            this.dailyStreak = allData.achievements.dailyStreak || 0;
                        }

                        // 加载每日任务数据
                        if (allData.dailyTasks) {
                            this.dailyTasks = allData.dailyTasks;
                        }

                        // 加载最后重置时间
                        this.lastDailyReset = allData.lastDailyReset;
                    } else {
                        // 兼容旧数据格式
                        this.loadOldDataFormat();
                    }
                    
                    this.checkDailyReset();
                } catch (error) {
                    console.error('Error loading data:', error);
                    // 尝试加载旧数据格式
                    this.loadOldDataFormat();
                }
            }
            
            // 加载旧数据格式（兼容处理）
            loadOldDataFormat() {
                try {
                    const savedData = localStorage.getItem(CONFIG.STORAGE_KEY);
                    if (savedData) {
                        // 尝试解析为旧格式
                        try {
                            const data = JSON.parse(savedData);
                            if (data.score !== undefined) {
                                // 旧格式
                                this.score = data.score || 0;
                                this.hearts = data.hearts || CONFIG.GAME.MAX_HEARTS;
                                this.streak = data.streak || 0;
                                this.maxStreak = data.maxStreak || 0;
                                this.collectedPoems = new Set(Array.isArray(data.collectedPoems) ? data.collectedPoems : []);
                                this.achievements = new Set(Array.isArray(data.achievements) ? data.achievements : []);
                                this.currentMode = data.currentMode || 'fill';
                                this.currentDifficulty = data.currentDifficulty || 'EASY';
                            }
                        } catch (e) {
                            console.error('Error parsing old data format:', e);
                        }
                    }

                    const settingsData = localStorage.getItem(CONFIG.SETTINGS_KEY);
                    if (settingsData) {
                        this.settings = { ...this.settings, ...JSON.parse(settingsData) };
                    }

                    const statsData = localStorage.getItem(CONFIG.STATS_KEY);
                    if (statsData) {
                        this.stats = { ...this.stats, ...JSON.parse(statsData) };
                        this.stats.modesPlayed = new Set(Array.isArray(this.stats.modesPlayed) ? this.stats.modesPlayed : []);
                    }

                    const achievementsData = localStorage.getItem(CONFIG.ACHIEVEMENTS_KEY);
                    if (achievementsData) {
                        const data = JSON.parse(achievementsData);
                        this.achievementProgress = data.achievementProgress || {};
                        this.dailyStreak = data.dailyStreak || 0;
                    }

                    const dailyTasksData = localStorage.getItem(CONFIG.DAILY_TASKS_KEY);
                    if (dailyTasksData) {
                        this.dailyTasks = JSON.parse(dailyTasksData);
                    }

                    this.lastDailyReset = localStorage.getItem(CONFIG.LAST_DAILY_RESET_KEY);
                } catch (error) {
                    console.error('Error loading old data format:', error);
                }
            }

            // 实际的保存数据方法
            _saveData() {
                try {
                    // 批量存储所有数据
                    const allData = {
                        game: {
                            score: this.score,
                            hearts: this.hearts,
                            streak: this.streak,
                            maxStreak: this.maxStreak,
                            collectedPoems: Array.from(this.collectedPoems),
                            achievements: Array.from(this.achievements),
                            currentMode: this.currentMode,
                            currentDifficulty: this.currentDifficulty
                        },
                        settings: this.settings,
                        stats: this.stats,
                        achievements: {
                            achievementProgress: this.achievementProgress,
                            dailyStreak: this.dailyStreak,
                        },
                        dailyTasks: this.dailyTasks,
                        lastDailyReset: this.lastDailyReset
                    };
                    
                    // 使用单个LocalStorage键存储所有数据
                    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(allData));
                } catch (error) {
                    console.error('Error saving data:', error);
                }
            }
            
            // 对外暴露的保存方法，使用节流
            saveData() {
                // 直接调用_saveData方法，不使用节流（避免语法错误）
                this._saveData();
            }

            startAutoSave() {
                // 清理已存在的定时器，防止内存泄漏
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                }
                this.autoSaveInterval = setInterval(() => {
                    if (this.settings.autoSave) {
                        this.saveData();
                    }
                }, CONFIG.GAME.AUTO_SAVE_INTERVAL);
            }

            setupEventListeners() {
                // 清理旧的事件监听器
                this.clearEventListeners();
                
                // 模式切换
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    const listener = (e) => {
                        const mode = e.target.closest('.mode-tab').dataset.mode;
                        this.switchMode(mode);
                    };
                    tab.addEventListener('click', listener);
                    this.eventListeners.push({ element: tab, event: 'click', listener });
                });

                // 难度选择
                document.querySelectorAll('.level-card').forEach(card => {
                    const listener = (e) => {
                        if (!card.classList.contains('locked')) {
                            const level = card.dataset.level;
                            this.setDifficulty(level);
                        }
                    };
                    card.addEventListener('click', listener);
                    this.eventListeners.push({ element: card, event: 'click', listener });
                });

                // 提示按钮
                const hintBtn = document.getElementById('hintBtn');
                if (hintBtn) {
                    const listener = () => {
                        this.useHint();
                    };
                    hintBtn.addEventListener('click', listener);
                    this.eventListeners.push({ element: hintBtn, event: 'click', listener });
                }

                // 重开按钮
                const restartBtn = document.querySelector('.action-btn:last-child');
                if (restartBtn) {
                    const listener = () => {
                        this.restart();
                    };
                    restartBtn.addEventListener('click', listener);
                    this.eventListeners.push({ element: restartBtn, event: 'click', listener });
                }

                // 主题切换
                const themeSelect = document.getElementById('themeSelect');
                if (themeSelect) {
                    const listener = (e) => {
                        this.setTheme(e.target.value);
                    };
                    themeSelect.addEventListener('change', listener);
                    this.eventListeners.push({ element: themeSelect, event: 'change', listener });
                }
            }
            
            // 清理事件监听器
            clearEventListeners() {
                this.eventListeners.forEach(({ element, event, listener }) => {
                    try {
                        element.removeEventListener(event, listener);
                    } catch (error) {
                        console.error('Error removing event listener:', error);
                    }
                });
                this.eventListeners = [];
            }

            // 清理定时器,防止内存泄漏
            clearAutoSaveInterval() {
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                    this.autoSaveInterval = null;
                }
            }

            // 销毁游戏实例,清理所有资源
            destroy() {
                this.clearEventListeners();
                this.clearAutoSaveInterval();
                this.saveData();
            }

            async switchMode(mode) {
                this.currentMode = mode;
                this.updateModeTabs();
                await this.renderModeContent();
            }

            updateModeTabs() {
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.classList.remove('active');
                });
                const activeTab = document.querySelector(`.mode-tab[data-mode="${this.currentMode}"]`);
                if (activeTab) {
                    activeTab.classList.add('active');
                }
            }

            async renderModeContent() {
                const mainContent = document.getElementById('gameMain');
                if (!mainContent) {
                    console.error('Game main content element not found');
                    return;
                }
                mainContent.innerHTML = '';

                switch (this.currentMode) {
                    case 'fill':
                        await this.renderFillMode();
                        break;
                    case 'challenge':
                        await this.renderChallengeMode();
                        break;
                    case 'match':
                        await this.renderMatchMode();
                        break;
                    case 'feihua':
                        await this.renderFeihuaMode();
                        break;
                    case 'chain':
                        await this.renderChainMode();
                        break;
                    case 'learn':
                        await this.renderLearnMode();
                        break;
                }
            }

            async renderFillMode() {
                try {
                    const mainContent = document.getElementById('gameMain');
                    if (!mainContent) {
                        throw new Error('Game main content element not found');
                    }
                    
                    const poems = await DataLoader.loadPoems();
                    if (!poems || poems.length === 0) {
                        const fragment = document.createDocumentFragment();
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        errorDiv.innerHTML = `
                            <h3>数据加载失败</h3>
                            <p>无法加载诗词数据，请刷新页面重试</p>
                        `;
                        fragment.appendChild(errorDiv);
                        mainContent.innerHTML = '';
                        mainContent.appendChild(fragment);
                        return;
                    }
                    
                    const filteredPoems = poems.filter(poem => poem.difficulty <= CONFIG.DIFFICULTY[this.currentDifficulty].level);
                    if (filteredPoems.length === 0) {
                        const fragment = document.createDocumentFragment();
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        errorDiv.innerHTML = `
                            <h3>没有可用的诗词</h3>
                            <p>请尝试调整难度设置</p>
                        `;
                        fragment.appendChild(errorDiv);
                        mainContent.innerHTML = '';
                        mainContent.appendChild(fragment);
                        return;
                    }
                    
                    const randomPoem = filteredPoems[Math.floor(Math.random() * filteredPoems.length)];
                    if (!randomPoem) {
                        throw new Error('Failed to get random poem');
                    }

                    this.gameState.currentPoem = randomPoem;

                    const fragment = document.createDocumentFragment();
                    
                    const poemDisplay = document.createElement('div');
                    poemDisplay.className = 'poem-display';
                    poemDisplay.innerHTML = `
                        <div class="poem-text">${randomPoem.up}</div>
                        <div class="poem-hint">请选择正确的下一句</div>
                    `;
                    fragment.appendChild(poemDisplay);

                    const optionsGrid = document.createElement('div');
                    optionsGrid.className = 'options-grid';
                    
                    const optionsFragment = document.createDocumentFragment();
                    this.generateOptions(randomPoem).forEach(option => {
                        const optionCard = document.createElement('div');
                        optionCard.className = 'option-card';
                        optionCard.textContent = option;
                        optionCard.addEventListener('click', () => this.checkAnswer(option));
                        optionsFragment.appendChild(optionCard);
                    });
                    optionsGrid.appendChild(optionsFragment);
                    fragment.appendChild(optionsGrid);

                    mainContent.innerHTML = '';
                    mainContent.appendChild(fragment);
                } catch (error) {
                    console.error('Error in renderFillMode:', error);
                    const mainContent = document.getElementById('gameMain');
                    if (mainContent) {
                        const fragment = document.createDocumentFragment();
                        const errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        errorDiv.innerHTML = `
                            <h3>加载失败</h3>
                            <p>发生错误：${error.message}</p>
                            <button class="action-btn">重试</button>
                        `;
                        const retryBtn = errorDiv.querySelector('.action-btn');
                        retryBtn.addEventListener('click', () => this.renderFillMode());
                        fragment.appendChild(errorDiv);
                        mainContent.innerHTML = '';
                        mainContent.appendChild(fragment);
                    }
                }
            }

            generateOptions(correctPoem) {
                try {
                    const poems = PoemDatabase.poems;
                    if (!poems || poems.length === 0) {
                        return [correctPoem.down, '错误选项1', '错误选项2', '错误选项3'];
                    }
                    
                    const options = [correctPoem.down];
                    let attempts = 0;
                    const maxAttempts = 100;
                    
                    while (options.length < 4 && attempts < maxAttempts) {
                        attempts++;
                        const randomPoem = poems[Math.floor(Math.random() * poems.length)];
                        if (randomPoem && randomPoem.down && randomPoem.down !== correctPoem.down && !options.includes(randomPoem.down)) {
                            options.push(randomPoem.down);
                        }
                    }

                    // 如果无法生成足够的选项，添加默认选项
                    while (options.length < 4) {
                        options.push(`选项${options.length + 1}`);
                    }

                    return Utils.shuffle(options);
                } catch (error) {
                    console.error('Error in generateOptions:', error);
                    return [correctPoem.down, '错误选项1', '错误选项2', '错误选项3'];
                }
            }

            checkAnswer(answer) {
                try {
                    if (!this.gameState.currentPoem || !this.gameState.currentPoem.down) {
                        throw new Error('Game state is not properly initialized');
                    }
                    
                    const correct = answer === this.gameState.currentPoem.down;
                    const optionCards = document.querySelectorAll('.option-card');

                    optionCards.forEach(card => {
                        if (card.textContent.trim() === answer) {
                            card.classList.add(correct ? 'correct' : 'wrong');
                        }
                    });

                    if (correct) {
                        this.handleCorrectAnswer();
                    } else {
                        this.handleWrongAnswer();
                    }

                    setTimeout(() => {
                        this.renderFillMode();
                    }, CONFIG.ANIMATION.TRANSITION_DELAY);
                } catch (error) {
                    console.error('Error in checkAnswer:', error);
                    // 重新加载游戏
                    setTimeout(() => {
                        this.renderFillMode();
                    }, CONFIG.ANIMATION.TRANSITION_DELAY);
                }
            }

            handleCorrectAnswer() {
                try {
                    this.score += CONFIG.GAME.BASE_SCORE * CONFIG.DIFFICULTY[this.currentDifficulty].scoreMultiplier;
                    this.streak++;
                    this.maxStreak = Math.max(this.maxStreak, this.streak);
                    this.hearts = Math.min(this.hearts + 1, CONFIG.GAME.MAX_HEARTS);
                    this.stats.totalCorrect++;

                    if (this.streak >= CONFIG.GAME.COMBO_THRESHOLD) {
                        const bonus = this.streak * CONFIG.GAME.COMBO_BONUS;
                        this.score += bonus;
                        this.showComboPopup(this.streak);
                    }

                    // 显示诗词赏析
                    if (this.gameState.currentPoem) {
                        setTimeout(() => {
                            this.showPoemAnalysis(this.gameState.currentPoem.id);
                        }, CONFIG.ANIMATION.TRANSITION_DELAY / 2);
                    }

                    this.updateScoreDisplay();
                    this.updateHeartsDisplay();
                    this.updateStreakDisplay();
                    this.saveData();
                } catch (error) {
                    console.error('Error in handleCorrectAnswer:', error);
                    // 即使出错也要更新显示
                    try {
                        this.updateScoreDisplay();
                        this.updateHeartsDisplay();
                        this.updateStreakDisplay();
                    } catch (e) {
                        console.error('Error updating displays:', e);
                    }
                }
            }

            handleWrongAnswer() {
                try {
                    this.hearts--;
                    this.streak = 0;
                    this.stats.totalWrong++;

                    if (this.hearts <= 0) {
                        this.gameOver();
                    }

                    this.updateHeartsDisplay();
                    this.updateStreakDisplay();
                    this.saveData();
                } catch (error) {
                    console.error('Error in handleWrongAnswer:', error);
                    // 即使出错也要更新显示
                    try {
                        this.updateHeartsDisplay();
                        this.updateStreakDisplay();
                    } catch (e) {
                        console.error('Error updating displays:', e);
                    }
                }
            }

            updateScoreDisplay() {
                try {
                    const scoreElement = document.getElementById('scoreValue');
                    if (scoreElement) {
                        scoreElement.textContent = Math.round(this.score);
                    }
                } catch (error) {
                    console.error('Error updating score display:', error);
                }
            }

            updateHeartsDisplay() {
                try {
                    const heartsDisplay = document.getElementById('heartsDisplay');
                    if (heartsDisplay) {
                        heartsDisplay.innerHTML = '';
                        for (let i = 0; i < CONFIG.GAME.MAX_HEARTS; i++) {
                            const heart = document.createElement('span');
                            heart.className = `heart ${i >= this.hearts ? 'lost' : ''}`;
                            heart.textContent = '❤️';
                            heartsDisplay.appendChild(heart);
                        }
                    }
                } catch (error) {
                    console.error('Error updating hearts display:', error);
                }
            }

            updateStreakDisplay() {
                try {
                    const streakContainer = document.getElementById('streakContainer');
                    const streakBadge = document.getElementById('streakBadge');
                    
                    if (streakContainer && streakBadge) {
                        if (this.streak > 0) {
                            streakContainer.style.display = 'block';
                            streakBadge.textContent = `连击 x${this.streak}`;
                        } else {
                            streakContainer.style.display = 'none';
                        }
                    }
                } catch (error) {
                    console.error('Error updating streak display:', error);
                }
            }

            showComboPopup(combo) {
                try {
                    const popup = document.createElement('div');
                    popup.className = 'combo-popup';
                    popup.textContent = `连击 ${combo}！`;
                    document.body.appendChild(popup);
                    
                    // 使用requestAnimationFrame确保动画流畅
                    requestAnimationFrame(() => {
                        // 动画已经通过CSS处理
                    });
                    
                    // 使用requestAnimationFrame和时间戳来控制动画持续时间
                    const startTime = performance.now();
                    const duration = 1000;
                    
                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        if (elapsed < duration) {
                            requestAnimationFrame(animate);
                        } else {
                            if (popup.parentNode) {
                                requestAnimationFrame(() => {
                                    popup.parentNode.removeChild(popup);
                                });
                            }
                        }
                    };
                    
                    requestAnimationFrame(animate);
                } catch (error) {
                    console.error('Error in showComboPopup:', error);
                }
            }

            useHint() {
                if (this.score >= CONFIG.GAME.HINT_COST) {
                    this.score -= CONFIG.GAME.HINT_COST;
                    this.updateScoreDisplay();
                    
                    const optionCards = document.querySelectorAll('.option-card');
                    const wrongOptions = [];
                    
                    // 收集所有错误选项
                    optionCards.forEach(card => {
                        if (card.textContent.trim() !== this.gameState.currentPoem.down) {
                            wrongOptions.push(card);
                        }
                    });
                    
                    // 随机隐藏一个错误选项
                    if (wrongOptions.length > 0) {
                        const randomIndex = Math.floor(Math.random() * wrongOptions.length);
                        wrongOptions[randomIndex].style.opacity = '0.3';
                        wrongOptions[randomIndex].style.pointerEvents = 'none';
                        wrongOptions[randomIndex].title = '错误选项已排除';
                    }
                }
            }

            async renderChallengeMode() {
                try {
                    const mainContent = document.getElementById('gameMain');
                    if (!mainContent) {
                        throw new Error('Game main content element not found');
                    }
                    
                    const fragment = document.createDocumentFragment();
                    
                    const challengeContext = document.createElement('div');
                    challengeContext.className = 'challenge-context';
                    challengeContext.innerHTML = `
                        <div class="challenge-title">挑战模式</div>
                        <div class="challenge-desc">在限定时间内回答尽可能多的问题，每答对一题获得分数，答错则失去生命值。</div>
                    `;
                    fragment.appendChild(challengeContext);

                    const poemDisplay = document.createElement('div');
                    poemDisplay.className = 'poem-display';
                    poemDisplay.innerHTML = `
                        <div class="poem-text">准备开始挑战</div>
                        <div class="poem-hint">点击开始按钮开始挑战</div>
                    `;
                    fragment.appendChild(poemDisplay);

                    const buttonContainer = document.createElement('div');
                    buttonContainer.style.textAlign = 'center';
                    
                    const startButton = document.createElement('button');
                    startButton.className = 'action-btn';
                    startButton.textContent = '开始挑战';
                    startButton.style.padding = '16px 48px';
                    startButton.style.fontSize = '18px';
                    startButton.addEventListener('click', () => this.startChallenge());
                    buttonContainer.appendChild(startButton);
                    fragment.appendChild(buttonContainer);

                    mainContent.innerHTML = '';

            selectMatchItem(item) {
                try {
                    // 检查是否已经被选中
                    if (item.classList.contains('selected')) {
                        item.classList.remove('selected');
                        this.gameState.selectedAnswer = null;
                        return;
                    }
                    
                    // 清除之前的选中状态
                    document.querySelectorAll('.match-item.selected').forEach(selectedItem => {
                        selectedItem.classList.remove('selected');
                    });
                    
                    // 标记当前选中项
                    item.classList.add('selected');
                    this.gameState.selectedAnswer = {
                        id: item.dataset.id,
                        type: item.dataset.type
                    };
                    
                    // 检查是否有两个选中项
                    const selectedItems = document.querySelectorAll('.match-item.selected');
                    if (selectedItems.length === 2) {
                        const [first, second] = selectedItems;
                        const firstId = first.dataset.id;
                        const secondId = second.dataset.id;
                        const firstType = first.dataset.type;
                        const secondType = second.dataset.type;
                        
                        // 检查是否匹配（不同类型且相同ID）
                        if (firstType !== secondType && firstId === secondId) {
                            // 匹配成功
                            selectedItems.forEach(selectedItem => {
                                selectedItem.classList.add('matched');
                                selectedItem.classList.remove('selected');
                            });
                            this.handleCorrectAnswer();
                            
                            // 检查是否所有配对都完成
                            const matchedItems = document.querySelectorAll('.match-item.matched');
                            const totalItems = document.querySelectorAll('.match-item').length;
                            if (matchedItems.length === totalItems) {
                                // 所有配对完成
                                setTimeout(() => {
                                    this.renderMatchMode();
                                }, 1000);
                            }
                        } else {
                            // 匹配失败
                            selectedItems.forEach(selectedItem => {
                                selectedItem.classList.add('wrong');
                            });
                            this.handleWrongAnswer();
                            
                            // 清除错误状态
                            setTimeout(() => {
                                selectedItems.forEach(selectedItem => {
                                    selectedItem.classList.remove('selected', 'wrong');
                                });
                                this.gameState.selectedAnswer = null;
                            }, 1000);
                        }
                    }
                } catch (error) {
                    console.error('Error in selectMatchItem:', error);
                }
            }

            // 输入验证和清理，防止XSS攻击
            sanitizeInput(input) {
                if (typeof input !== 'string') {
                    return '';
                }

                // 限制输入长度
                const maxLength = 200;
                input = input.slice(0, maxLength);

                // 移除危险的HTML标签和属性
                input = input.replace(/<script[^>]*>.*?<\/script>/gi, '')
                           .replace(/<iframe[^>]*>.*?<\/iframe>/gi, '')
                           .replace(/<embed[^>]*>/gi, '')
                           .replace(/<object[^>]*>.*?<\/object>/gi, '')
                           .replace(/on\w+\s*=\s*["'][^"']*["']/gi, '')
                           .replace(/javascript:/gi, '')
                           .replace(/data:\s*text\/html/i, '');

                // 转义特殊字符
                input = input.replace(/&/g, '&amp;')
                           .replace(/</g, '&lt;')
                           .replace(/>/g, '&gt;')
                           .replace(/"/g, '&quot;')
                           .replace(/'/g, '&#039;');

                return input.trim();
            }

            showStats() {
                const modal = document.getElementById('statsModal');
                const content = document.getElementById('statsContent');
                content.innerHTML = `
                    <div>总游戏次数: ${this.stats.totalGames}</div>
                    <div>总得分: ${Math.round(this.stats.totalScore)}</div>
                    <div>正确答题: ${this.stats.totalCorrect}</div>
                    <div>错误答题: ${this.stats.totalWrong}</div>
                    <div>平均得分: ${Math.round(this.stats.averageScore)}</div>
                    <div>最佳连击: ${this.stats.bestStreak}</div>
                    <div>总游戏时间: ${Math.round(this.stats.totalPlayTime / 60)}分钟</div>
                    <div>最后游戏: ${this.stats.lastPlayed ? new Date(this.stats.lastPlayed).toLocaleString() : '从未'}</div>
                `;
                modal.classList.add('active');
            }

            // ==================== 成就系统 ====================
            checkDailyReset() {
                const today = new Date().toDateString();
                if (this.lastDailyReset !== today) {
                    this.dailyTasks = JSON.parse(JSON.stringify(CONFIG.DAILY_TASKS));
                    this.lastDailyReset = today;
                    this.dailyStreak++;
                    this.saveData();
                    this.checkAchievements();
                }
            }

            updateAchievements() {
                // 更新成就进度
                this.achievementProgress.score = this.score;
                this.achievementProgress.streak = this.streak;
                this.achievementProgress.collectedPoems = this.collectedPoems.size;
                this.achievementProgress.dailyStreak = this.dailyStreak;
                this.achievementProgress.modesPlayed = this.stats.modesPlayed.size;

                this.checkAchievements();
            }

            checkAchievements() {
                // 检查成就达成
                const achievements = Object.values(CONFIG.ACHIEVEMENTS);
                for (const achievement of achievements) {
                    if (!this.achievements.has(achievement.id)) {
                        let achieved = false;

                        switch (achievement.id) {
                            case 'first_game':
                                achieved = this.stats.totalGames > 0;
                                break;
                            case 'score_100':
                                achieved = this.score >= 100;
                                break;
                            case 'score_500':
                                achieved = this.score >= 500;
                                break;
                            case 'score_1000':
                                achieved = this.score >= 1000;
                                break;
                            case 'streak_5':
                                achieved = this.streak >= 5;
                                break;
                            case 'streak_10':
                                achieved = this.streak >= 10;
                                break;
                            case 'streak_20':
                                achieved = this.streak >= 20;
                                break;
                            case 'collect_10':
                                achieved = this.collectedPoems.size >= 10;
                                break;
                            case 'collect_50':
                                achieved = this.collectedPoems.size >= 50;
                                break;
                            case 'collect_100':
                                achieved = this.collectedPoems.size >= 100;
                                break;
                            case 'daily_7':
                                achieved = this.dailyStreak >= 7;
                                break;
                            case 'daily_30':
                                achieved = this.dailyStreak >= 30;
                                break;
                            case 'all_modes':
                                achieved = this.stats.modesPlayed.size >= 6;
                                break;
                        }

                        if (achieved) {
                            this.unlockAchievement(achievement);
                        }
                    }
                }
            }

            unlockAchievement(achievement) {
                this.achievements.add(achievement.id);
                this.score += achievement.reward;
                this.updateScoreDisplay();
                this.showAchievementPopup(achievement);
                this.saveData();
            }

            showAchievementPopup(achievement) {
                try {
                    const popup = document.createElement('div');
                    popup.className = 'achievement-popup';
                    popup.innerHTML = `
                        <div class="achievement-icon">🏆</div>
                        <div class="achievement-title">成就解锁</div>
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-desc">${achievement.description}</div>
                        <div class="achievement-reward">+${achievement.reward} 分</div>
                    `;
                    document.body.appendChild(popup);
                    
                    // 使用requestAnimationFrame确保动画流畅
                    requestAnimationFrame(() => {
                        // 动画已经通过CSS处理
                    });
                    
                    // 使用requestAnimationFrame和时间戳来控制动画持续时间
                    const startTime = performance.now();
                    const duration = 3000;
                    
                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        if (elapsed < duration) {
                            requestAnimationFrame(animate);
                        } else {
                            if (popup.parentNode) {
                                requestAnimationFrame(() => {
                                    popup.parentNode.removeChild(popup);
                                });
                            }
                        }
                    };
                    
                    requestAnimationFrame(animate);
                } catch (error) {
                    console.error('Error in showAchievementPopup:', error);
                }
            }

            // ==================== 每日任务 ====================
            updateDailyTasks(taskId, progress = 1) {
                try {
                    const task = this.dailyTasks.find(t => t.id === taskId);
                    if (task) {
                        task.progress = Math.min(task.progress + progress, task.target);
                        if (task.progress >= task.target) {
                            this.completeDailyTask(task);
                        }
                        this.saveData();
                    }
                } catch (error) {
                    console.error('Error in updateDailyTasks:', error);
                }
            }

            completeDailyTask(task) {
                try {
                    this.score += task.reward;
                    this.updateScoreDisplay();
                    this.showTaskCompletePopup(task);
                } catch (error) {
                    console.error('Error in completeDailyTask:', error);
                }
            }

            showTaskCompletePopup(task) {
                try {
                    const popup = document.createElement('div');
                    popup.className = 'task-popup';
                    popup.innerHTML = `
                        <div class="task-icon">✅</div>
                        <div class="task-title">任务完成</div>
                        <div class="task-name">${task.name}</div>
                        <div class="task-reward">+${task.reward} 分</div>
                    `;
                    document.body.appendChild(popup);
                    
                    // 使用requestAnimationFrame确保动画流畅
                    requestAnimationFrame(() => {
                        // 动画已经通过CSS处理
                    });
                    
                    // 使用requestAnimationFrame和时间戳来控制动画持续时间
                    const startTime = performance.now();
                    const duration = 2000;
                    
                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        if (elapsed < duration) {
                            requestAnimationFrame(animate);
                        } else {
                            if (popup.parentNode) {
                                requestAnimationFrame(() => {
                                    popup.parentNode.removeChild(popup);
                                });
                            }
                        }
                    };
                    
                    requestAnimationFrame(animate);
                } catch (error) {
                    console.error('Error in showTaskCompletePopup:', error);
                }
            }

            // ==================== 游戏记录 ====================
            updateGameStats() {
                this.stats.totalGames++;
                this.stats.totalScore += this.score;
                this.stats.averageScore = this.stats.totalScore / this.stats.totalGames;
                this.stats.bestStreak = Math.max(this.stats.bestStreak, this.maxStreak);
                this.stats.lastPlayed = new Date().toISOString();
                this.stats.modesPlayed.add(this.currentMode);
                this.saveData();
            }

            deletePoem(poemId) {
                if (confirm('确定要删除这首诗词吗？')) {
                    try {
                        // 从localStorage中删除诗词数据
                        const savedData = localStorage.getItem(CONFIG.STORAGE_KEY);
                        if (savedData) {
                            const allData = JSON.parse(savedData);
                            if (allData.poems) {
                                allData.poems = allData.poems.filter(poem => poem.id !== poemId);
                                localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(allData));
                            }
                        }
                        
                        // 重新渲染学习模式
                        this.renderLearnMode();
                    } catch (error) {
                        console.error('Error deleting poem:', error);
                        alert('删除失败，请重试');
                    }
                }
            }

            clearData() {
                if (confirm('确定要清除所有游戏数据吗？')) {
                    localStorage.removeItem(CONFIG.STORAGE_KEY);
                    localStorage.removeItem(CONFIG.SETTINGS_KEY);
                    localStorage.removeItem(CONFIG.STATS_KEY);
                    localStorage.removeItem(CONFIG.ACHIEVEMENTS_KEY);
                    localStorage.removeItem(CONFIG.DAILY_TASKS_KEY);
                    localStorage.removeItem(CONFIG.LAST_DAILY_RESET_KEY);
                    this.initialize();
                }
            }
        }

        // 等待 DOM 元素加载完成后再初始化游戏
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                // 初始化游戏并暴露到全局作用域
                window.game = new Game();
            });
        } else {
            // 初始化游戏并暴露到全局作用域
            window.game = new Game();
        }
    </script>
