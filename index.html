<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#795548">
    <meta name="description" content="沉浸式古诗词学习游戏 - 诗笺雅集,寓教于乐">
    <title>诗笺雅集 - 诗词学习游戏</title>

    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 优化后的配色方案 */
            --primary: #795548;
            --primary-light: #8d6e63;
            --primary-dark: #5d4037;
            
            --paper: #fdf6e3;
            --paper-light: #fef9e7;
            --paper-dark: #f0e6d2;
            
            --ink: #2d2d2d;
            --ink-light: #5d5d5d;
            --ink-lighter: #8a8a8a;
            
            --accent: #c68e17;
            --accent-light: #d4a574;
            --accent-dark: #9e6d0f;
            
            --gold: #c9a27e;
            --gold-light: #e0c0a0;
            
            --success: #43a047;
            --success-light: #66bb6a;
            --success-bg: #e8f5e9;
            
            --error: #e53935;
            --error-light: #ef5350;
            --error-bg: #ffebee;
            
            --warning: #f9a825;
            --warning-light: #ffb300;
            --warning-bg: #fff8e1;
            
            --info: #1e88e5;
            --info-light: #42a5f5;
            --info-bg: #e3f2fd;
            
            --shadow: rgba(121, 85, 72, 0.12);
            --shadow-medium: rgba(121, 85, 72, 0.18);
            --shadow-heavy: rgba(121, 85, 72, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Noto Serif SC', 'STKaiti', serif;
            background: var(--paper);
            background-image: linear-gradient(135deg, var(--paper) 0%, var(--paper-light) 100%);
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        #app {
            max-width: 960px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header 优化 */
        header {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: 0 4px 24px var(--shadow);
            border: 2px solid var(--gold);
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        header:hover {
            box-shadow: 0 8px 32px var(--shadow-medium);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .game-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 36px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 2px 8px rgba(121, 85, 72, 0.15);
        }

        .game-title::before {
            content: '📜';
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .score-board {
            display: flex;
            gap: 24px;
            background: var(--paper-light);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1.5px solid var(--gold-light);
            flex-wrap: wrap;
        }

        .score-item {
            text-align: center;
            position: relative;
        }

        .score-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 24px;
            background: var(--gold);
        }

        .score-label {
            font-size: 13px;
            color: var(--ink-lighter);
            display: block;
            margin-bottom: 4px;
        }

        .score-value {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mode Tabs 优化 */
        .mode-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }

        .mode-tabs::-webkit-scrollbar {
            display: none;
        }

        .mode-tab {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border: 2px solid var(--gold);
            background: var(--paper);
            border-radius: 28px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            color: var(--ink-light);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .mode-tab:hover:not(.active) {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--shadow);
            border-color: var(--accent);
        }

        .mode-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--paper);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-heavy);
        }

        .mode-tab .icon {
            display: block;
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* Main 区域优化 */
        main {
            flex: 1;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 8px 32px var(--shadow);
            border: 2px solid var(--gold);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        main::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold) 0%, var(--accent) 50%, var(--gold) 100%);
        }

        /* Level Selector 优化 */
        .level-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }

        .level-card {
            background: linear-gradient(135deg, var(--paper) 0%, var(--paper-light) 100%);
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .level-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .level-card:hover:not(.locked)::before {
            left: 100%;
        }

        .level-card:hover:not(.locked) {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 32px var(--shadow-heavy);
        }

        .level-card.active {
            transform: scale(1.05);
            font-weight: 600;
            box-shadow: 0 8px 28px var(--shadow-heavy);
        }

        .level-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .level-card.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0.4;
        }

        .level-card.level-1 { border-color: var(--success); }
        .level-card.level-1.active { 
            background: linear-gradient(135deg, var(--success-bg) 0%, #c8e6c9 100%); 
            border-color: var(--success);
            box-shadow: 0 8px 28px rgba(67, 160, 71, 0.3);
        }

        .level-card.level-2 { border-color: var(--warning); }
        .level-card.level-2.active { 
            background: linear-gradient(135deg, var(--warning-bg) 0%, #fff59d 100%); 
            border-color: var(--warning);
            box-shadow: 0 8px 28px rgba(249, 168, 37, 0.3);
        }

        .level-card.level-3 { border-color: var(--error); }
        .level-card.level-3.active { 
            background: linear-gradient(135deg, var(--error-bg) 0%, #ffcdd2 100%); 
            border-color: var(--error);
            box-shadow: 0 8px 28px rgba(229, 57, 53, 0.3);
        }

        .level-card.level-4 { border-color: var(--info); }
        .level-card.level-4.active { 
            background: linear-gradient(135deg, var(--info-bg) 0%, #bbdefb 100%); 
            border-color: var(--info);
            box-shadow: 0 8px 28px rgba(30, 136, 229, 0.3);
        }

        .level-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .level-name {
            font-size: 15px;
            color: var(--ink-light);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .level-progress {
            font-size: 13px;
            color: var(--primary);
            font-weight: 700;
            padding: 4px 12px;
            background: rgba(121, 85, 72, 0.1);
            border-radius: 12px;
            display: inline-block;
        }

        .level-requirement {
            font-size: 12px;
            color: var(--ink-lighter);
            margin-top: 8px;
        }

        /* Poem Display 优化 */
        .poem-display {
            text-align: center;
            padding: 40px 30px;
            background: linear-gradient(135deg, var(--paper-light) 0%, var(--paper) 100%);
            border-radius: 20px;
            border: 3px solid var(--gold);
            margin-bottom: 28px;
            position: relative;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: inset 0 2px 12px rgba(121, 85, 72, 0.08);
        }

        .poem-display::before,
        .poem-display::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--gold);
            opacity: 0.4;
        }

        .poem-display::before {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .poem-display::after {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        .poem-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 36px;
            color: var(--ink);
            line-height: 1.8;
            margin-bottom: 12px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        .poem-hint {
            font-size: 15px;
            color: var(--ink-light);
            margin-top: 8px;
            font-weight: 500;
            padding: 4px 16px;
            background: rgba(121, 85, 72, 0.08);
            border-radius: 12px;
            display: inline-block;
        }

        .ink-spread {
            animation: inkSpread 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes inkSpread {
            0% { 
                box-shadow: 0 0 0 0 rgba(67, 160, 71, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 0 30px rgba(67, 160, 71, 0.1);
                transform: scale(1.02);
            }
            100% { 
                box-shadow: 0 0 0 0 rgba(67, 160, 71, 0);
                transform: scale(1);
            }
        }

        /* Options Grid 优化 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 640px;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .option-card {
            padding: 20px;
            background: white;
            border: 2px solid var(--gold-light);
            border-radius: 16px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .option-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px var(--shadow-medium);
            border-color: var(--accent);
        }

        .option-card.correct {
            background: linear-gradient(135deg, var(--success-bg) 0%, #c8e6c9 100%);
            border-color: var(--success);
            animation: correctPulse 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(67, 160, 71, 0.4);
        }

        .option-card.wrong {
            background: linear-gradient(135deg, var(--error-bg) 0%, #ffcdd2 100%);
            border-color: var(--error);
            animation: paperShake 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes paperShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        /* Challenge Context 优化 */
        .challenge-context {
            text-align: center;
            padding: 28px;
            background: linear-gradient(135deg, var(--warning-bg) 0%, #fffde7 100%);
            border-radius: 20px;
            border: 2px solid var(--gold);
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(249, 168, 37, 0.15);
        }

        .challenge-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .challenge-desc {
            font-size: 16px;
            line-height: 1.9;
            color: var(--ink-light);
        }

        /* Match Container 优化 */
        .match-container {
            padding: 12px 0;
            position: relative;
        }

        .match-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .match-area {
            display: flex;
            gap: 24px;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .match-area {
                flex-direction: column;
                gap: 16px;
            }
        }

        .match-column {
            flex: 1;
            background: white;
            border: 2px solid var(--gold-light);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 48%;
            box-shadow: 0 4px 16px var(--shadow);
        }

        @media (max-width: 768px) {
            .match-column {
                max-width: 100%;
            }
        }

        .column-title {
            text-align: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 22px;
            color: var(--primary);
            padding-bottom: 12px;
            border-bottom: 3px dashed var(--gold);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .match-item {
            padding: 16px 14px;
            background: var(--paper);
            border: 2px solid var(--gold-light);
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 64px;
            position: relative;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .match-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .match-item.selected {
            background: linear-gradient(135deg, var(--warning-bg) 0%, #fff9c4 100%);
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(198, 142, 23, 0.3);
        }

        .match-item.matched {
            background: linear-gradient(135deg, var(--success-bg) 0%, #c8e6c9 100%);
            border-color: var(--success);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .match-item.wrong {
            background: linear-gradient(135deg, var(--error-bg) 0%, #ffcdd2 100%);
            border-color: var(--error);
            animation: paperShake 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .match-item .speak-icon {
            position: absolute;
            top: 6px;
            right: 6px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--accent) 100%);
            border: 1.5px solid var(--gold-dark);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(198, 142, 23, 0.3);
        }

        .match-item .speak-icon:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 12px rgba(198, 142, 23, 0.4);
        }

        /* Chain Input 优化 */
        .chain-input-area {
            padding: 12px 0;
        }

        .chain-input {
            width: 100%;
            max-width: 540px;
            margin: 24px auto;
            display: block;
            padding: 18px 24px;
            font-size: 18px;
            font-family: 'Noto Serif SC', serif;
            border: 2px solid var(--gold-light);
            border-radius: 16px;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .chain-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(121, 85, 72, 0.1), 0 8px 24px var(--shadow-medium);
            transform: translateY(-2px);
        }

        .chain-input.correct {
            border-color: var(--success);
            background: linear-gradient(135deg, var(--success-bg) 0%, #e8f5e9 100%);
            box-shadow: 0 0 0 4px rgba(67, 160, 71, 0.1);
        }

        .chain-input.wrong {
            border-color: var(--error);
            background: linear-gradient(135deg, var(--error-bg) 0%, #ffebee 100%);
            animation: paperShake 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chain-input.highlight {
            border-color: var(--success);
            box-shadow: 0 0 24px rgba(67, 160, 71, 0.4);
            animation: highlightPulse 1.5s ease-in-out;
        }

        @keyframes highlightPulse {
            0%, 100% { box-shadow: 0 0 24px rgba(67, 160, 71, 0.4); }
            50% { box-shadow: 0 0 40px rgba(67, 160, 71, 0.6); }
        }

        /* Feihua Keyword 优化 */
        .feihua-keyword {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 56px;
            color: var(--primary);
            margin-bottom: 20px;
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, var(--warning-bg) 0%, #fff9c4 100%);
            border-radius: 24px;
            border: 3px solid var(--gold);
            box-shadow: 0 8px 24px rgba(249, 168, 37, 0.3);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: float 3s ease-in-out infinite;
        }

        .feihua-context {
            font-size: 17px;
            color: var(--ink-light);
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Collection Grid 优化 */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 12px 0;
        }

        @media (max-width: 768px) {
            .collection-grid {
                grid-template-columns: 1fr;
            }
        }

        .collection-card {
            background: white;
            border: 2px solid var(--gold-light);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px var(--shadow);
        }

        .collection-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .collection-card:hover::before {
            left: 100%;
        }

        .collection-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 32px var(--shadow-heavy);
            border-color: var(--accent);
        }

        .collection-poem {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 24px;
            color: var(--ink);
            margin-bottom: 12px;
            text-align: center;
        }

        .collection-author {
            font-size: 15px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px dashed var(--gold);
            font-weight: 600;
        }

        .collection-preview {
            font-size: 16px;
            color: var(--ink-light);
            text-align: center;
            line-height: 1.7;
        }

        /* Learn Panel 优化 */
        .learn-panel {

<script>
// ==================== 数据加载器 ====================
class DataLoader {
    constructor() {
        this.dataUrls = {
            poems: './data/poems.json',
            quizzes: './data/quizzes.json',
            keywords: './data/keywords.json'
        };
    }

    async loadAll() {
        try {
            const [poems, quizzes, keywords] = await Promise.all([
                fetch(this.dataUrls.poems).then(res => this.handleResponse(res, '诗词数据')),
                fetch(this.dataUrls.quizzes).then(res => this.handleResponse(res, '问答题数据')),
                fetch(this.dataUrls.keywords).then(res => this.handleResponse(res, '飞花令关键字'))
            ]);

            window.gameData = {
                poems: poems,
                quizzes: quizzes,
                keywords: keywords
            };

            // 初始化语音合成
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }

            return { success: true };
        } catch (error) {
            console.error('数据加载失败:', error);
            return { success: false, error: error.message };
        }
    }

    async handleResponse(response, dataName) {
        if (!response.ok) {
            throw new Error(`${dataName}加载失败 (HTTP ${response.status})`);
        }
        return await response.json();
    }

    showError(error) {
        const loadingScreen = document.getElementById('loadingScreen');
        loadingScreen.innerHTML = `
            <div class="loading-error">
                <h2>⚠️ 加载失败</h2>
                <p>${error}</p>
                <p style="font-size: 14px; margin-top: 12px; color: var(--ink-lighter);">
                    <strong>注意:</strong> 如果您是通过本地文件直接打开 (file://),<br>
                    由于浏览器的安全限制,可能无法加载外部 JSON 文件。<br>
                    建议使用本地服务器运行此游戏,例如:
                </p>
                <ul style="text-align: left; font-size: 14px; margin: 18px 0 24px 36px; color: var(--ink-light);">
                    <li>VS Code: 安装 "Live Server" 插件,右键选择 "Open with Live Server"</li>
                    <li>Python: 在项目目录运行 <code>python -m http.server</code></li>
                    <li>Node.js: 安装 <code>http-server</code> 后运行</li>
                </ul>
                <button class="retry-btn" onclick="location.reload()">🔄 重新加载</button>
            </div>
        `;
    }

    hideLoadingScreen() {
        const loadingScreen = document.getElementById('loadingScreen');
        const app = document.getElementById('app');

        loadingScreen.style.display = 'none';
        app.style.display = 'flex';
    }
}

// ==================== 诗词数据库 ====================
const PoemDatabase = {
    poems: [],
    keywords: [],
    quizzes: [],
    index: { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} },

    init() {
        if (!window.gameData) {
            throw new Error('游戏数据未加载');
        }
        this.poems = window.gameData.poems || [];
        this.keywords = window.gameData.keywords || [];
        this.quizzes = window.gameData.quizzes || [];
        this.buildIndex();
    },

    buildIndex() {
        this.index = { byAuthor: {}, byKeyword: {}, byTag: {}, byDifficulty: {1: [], 2: [], 3: []} };
        this.poems.forEach(poem => {
            if (!this.index.byAuthor[poem.author]) this.index.byAuthor[poem.author] = [];
            this.index.byAuthor[poem.author].push(poem);
            this.index.byDifficulty[poem.difficulty].push(poem);
            poem.tags.forEach(tag => {
                if (!this.index.byTag[tag]) this.index.byTag[tag] = [];
                this.index.byTag[tag].push(poem);
            });
            const text = poem.up + poem.down;
            this.keywords.forEach(kw => {
                if (text.includes(kw)) {
                    if (!this.index.byKeyword[kw]) this.index.byKeyword[kw] = [];
                    if (!this.index.byKeyword[kw].includes(poem)) this.index.byKeyword[kw].push(poem);
                }
            });
        });
    },

    query({difficulty, excludeIds = [], limit = 10, requireKeyword = null, author = null, tag = null} = {}) {
        let pool = difficulty ? [...this.index.byDifficulty[difficulty]] : [...this.poems];
        if (author) pool = pool.filter(p => p.author === author);
        if (tag) pool = pool.filter(p => p.tags.includes(tag));
        if (requireKeyword) pool = pool.filter(p => (p.up + p.down).includes(requireKeyword));
        pool = pool.filter(p => !excludeIds.includes(p.id));
        return pool.sort(() => Math.random() - 0.5).slice(0, limit);
    },

    fuzzyMatch(input, target, tolerance = 0.92) {
        if (input === target) return {match: true, score: 1};
        const cleanInput = input.replace(/[，。？！、；：""''（）【】]/g, '');
        const cleanTarget = target.replace(/[，。？！、；：""''（）【】]/g, '');
        if (cleanInput === cleanTarget) return {match: true, score: 0.98};
        const distance = this.levenshtein(cleanInput, cleanTarget);
        const maxLen = Math.max(cleanInput.length, cleanTarget.length);
        const similarity = 1 - distance / maxLen;
        if (similarity >= tolerance) return {match: true, score: similarity};
        const commonChars = [...cleanInput].filter(c => cleanTarget.includes(c)).length;
        const overlapRatio = commonChars / Math.min(cleanInput.length, cleanTarget.length);
        if (overlapRatio >= 0.7) return {match: true, score: overlapRatio * 0.9, hint: "音近字"};
        return {match: false, score: similarity};
    },

    levenshtein(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                matrix[i][j] = b.charAt(i-1) === a.charAt(j-1) ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1] + 1, matrix[i][j-1] + 1, matrix[i-1][j] + 1);
            }
        }
        return matrix[b.length][a.length];
    }
};

// ==================== 音效引擎 ====================
class SoundEngine {
    constructor() {
        this.ctx = null;
        this.enabled = true;
        this.init();
    }
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    ensureContext() {
        if (!this.ctx) this.init();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    play(type) {
        if (!this.enabled || !this.ctx) return;
        this.ensureContext();
        const t = this.ctx.currentTime;
        switch(type) {
            case 'correct': this.playChord([523.25, 659.25, 783.99], 0.3, 'sine', 0.5); break;
            case 'wrong': this.playTone(200, 0.3, 'sawtooth', 0.25, 150); break;
            case 'combo': this.playSequence([523.25, 659.25, 783.99, 1046.50], 0.1, 'triangle'); break;
            case 'collect': this.playChord([392, 523.25, 659.25], 0.2, 'sine', 0.6); break;
        }
    }
    playTone(freq, duration, type, vol, freqEnd = null) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        if (freqEnd) osc.frequency.setValueAtTime(freqEnd, this.ctx.currentTime + duration * 0.5);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    }
    playChord(freqs, vol, type, duration) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, duration, type, vol * (1 - i*0.1)), i * 50));
    }
    playSequence(freqs, interval, type) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, interval * 2, type, 0.2), i * interval * 1000));
    }
}

// ==================== 游戏状态 ====================
class GameState {
    constructor() {
        this.reset();
        this.load();
    }
    reset() {
        this.mode = 'fill';
        this.difficulty = 'MEDIUM';
        this.score = 0;
        this.streak = 0;
        this.maxStreak = 0;
        this.hearts = 3;
        this.hintsUsed = 0;
        this.hintLimit = 3;
        this.collectedPoems = new Set();
        this.wrongPoems = new Set();
        this.usedPoemIds = [];
        this.comboCount = 0;
        this.isProcessing = false;
        this.timer = null;
    }
    load() {
        const saved = localStorage.getItem('poemGameV2');
        if (saved) {
            const data = JSON.parse(saved);
            this.highScore = data.highScore || 0;
            this.collectedPoems = new Set(data.collected || []);
            this.wrongPoems = new Set(data.wrongPoems || []);
        } else {
            this.highScore = 0;
        }
    }
    save() {
        const data = {
            highScore: Math.max(this.score, this.highScore),
            collected: Array.from(this.collectedPoems),
            wrongPoems: Array.from(this.wrongPoems),
            timestamp: Date.now()
        };
        localStorage.setItem('poemGameV2', JSON.stringify(data));
    }
    addScore(points) {
        this.score += points;
        if (this.score > this.highScore) this.highScore = this.score;
    }
    addStreak() {
        this.streak++;
        this.comboCount++;
        if (this.streak > this.maxStreak) this.maxStreak = this.streak;
        if (this.streak % 3 === 0) { this.addScore(5); return true; }
        return false;
    }
    breakStreak() { this.streak = 0; this.comboCount = 0; }
    loseHeart() { this.hearts--; this.breakStreak(); return this.hearts <= 0; }
    useHint() {
        if (this.hintsUsed >= this.hintLimit || this.score < 5) return false;
        this.hintsUsed++; this.score -= 5; return true;
    }
    collectPoem(id) {
        this.collectedPoems.add(id);
        this.save();
    }
    uncollectPoem(id) {
        this.collectedPoems.delete(id);
        this.save();
    }
    addWrongPoem(id) {
        this.wrongPoems.add(id);
        this.save();
    }
    removeWrongPoem(id) {
        this.wrongPoems.delete(id);
        this.save();
    }
    setDifficulty(diff) {
        this.difficulty = diff;
        this.hintLimit = {EASY: 5, MEDIUM: 3, HARD: 2, EXPERT: 1}[diff] || 3;
    }
}

// ==================== 游戏主类 ====================
class PoemGame {
    constructor() {
        this.state = new GameState();
        this.sound = new SoundEngine();
        this.currentQuestion = null;
        this.matchState = null;
        this.chainState = null;
        this.canvas = null;
        this.ctx = null;
        this.learnPanelExpanded = false;
        this.autoTransitionTimer = null;
        this.synth = window.speechSynthesis;
        this.voices = [];
        this.selectedVoice = null;
        this.initSpeech();
    }

    initSpeech() {
        if ('speechSynthesis' in window) {
            this.synth = window.speechSynthesis;
            this.loadVoices();
            if (this.synth.onvoiceschanged !== undefined) {
                this.synth.onvoiceschanged = () => this.loadVoices();
            }
            const savedVoice = localStorage.getItem('selectedVoice');
            if (savedVoice) {
                this.selectedVoice = savedVoice;
            }
        }
    }

    loadVoices() {
        this.voices = this.synth.getVoices();
    }

    speak(text, shouldHint = false) {
        if (!('speechSynthesis' in window)) {
            alert('您的浏览器不支持语音合成功能');
            return;
        }

        this.synth.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        utterance.pitch = 1;

        if (this.selectedVoice) {
            const selectedVoiceObj = this.voices.find(v => v.name === this.selectedVoice);
            if (selectedVoiceObj) {
                utterance.voice = selectedVoiceObj;
            } else {
                const chineseVoice = this.voices.find(voice => 
                    voice.lang.includes('zh-CN') || voice.lang.includes('zh')
                );
                if (chineseVoice) utterance.voice = chineseVoice;
            }
        } else {
            const chineseVoice = this.voices.find(voice => 
                voice.lang.includes('zh-CN') || voice.lang.includes('zh')
            );
            if (chineseVoice) utterance.voice = chineseVoice;
        }

        utterance.onstart = () => {
            const speakBtns = document.querySelectorAll('.speak-btn');
            speakBtns.forEach(btn => btn.classList.add('speaking'));
        };

        utterance.onend = () => {
            const speakBtns = document.querySelectorAll('.speak-btn');
            speakBtns.forEach(btn => btn.classList.remove('speaking'));
        };

        this.synth.speak(utterance);
    }

    stopSpeak() {
        if ('speechSynthesis' in window) {
            this.synth.cancel();
            const speakBtns = document.querySelectorAll('.speak-btn');
            speakBtns.forEach(btn => btn.classList.remove('speaking'));
        }
    }

    speakCurrent() {
        if (!this.currentQuestion) return;
        
        switch(this.state.mode) {
            case 'fill':
            case 'challenge':
                if (this.currentQuestion.poem) {
                    const fullText = this.currentQuestion.poem.up + '，' + this.currentQuestion.poem.down;
                    this.speak(fullText);
                }
                break;
            case 'feihua':
                if (this.currentQuestion.poem && this.currentQuestion.keyword) {
                    const poem = this.currentQuestion.poem;
                    const displayText = poem.up.includes(this.currentQuestion.keyword) ? poem.up : poem.down;
                    this.speak(displayText + '。此句含有"' + this.currentQuestion.keyword + '"字', true);
                }
                break;
            case 'chain':
                if (this.currentQuestion.poem) {
                    this.speak(this.currentQuestion.poem.up + '。请接下句', true);
                }
                break;
            case 'learn':
                if (this.currentQuestion.poem) {
                    const fullPoemText = this.currentQuestion.poem.fullPoem || (this.currentQuestion.poem.up + '，' + this.currentQuestion.poem.down);
                    this.speak(fullPoemText);
                }
                break;
        }
    }

    async init() {
        const loader = new DataLoader();
        const result = await loader.loadAll();

        if (result.success) {
            try {
                PoemDatabase.init();
                loader.hideLoadingScreen();
                this.updateUI();
                this.switchMode('fill');
                window.addEventListener('beforeunload', () => this.state.save());
            } catch (error) {
                loader.showError('数据初始化失败: ' + error.message);
            }
        } else {
            loader.showError(result.error);
        }
    }

    switchMode(mode) {
        this.state.mode = mode;
        this.state.isProcessing = false;
        if (this.state.timer) { clearInterval(this.state.timer); this.state.timer = null; }
        this.clearAutoTransition();
        document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));
        const main = document.getElementById('gameMain');
        main.innerHTML = '';
        switch(mode) {
            case 'fill': this.initFillMode(); break;
            case 'challenge': this.initChallengeMode(); break;
            case 'match': this.initMatchMode(); break;
            case 'feihua': this.initFeihuaMode(); break;
            case 'chain': this.initChainMode(); break;
            case 'learn': this.initLearnMode(); break;
        }
        this.updateUI();
    }

    clearAutoTransition() {
        if (this.autoTransitionTimer) {
            clearTimeout(this.autoTransitionTimer);
            this.autoTransitionTimer = null;
        }
    }

    initFillMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="fillContent"></div>`;
        this.generateFillQuestion();
    }

    setDifficulty(diff) {
        this.state.setDifficulty(diff);
        this.state.usedPoemIds = [];
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.classList.contains(diff.toLowerCase())) btn.classList.add('active');
        });
        this.generateFillQuestion();
    }

    generateFillQuestion() {
        if (this.state.hearts <= 0) return;
        const content = document.getElementById('fillContent');

        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateFillQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'fill', answer: poem.down};

        content.innerHTML = `
            <div class="poem-display" id="poemDisplay">
                <div class="poem-text">${poem.up}</div>
                <div class="poem-hint">${poem.dynasty} · ${poem.author}</div>
            </div>
            <div class="options-grid" id="optionsGrid"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('optionsGrid');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFillAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }

    generateOptions(correctPoem, field) {
        const correct = correctPoem[field];
        const options = [correct];
        const diffMap = {EASY: 1, MEDIUM: 2, HARD: 3, EXPERT: 3};
        const pool = PoemDatabase.query({difficulty: diffMap[this.state.difficulty], limit: 20})
            .filter(p => p.id !== correctPoem.id && p[field] !== correct);
        const shuffled = pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 3 && i < shuffled.length; i++) {
            const opt = shuffled[i][field];
            if (!options.includes(opt)) options.push(opt);
        }
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            if (!options.includes(random[field])) options.push(random[field]);
        }
        return options.sort(() => Math.random() - 0.5);
    }

    checkFillAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            document.getElementById('poemDisplay').classList.add('ink-spread');
            this.sound.play('correct');
            this.state.addScore(10);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            this.state.addWrongPoem(this.currentQuestion.poem.id);
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFillQuestion(), 1800);
        }
        this.updateUI();
    }

    showLearnPanel(poem) {
        this.clearAutoTransition();

        const panel = document.getElementById('learnPanel');
        const isCollected = this.state.collectedPoems.has(poem.id);
        const isWrong = this.state.wrongPoems.has(poem.id);
        const fullPoemText = poem.fullPoem || (poem.up + ',' + poem.down);

        panel.innerHTML = `
            <div class="learn-panel">
                <div class="learn-header" onclick="game.toggleLearnPanel()">
                    <div class="learn-title">📚 诗词赏析</div>
                    <button class="learn-close" onclick="event.stopPropagation(); game.closeLearnPanel()">×</button>
                </div>
                <div class="learn-content-wrapper expanded" id="learnContentWrapper">
                    ${isWrong ? `<div class="learn-section" style="background: var(--error-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px;">
                        <div class="learn-section-title" style="color: var(--error);">💔 已自动收藏到错题集</div>
                        <div class="learn-content">此题已答错,已自动加入收藏夹供您复习</div>
                    </div>` : ''}
                    <div class="learn-section">
                        <div class="learn-section-title">📝 全诗</div>
                        <div class="learn-poem-text">${fullPoemText}</div>
                        <div style="text-align: center; margin-top: 18px;">
                            <button class="speak-btn" style="position: relative; display: inline-flex; top: 0; right: 0;" onclick="game.speak('${fullPoemText.replace(/'/g, "\\'").replace(/\n/g, '，').replace(/"/g, '\\"')}')">🔊 朗读全文</button>
                        </div>
                    </div>
                    <div class="learn-section">
                        <div class="learn-section-title">📖 创作背景</div>
                        <div class="learn-content">${poem.background || '暂无背景介绍'}</div>
                    </div>
                    ${poem.note ? `<div class="learn-section"><div class="learn-section-title">💡 注释</div><div class="learn-content">${poem.note}</div></div>` : ''}
                    <div class="learn-section">
                        <div class="learn-section-title">🏷️ 标签</div>
                        <div class="learn-tags">
                            ${poem.tags.map(tag => `<span class="learn-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <button class="collect-btn ${isCollected ? 'collected' : ''}" onclick="game.collectCurrentPoem(${poem.id})">
                        ${isCollected ? '⭐ 已收藏' : '⭐ 收藏'}
                    </button>
                </div>
                <div class="expand-btn" onclick="game.toggleLearnPanel()">
                    <span class="arrow">▼</span>
                    <span id="expandBtnText">收起</span>
                </div>
            </div>
        `;

        this.learnPanelExpanded = true;

        if (this.state.mode === 'match') {
            this.autoTransitionTimer = setTimeout(() => {
                this.closeLearnPanel();
            }, 5000);
        }
    }

    toggleLearnPanel() {
        const wrapper = document.getElementById('learnContentWrapper');
        const expandBtn = document.querySelector('.expand-btn');
        const arrow = expandBtn.querySelector('.arrow');
        const text = document.getElementById('expandBtnText');

        if (this.learnPanelExpanded) {
            wrapper.classList.remove('expanded');
            arrow.classList.remove('expanded');
            text.textContent = '展开查看赏析';
            this.learnPanelExpanded = false;
        } else {
            wrapper.classList.add('expanded');
            arrow.classList.add('expanded');
            text.textContent = '收起';
            this.learnPanelExpanded = true;
        }
    }

    closeLearnPanel() {
        this.clearAutoTransition();
        const panel = document.getElementById('learnPanel');
        if (panel) {
            panel.innerHTML = '';
        }
        this.learnPanelExpanded = false;
        
        if (this.state.mode === 'fill') {
            this.initFillMode();
        } else {
            setTimeout(() => {
                if (this.state.hearts > 0) {
                    if (this.state.mode === 'match') {
                        this.generateMatchGame();
                    } else if (this.state.mode === 'feihua') {
                        this.generateFeihuaQuestion();
                    } else if (this.state.mode === 'chain') {
                        this.generateChainQuestion();
                    }
                }
            }, 300);
        }
    }

    collectCurrentPoem(poemId) {
        if (this.state.collectedPoems.has(poemId)) {
            this.state.uncollectPoem(poemId);
            const btn = document.querySelector('.collect-btn');
            if (btn) {
                btn.classList.remove('collected');
                btn.innerHTML = '⭐ 收藏';
            }
        } else {
            this.state.collectPoem(poemId);
            this.sound.play('collect');
            const btn = document.querySelector('.collect-btn');
            if (btn) {
                btn.classList.add('collected');
                btn.innerHTML = '⭐ 已收藏';
            }
        }
        this.updateUI();
    }

    initChallengeMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="challengeContent"></div>`;
        this.generateChallengeQuestion();
    }

    generateChallengeQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChallengeQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'challenge', answer: poem.down};

        const content = document.getElementById('challengeContent');
        const contextTypes = ['background', 'author', 'tags'];
        const contextType = contextTypes[Math.floor(Math.random() * contextTypes.length)];
        let challengeText = '';
        switch(contextType) {
            case 'background': challengeText = `📖 背景提示:<br>${poem.background ? poem.background.substring(0, 60) + '...' : '这是一首' + poem.dynasty + '代' + poem.author + '的诗'}`; break;
            case 'author': challengeText = `👤 作者:${poem.dynasty} · ${poem.author}<br>🏷️ 标签:${poem.tags.join('、')}`; break;
            case 'tags': challengeText = `🏷️ 主题:${poem.tags.join('、')}<br>提示:上句是"${poem.up.substring(0, 2)}..."`; break;
        }

        content.innerHTML = `
            <div class="challenge-context">
                <div class="challenge-title">🎯 挑战模式</div>
                <div class="challenge-desc">${challengeText}</div>
            </div>
            <div class="poem-display">
                <div class="poem-text" style="font-size: 26px;">请根据提示选择正确的下句</div>
            </div>
            <div class="options-grid" id="challengeOptions"></div>
            <div id="learnPanel"></div>
        `;

        const options = this.generateOptions(poem, 'down');
        const grid = document.getElementById('challengeOptions');
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkChallengeAnswer(card, opt);
            grid.appendChild(card);
        });
        this.state.isProcessing = false;
    }

    checkChallengeAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(15);
            if (this.state.addStreak()) this.showComboBonus();
            setTimeout(() => this.generateChallengeQuestion(), 1200);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            this.state.addWrongPoem(this.currentQuestion.poem.id);
            document.querySelectorAll('.option-card').forEach(c => {
                if (c.textContent === this.currentQuestion.answer) setTimeout(() => c.classList.add('correct'), 500);
            });
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateChallengeQuestion(), 1800);
        }
        this.updateUI();
    }

    initMatchMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="match-container">
                <canvas class="match-canvas" id="matchCanvas"></canvas>
                <div class="match-area" id="matchArea">
                    <div class="match-column" id="leftColumn"><div class="column-title">诗句上句</div></div>
                    <div class="match-column" id="rightColumn"><div class="column-title">作者 / 下句</div></div>
                </div>
                <div id="learnPanel"></div>
            </div>
        `;
        this.initMatchCanvas();
        this.generateMatchGame();
    }

    initMatchCanvas() {
        this.canvas = document.getElementById('matchCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resizeCanvas();
        window.addEventListener('resize', () => this.resizeCanvas());
    }

    resizeCanvas() {
        const container = document.querySelector('.match-container');
        if (container && this.canvas) {
            this.canvas.width = container.offsetWidth;
            this.canvas.height = container.offsetHeight;
        }
    }

    drawMatchLine(elem1, elem2) {
        if (!this.ctx) return;

        const rect1 = elem1.getBoundingClientRect();
        const rect2 = elem2.getBoundingClientRect();
        const canvasRect = this.canvas.getBoundingClientRect();

        const x1 = rect1.left + rect1.width / 2 - canvasRect.left;
        const y1 = rect1.top + rect1.height / 2 - canvasRect.top;
        const x2 = rect2.left + rect2.width / 2 - canvasRect.left;
        const y2 = rect2.top + rect2.height / 2 - canvasRect.top;

        this.ctx.beginPath();
        this.ctx.strokeStyle = '#2e7d32';
        this.ctx.lineWidth = 3;
        this.ctx.lineCap = 'round';

        const midX = (x1 + x2) / 2;
        const controlY = (y1 + y2) / 2 - 50;

        this.ctx.moveTo(x1, y1);
        this.ctx.quadraticCurveTo(midX, controlY, x2, y2);
        this.ctx.stroke();

        setTimeout(() => {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        }, 1000);
    }

    generateMatchGame() {
        let pairCount = Math.min(3 + Math.floor(this.state.score / 50), 5);
        const pool = PoemDatabase.query({limit: pairCount * 2});
        const selected = pool.slice(0, pairCount);
        this.matchState = {poems: selected, selectedLeft: null, selectedRight: null, matched: 0, target: pairCount, isProcessing: false};

        const leftCol = document.getElementById('leftColumn');
        const rightCol = document.getElementById('rightColumn');
        leftCol.innerHTML = '<div class="column-title">诗句上句</div>';
        rightCol.innerHTML = '<div class="column-title">作者 / 下句</div>';

        selected.forEach((poem, idx) => {
            const item = document.createElement('div');
            item.className = 'match-item';
            item.innerHTML = `
                ${poem.up}
                <span class="speak-icon" onclick="event.stopPropagation(); game.speak('${poem.up.replace(/'/g, "\\'")}')">🔊</span>
            `;
            item.dataset.index = idx;
            item.dataset.side = 'left';
            item.onclick = () => this.selectMatchItem(item, 'left');
            leftCol.appendChild(item);
        });

        const rightItems = [];
        selected.forEach((poem, idx) => {
            rightItems.push({text: poem.author, index: idx, type: 'author'});
            rightItems.push({text: poem.down, index: idx, type: 'down'});
        });
        rightItems.sort(() => Math.random() - 0.5);
        rightItems.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'match-item';
            div.innerHTML = `
                ${item.text}
                <span class="speak-icon" onclick="event.stopPropagation(); game.speak('${item.text.replace(/'/g, "\\'")}')">🔊</span>
            `;
            div.dataset.index = item.index;
            div.dataset.type = item.type;
            div.dataset.side = 'right';
            div.onclick = () => this.selectMatchItem(div, 'right');
            rightCol.appendChild(div);
        });

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }

        setTimeout(() => this.resizeCanvas(), 100);
    }

    selectMatchItem(item, side) {
        if (this.matchState.isProcessing || item.classList.contains('matched')) return;
        document.querySelectorAll(`[data-side="${side}"]`).forEach(el => { if (!el.classList.contains('matched')) el.classList.remove('selected'); });
        item.classList.add('selected');
        if (side === 'left') this.matchState.selectedLeft = item; else this.matchState.selectedRight = item;
        if (this.matchState.selectedLeft && this.matchState.selectedRight) this.checkMatch();
    }

    checkMatch() {
        const state = this.matchState;
        state.isProcessing = true;
        const leftIdx = parseInt(state.selectedLeft.dataset.index);
        const rightIdx = parseInt(state.selectedRight.dataset.index);
        if (leftIdx === rightIdx) {
            this.drawMatchLine(state.selectedLeft, state.selectedRight);
            
            state.selectedLeft.classList.remove('selected'); state.selectedRight.classList.remove('selected');
            state.selectedLeft.classList.add('matched'); state.selectedRight.classList.add('matched');
            this.sound.play('correct');
            this.state.addScore(10);
            
            const poem = state.poems[leftIdx];
            this.showLearnPanel(poem);
            
            state.matched++;
            if (state.matched >= state.target) {
                this.sound.play('combo');
            } else { 
                state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false; 
            }
        } else {
            state.selectedLeft.classList.add('wrong'); state.selectedRight.classList.add('wrong');
            this.sound.play('wrong');
            this.state.addWrongPoem(state.poems[leftIdx].id);
            setTimeout(() => {
                state.selectedLeft.classList.remove('wrong', 'selected');
                state.selectedRight.classList.remove('wrong', 'selected');
                state.selectedLeft = null; state.selectedRight = null; state.isProcessing = false;
            }, 800);
        }
        this.updateUI();
    }

    initFeihuaMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `<div id="feihuaContent"></div>`;
        this.generateFeihuaQuestion();
    }

    generateFeihuaQuestion() {
        if (this.state.hearts <= 0) return;
        const keyword = PoemDatabase.keywords[Math.floor(Math.random() * PoemDatabase.keywords.length)];
        const matching = PoemDatabase.query({requireKeyword: keyword, limit: 20});
        if (matching.length < 4) { this.generateFeihuaQuestion(); return; }

        const selected = matching[0];
        const isUp = selected.up.includes(keyword);
        const displayText = isUp ? selected.down : selected.up;
        const answer = isUp ? selected.up : selected.down;
        this.currentQuestion = {answer, keyword, poem: selected, type: 'feihua'};

        document.getElementById('feihuaContent').innerHTML = `
            <div style="text-align: center;">
                <div class="feihua-keyword">${keyword}</div>
                <div class="feihua-context">请选出含有"${keyword}"字的诗句</div>
            </div>
            <div class="poem-display" style="min-height: 90px;">
                <div class="poem-text">${displayText}</div>
            </div>
            <div class="options-grid" id="feihuaOptions"></div>
            <div id="learnPanel"></div>
        `;

        const options = [answer];
        
        const distractors = matching.filter(p => p.id !== selected.id);
        const usedOptions = new Set([answer]);
        
        for (let i = 0; i < 3 && i < distractors.length; i++) {
            const p = distractors[i];
            const opt = p.up.includes(keyword) ? p.up : p.down;
            if (!usedOptions.has(opt)) {
                options.push(opt);
                usedOptions.add(opt);
            }
        }
        
        while (options.length < 4) {
            const random = PoemDatabase.poems[Math.floor(Math.random() * PoemDatabase.poems.length)];
            const text = random.up + random.down;
            if (text.includes(keyword) && !usedOptions.has(random.up) && !usedOptions.has(random.down)) {
                const opt = random.up.includes(keyword) ? random.up : random.down;
                options.push(opt);
                usedOptions.add(opt);
            }
        }

        const grid = document.getElementById('feihuaOptions');
        options.sort(() => Math.random() - 0.5).forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.textContent = opt;
            card.onclick = () => this.checkFeihuaAnswer(card, opt);
            grid.appendChild(card);
        });
    }

    checkFeihuaAnswer(card, answer) {
        if (this.state.isProcessing) return;
        this.state.isProcessing = true;
        const isCorrect = answer === this.currentQuestion.answer;
        if (isCorrect) {
            card.classList.add('correct');
            this.sound.play('correct');
            this.state.addScore(12);
            if (this.state.addStreak()) this.showComboBonus();
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            card.classList.add('wrong');
            this.sound.play('wrong');
            this.state.addWrongPoem(this.currentQuestion.poem.id);
            if (this.state.loseHeart()) setTimeout(() => this.gameOver(), 1500);
            else setTimeout(() => this.generateFeihuaQuestion(), 1800);
        }
        this.updateUI();
    }

    initChainMode() {
        const main = document.getElementById('gameMain');
        main.innerHTML = `
            <div class="chain-input-area">
                <div class="poem-display" style="min-height: 90px;">
                    <div class="poem-text" id="chainPoemText">请输入上句诗词</div>
                </div>
                <input type="text" class="chain-input" id="chainInput" placeholder="输入诗词..." onkeypress="if(event.key==='Enter')game.checkChainAnswer()">
                <div style="text-align: center; margin-top: 18px;">
                    <button class="action-btn" onclick="game.checkChainAnswer()">提交</button>
                    <button class="action-btn" onclick="game.skipChain()">跳过 (-5分)</button>
                    <button class="action-btn" onclick="game.chainHint()">💡 提示 (-5分)</button>
                </div>
                <div id="learnPanel"></div>
            </div>
        `;
        this.generateChainQuestion();
    }

    generateChainQuestion() {
        if (this.state.hearts <= 0) return;
        const pool = PoemDatabase.query({excludeIds: this.state.usedPoemIds, limit: 1});
        if (pool.length === 0) { this.state.usedPoemIds = []; this.generateChainQuestion(); return; }

        const poem = pool[0];
        this.state.usedPoemIds.push(poem.id);
        this.currentQuestion = {poem, type: 'chain', answer: poem.down};

        document.getElementById('chainPoemText').textContent = poem.up;
        const input = document.getElementById('chainInput');
        input.value = '';
        input.classList.remove('correct', 'wrong', 'highlight');
        input.focus();
        this.state.isProcessing = false;

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    checkChainAnswer() {
        if (this.state.isProcessing) return;
        const input = document.getElementById('chainInput');
        const userAnswer = input.value.trim();
        if (!userAnswer) return;

        this.state.isProcessing = true;
        const result = PoemDatabase.fuzzyMatch(userAnswer, this.currentQuestion.answer);

        if (result.match) {
            this.sound.play('correct');
            this.state.addScore(15);
            if (this.state.addStreak()) this.showComboBonus();
            input.classList.add('correct');
            this.showLearnPanel(this.currentQuestion.poem);
        } else {
            this.sound.play('wrong');
            this.state.addWrongPoem(this.currentQuestion.poem.id);
            input.classList.add('wrong');
            
            setTimeout(() => {
                input.value = this.currentQuestion.answer;
                input.classList.remove('wrong');
                input.classList.add('highlight');
                
                setTimeout(() => {
                    input.value = '';
                    input.classList.remove('highlight');
                    this.state.isProcessing = false;
                    input.focus();
                }, 2000);
            }, 500);
        }
    }

    chainHint() {
        if (this.state.score < 5) {
            alert('分数不足，无法使用提示');
            return;
        }
        
        this.state.score -= 5;
        const answer = this.currentQuestion.answer;
        const input = document.getElementById('chainInput');
        
        input.value = answer.substring(0, 2);
        input.classList.add('highlight');
        
        setTimeout(() => {
            input.classList.remove('highlight');
        }, 1000);
        
        this.updateUI();
        this.sound.play('correct');
    }

    skipChain() {
        if (this.state.score >= 5) {
            this.state.score -= 5;
            this.state.breakStreak();
            document.getElementById('chainInput').value = '';
            this.generateChainQuestion();
            this.updateUI();
        }
    }

    initLearnMode() {
        const main = document.getElementById('gameMain');
        const collectedPoems = PoemDatabase.poems.filter(p => this.state.collectedPoems.has(p.id));

        main.innerHTML = `
            <div style="text-align: center; margin-bottom: 24px;">
                <div style="font-family: 'Ma Shan Zheng', cursive; font-size: 30px; color: var(--primary);">📚 我的收藏</div>
                <div style="color: var(--ink-light); font-size: 16px;">共收藏 ${collectedPoems.length} 首诗词</div>
            </div>
            <div class="collection-grid" id="collectionGrid"></div>
            <div id="learnPanel"></div>
        `;

        const grid = document.getElementById('collectionGrid');
        if (collectedPoems.length === 0) {
            grid.innerHTML = '<div style="text-align: center; color: var(--ink-light); padding: 48px;">暂无收藏,快去游戏中收集吧!</div>';
            return;
        }

        collectedPoems.forEach(poem => {
            const card = document.createElement('div');
            card.className = 'collection-card';
            card.innerHTML = `
                <div class="collection-poem">${poem.up}</div>
                <div class="collection-author">${poem.dynasty} · ${poem.author}</div>
                <div class="collection-preview">${poem.down}</div>
            `;
            card.onclick = () => {
                this.currentQuestion = {poem, type: 'learn'};
                this.showLearnPanel(poem);
            };
            grid.appendChild(card);
        });

        const learnPanel = document.getElementById('learnPanel');
        if (learnPanel) {
            learnPanel.innerHTML = '';
        }
    }

    showComboBonus() {
        const popup = document.createElement('div');
        popup.className = 'combo-popup';
        popup.textContent = `🔥 连击 x${this.state.streak}!`;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1000);
    }

    updateUI() {
        document.getElementById('scoreValue').textContent = this.state.score;
        document.getElementById('collectValue').textContent = this.state.collectedPoems.size;

        document.querySelectorAll('.heart').forEach((heart, i) => {
            heart.classList.toggle('lost', i >= this.state.hearts);
        });

        const streakContainer = document.getElementById('streakContainer');
        const streakBadge = document.getElementById('streakBadge');
        if (this.state.streak > 0) {
            streakContainer.style.display = 'flex';
            streakBadge.textContent = `连击 x${this.state.streak}`;
        } else {
            streakContainer.style.display = 'none';
        }

        const hintBtn = document.getElementById('hintBtn');
        if (hintBtn) {
            hintBtn.disabled = this.state.hintsUsed >= this.state.hintLimit || this.state.score < 5;
        }
    }

    useHint() {
        if (!this.state.useHint()) return;
        alert('提示功能已激活！');
        this.updateUI();
    }

    gameOver() {
        this.state.save();
        const modal = document.getElementById('gameOverModal');
        document.getElementById('finalScore').textContent = this.state.score;
        document.getElementById('finalStreak').textContent = this.state.maxStreak;
        document.getElementById('finalCollected').textContent = this.state.collectedPoems.size;
        modal.classList.add('active');
    }

    restart() {
        this.state.reset();
        this.state.load();
        const modal = document.getElementById('gameOverModal');
        modal.classList.remove('active');
        this.switchMode('fill');
    }
}

// 初始化游戏
const game = new PoemGame();
game.init();
</script>
